<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>开始答题 · 算术题乐园</title>
<link rel="stylesheet" href="arithmetic.css?v=1">
</head>
<body class="arith-body">

<div class="arith-wrap">

  <header class="arith-header">
    <a href="index.html" class="arith-back" aria-label="返回选难度">← 返回</a>
    <h1 class="arith-title" id="levelTitle">🧮 答题中</h1>
    <p class="arith-sub" id="levelSub">加油, 小朋友!</p>
  </header>

  <main class="arith-play">

    <div class="arith-topbar">
      <div class="arith-progress">
        <span>本题:</span>
        <span id="qIndex">1</span>
        <span>/</span>
        <span id="qTotal">10</span>
        <span style="margin-left:16px">⭐</span>
        <span class="arith-stars" id="starsRow"></span>
      </div>
      <div class="arith-level" id="levelBadge">5 以内</div>
    </div>

    <div class="arith-question-card" id="qCard">
      <span class="arith-q-emoji" id="qEmoji">🤔</span>
      <div class="arith-q-text" id="qText">1 + 1 = ?</div>
      <div class="arith-q-hint" id="qHint">点下面正确答案</div>
    </div>

    <div class="arith-choices" id="choices"></div>

    <div class="arith-feedback" id="feedback"></div>

  </main>

  <footer class="arith-footer">
    <p>🎈 答对 10 题自动升级难度 · 答错会轻轻提示正确答案</p>
  </footer>

</div>

<div class="arith-stars-burst" id="burst"></div>
<div id="modalRoot"></div>

<script src="arithmetic.js?v=1" defer></script>
</body>
</html>
