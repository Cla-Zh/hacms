<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAM-CMS — AI-Agent 管理的知识湖</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ======================== 主外壳：主页视图 ======================== -->
<div id="app-shell">

  <!-- 左侧导航 -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark">KM</div>
      <div class="logo-text">知识湖</div>
    </div>

    <!-- 分类目录 -->
    <nav class="nav-section">
      <div class="nav-label">目录</div>
      <ul id="category-list" class="nav-list"></ul>
    </nav>

    <!-- 标签云 -->
    <div class="nav-section tags-section">
      <div class="nav-label">标签</div>
      <div id="tag-cloud" class="tag-cloud"></div>
    </div>

    <div class="sidebar-footer">
      <span>Powered by AAM-CMS v2</span>
    </div>
  </aside>

  <!-- 主内容区 -->
  <main id="main-content">
    <!-- 顶栏：搜索 -->
    <header id="top-bar">
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="搜索标题、摘要、标签…" autocomplete="off">
        <span class="search-hint">⌘ K</span>
      </div>
      <div class="article-count" id="article-count"></div>
    </header>

    <!-- 文章列表 -->
    <div id="article-list"></div>
  </main>

</div>

<!-- ======================== 文章框架（Reader Frame）======================== -->
<div id="reader-frame" class="hidden">
  <!-- 统一控制顶栏 -->
  <div id="reader-bar">
    <button id="btn-back" class="btn-back" title="返回目录">◀ 返回</button>
    <div class="reader-title-wrap">
      <h1 id="reader-title"></h1>
      <div id="reader-meta"></div>
    </div>
    <div id="reader-attachments" class="attachment-btns"></div>
  </div>

  <!-- Iframe 内容区 -->
  <div id="iframe-wrap">
    <iframe id="content-iframe" src="" frameborder="0"></iframe>
    <!-- 兜底提示（当无 HTML 时显示） -->
    <div id="no-html-notice" class="no-html-notice hidden">
      <div class="notice-inner">
        <div class="notice-icon">📄</div>
        <p>本报告暂无 HTML 在线预览</p>
        <p>请点击右上角下载相应格式附件</p>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
