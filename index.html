<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>肥嘟嘟的炼金工厂 · 调研报告与白皮书</title>
<meta name="description" content="35 篇深度调研 · 涵盖 AI 基础设施 / 存储安全 / 勒索防御 / 数据安全。仅供学术研究。">
<link rel="stylesheet" href="style.css">
<!-- Open Graph / WeChat 分享卡片 -->
<meta property="og:title" content="肥嘟嘟的炼金工厂 · 调研报告与白皮书">
<meta property="og:description" content="35 篇深度调研 · 涵盖 AI 基础设施 / 存储安全 / 勒索防御 / 数据安全。仅供学术研究。">
<meta property="og:type" content="website">
<meta property="og:image" content="https://cdn.jsdelivr.net/gh/twitter/twemoji@latest/assets/72x72/1f9ea.png">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="肥嘟嘟的炼金工厂 · 调研报告与白皮书">
<meta name="twitter:description" content="35 篇深度调研 · AI/存储/安全">
</head>
<body>

<div id="app-shell">

  <!-- 左侧导航 (桌面端固定, 移动端抽屉) -->
  <aside id="sidebar" aria-label="主导航">
    <div class="sidebar-header">
      <div class="logo-mark">⚗️</div>
      <div class="logo-text">
        <div class="logo-title">肥嘟嘟的炼金工厂</div>
        <div class="logo-sub">Alchemy Factory</div>
      </div>
      <button id="sidebar-close" class="sidebar-close" aria-label="关闭">×</button>
    </div>

    <nav class="nav-section" aria-label="文章分类">
      <div class="nav-label">目录</div>
      <ul id="category-list" class="nav-list"></ul>
    </nav>

    <div class="nav-section tags-section">
      <div class="nav-label">
        <span>标签</span>
        <button id="tags-clear" class="tags-clear" title="清除标签筛选" hidden>清除</button>
      </div>
      <div id="tag-cloud" class="tag-cloud"></div>
    </div>

    <div class="sidebar-footer">
      <div class="footer-row"><span class="footer-label">调研时段</span><span class="footer-val">2024 – 2026</span></div>
      <div class="footer-row"><span class="footer-label">编辑</span><span class="footer-val">川龙</span></div>
    </div>
  </aside>

  <!-- 移动端遮罩 -->
  <div id="sidebar-overlay" class="sidebar-overlay hidden"></div>

  <!-- 主内容 -->
  <main id="main-content">

    <!-- 顶栏 (Hero Bar) -->
    <header id="top-bar">
      <button id="menu-toggle" class="menu-toggle" aria-label="打开目录">☰</button>

      <div class="top-bar-title">
        <span class="tb-main">肥嘟嘟的炼金工厂</span>
        <span class="tb-sep">·</span>
        <span class="tb-count" id="topbar-count">35 篇调研</span>
        <span class="tb-sep">·</span>
        <span class="tb-range">2024 – 2026</span>
      </div>

      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="search-input" placeholder="搜索标题、标签、全文…" autocomplete="off">
        <kbd class="search-kbd">⌘K</kbd>
      </div>

      <div class="top-bar-tools">
        <select id="sort-select" class="sort-select" title="排序">
          <option value="date-desc">最新优先</option>
          <option value="date-asc">最早优先</option>
        </select>
        <button id="stats-btn" class="stats-btn" title="查看统计">统计</button>
      </div>
    </header>

    <!-- 主滚动区 -->
    <div id="main-area">
      <!-- Hero 区: 最新 2 篇大卡片 -->
      <section id="hero-section" aria-label="最新文章"></section>

      <!-- 分割线 -->
      <div class="section-divider">
        <span class="divider-label">全部文章</span>
        <span class="divider-line"></span>
        <span class="divider-count" id="article-count"></span>
      </div>

      <!-- 主网格 -->
      <section id="article-grid" aria-label="文章列表"></section>

      <!-- 空状态 -->
      <div id="empty-state" class="empty-state hidden">
        <div class="empty-icon">∅</div>
        <div class="empty-title">没有匹配的文章</div>
        <div class="empty-sub">请尝试调整分类、标签或搜索关键字</div>
        <button id="empty-reset" class="empty-reset">重置筛选</button>
      </div>
    </div>

    <!-- 底栏版权 -->
    <footer class="page-footer">
      <span>肥嘟嘟的炼金工厂 · 35 篇深度调研 · 仅供学术研究</span>
    </footer>
  </main>
</div>

<!-- 文章阅读框架 (沿用现有, 不变) -->
<div id="reader-frame" class="hidden">
  <div id="reader-bar">
    <button id="btn-back" class="btn-back" title="返回目录">← 返回</button>
    <div class="reader-title-wrap">
      <h1 id="reader-title"></h1>
      <div id="reader-meta"></div>
    </div>
    <div id="reader-attachments" class="attachment-btns"></div>
  </div>

  <div id="iframe-wrap">
    <iframe id="content-iframe" src="" frameborder="0"></iframe>
    <div id="no-html-notice" class="no-html-notice hidden">
      <div class="notice-inner">
        <div class="notice-icon">📄</div>
        <p>暂无 HTML 预览</p>
        <p>请下载附件查看</p>
      </div>
    </div>
  </div>
</div>

<!-- 统计弹层 (默认隐藏) -->
<div id="stats-overlay" class="stats-overlay hidden" aria-hidden="true">
  <div class="stats-panel">
    <div class="stats-head">
      <div class="stats-title">炼金工厂统计</div>
      <button id="stats-close" class="stats-close" aria-label="关闭">×</button>
    </div>
    <div id="stats-body" class="stats-body"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
