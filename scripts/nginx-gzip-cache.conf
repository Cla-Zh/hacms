# hacms nginx 配置 - gzip + 缓存优化
# 用法: 复制到 /etc/nginx/sites-enabled/hacms
# 重载: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name 111.229.136.50;
    root /mnt/g/hacms;
    index index.html;

    # ═══ GZIP 压缩 (关键优化, 减小 60-80% 传输) ═══
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;

    # ═══ HTTP 强缓存 (1 年) ═══
    # 静态资源 (HTML/CSS/JS) 都加 cache-control: max-age=31536000
    # 配合 ETag/Last-Modified, 浏览器只在文件变化时下载

    # 主页 (index.html) - 1 小时缓存
    location = / {
        add_header Cache-Control "public, max-age=3600";
        try_files /index.html =404;
    }

    # 静态资源 - 1 年缓存
    location ~* \.(html|css|js|json|svg|png|jpg|jpeg|gif|ico|woff|woff2|ttf)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
        access_log off;
    }

    # 文章 HTML - 1 天缓存
    location ~* /content/articles/.*\.html$ {
        add_header Cache-Control "public, max-age=86400";
        expires 1d;
    }

    # manifest.json - 5 分钟缓存 (重要数据, 需要快速更新)
    location = /content/index/manifest.json {
        add_header Cache-Control "public, max-age=300";
        expires 5m;
    }

    # manifest-light.json - 1 小时缓存
    location = /content/index/manifest-light.json {
        add_header Cache-Control "public, max-age=3600";
        expires 1h;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ =404;
    }

    # 隐藏 nginx 版本
    server_tokens off;

    # 启用 ETag
    etag on;

    # 安全 headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
