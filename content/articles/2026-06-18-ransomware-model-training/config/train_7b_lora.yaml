# LLaMA-Factory 训练配置: 7B 模型 + LoRA (24GB GPU 推荐)
model_name_or_path: Qwen/Qwen2.5-7B-Instruct
dataset_dir: /mnt/g/hacms/content/articles/2026-06-18-ransomware-model-training/data
dataset: ransomware_defense
output_dir: ./sft_output_7b_lora

# 训练类型
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj

# 训练超参
num_train_epochs: 3.0
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
warmup_ratio: 0.1
lr_scheduler_type: cosine
weight_decay: 0.0
max_grad_norm: 1.0
optim: adamw_torch

# 序列长度
max_seq_length: 2048
packing: false
neftune_noise_alpha: 5

# 日志与保存
logging_steps: 20
save_steps: 500
save_total_limit: 3
plot_loss: true
report_to: tensorboard

# 精度
fp16: true
bf16: false
flash_attn: true

# 系统
gradient_checkpointing: true
seed: 42
