<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .box-fill { fill: #eef0f6; stroke: #3a4a6b; stroke-width: 1.5; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-dash { stroke: #666; stroke-width: 1.2; fill: none; marker-end: url(#arr2); stroke-dasharray: 3,2; }
    .bar { fill: #fafafa; stroke: #ccc; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>
  <text x="450" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">§16.8 AI 卡扩控制器 (扩容前 AI 卡校验 + 防勒索联动)</text>
  <text x="450" y="40" text-anchor="middle" fill="#666" font-size="11">新 ctrl 扩容 · 老 ctrl 有 AI 卡 + 正常 → 新 ctrl 也必须有 AI 卡</text>

  <line x1="80" y1="65" x2="80" y2="500" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="220" y1="65" x2="220" y2="500" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="360" y1="65" x2="360" y2="500" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="500" y1="65" x2="500" y2="500" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="640" y1="65" x2="640" y2="500" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="800" y1="65" x2="800" y2="500" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>

  <rect class="box" x="20" y="50" width="120" height="40" rx="3"/><text class="label" x="80" y="73">管理员</text><text class="sub" x="80" y="86" font-size="9">扩容请求</text>
  <rect class="box" x="170" y="50" width="100" height="40" rx="3"/><text class="label" x="220" y="73">扩容管理器</text><text class="sub" x="220" y="86" font-size="9">ExpandMgr</text>
  <rect class="box" x="310" y="50" width="100" height="40" rx="3"/><text class="label" x="360" y="73">老 ctrl 0/1</text><text class="sub" x="360" y="86" font-size="9">已运行</text>
  <rect class="box" x="450" y="50" width="100" height="40" rx="3"/><text class="label" x="500" y="73">新 ctrl 2</text><text class="sub" x="500" y="86" font-size="9">待加入</text>
  <rect class="box" x="590" y="50" width="100" height="40" rx="3"/><text class="label" x="640" y="73">AntiRansomSvc</text><text class="sub" x="640" y="86" font-size="9">:8443</text>
  <rect class="box" x="750" y="50" width="100" height="40" rx="3"/><text class="label" x="800" y="73">AI 卡库存</text><text class="sub" x="800" y="86" font-size="9">NPU 物理库存</text>

  <text x="450" y="115" text-anchor="middle" fill="#3a4a6b" font-size="12" font-weight="600">— 扩容前: 检查老 ctrl AI 卡状态 —</text>
  <line class="arrow" x1="80" y1="140" x2="215" y2="140"/><text class="sub" x="147" y="133">1. POST /expand ctrl-2</text>
  <line class="arrow" x1="220" y1="160" x2="355" y2="160"/><text class="sub" x="287" y="153">2. qry ctrl[0/1] NPU list</text>
  <line class="arrow-dash" x1="360" y1="180" x2="225" y2="180"/><text class="sub" x="287" y="173" fill="#1a5432">3. ctrl0=3 NPU, ctrl1=3 NPU, healthy</text>

  <text x="450" y="210" text-anchor="middle" fill="#3a4a6b" font-size="12" font-weight="600">— 关键约束: 老 ctrl 有 AI 卡 → 新 ctrl 必须也有 —</text>
  <line class="arrow" x1="220" y1="235" x2="795" y2="235"/><text class="sub" x="507" y="228">4. qry AI 卡库存 (≥3 NPU for new ctrl?)</text>
  <line class="arrow-dash" x1="800" y1="255" x2="225" y2="255"/><text class="sub" x="507" y="248" fill="#1a5432">5. available=3 ✓</text>
  <line class="arrow" x1="220" y1="280" x2="495" y2="280"/><text class="sub" x="357" y="273">6. 给 ctrl2 分配 NPU #6/7/8</text>
  <line class="arrow-dash" x1="500" y1="300" x2="225" y2="300"/><text class="sub" x="357" y="293" fill="#1a5432">7. assigned</text>

  <text x="450" y="330" text-anchor="middle" fill="#3a4a6b" font-size="12" font-weight="600">— 防勒索服务联动 (新 ctrl 同步) —</text>
  <line class="arrow" x1="220" y1="355" x2="635" y2="355"/><text class="sub" x="427" y="348">8. AntiRansomSvc register ctrl2</text>
  <line class="arrow" x1="640" y1="375" x2="225" y2="375"/><text class="sub" x="427" y="368">9. 同步 NAS/SAN 策略到 ctrl2</text>
  <line class="arrow" x1="220" y1="400" x2="495" y2="400"/><text class="sub" x="357" y="393">10. ctrl2 上电 + 启动 Omtask</text>
  <line class="arrow-dash" x1="360" y1="420" x2="85" y2="420"/><text class="sub" x="217" y="413" fill="#1a5432">11. expand done, cluster ctrl=3</text>

  <rect class="bar" x="20" y="500" width="860" height="50" rx="3"/>
  <text x="30" y="517" fill="#333" font-size="11" font-weight="600">§16.8 关键设计:</text>
  <text x="30" y="533" fill="#666" font-size="10">硬约束: 老 ctrl 有 AI 卡且健康 → 新 ctrl 必须分配 NPU. 否则防勒索服务无法跨 ctrl 统一策略. AI 卡库存不足 → 拒绝扩容 + 报错 AI_CARD_INVENTORY_LOW.</text>
  <text x="30" y="547" fill="#666" font-size="10">扩容成功后 AntiRansomSvc 同步 NAS/SAN 策略到新 ctrl, 新 ctrl 走 §16.1 完整流程激活 AI 卡.</text>
</svg>