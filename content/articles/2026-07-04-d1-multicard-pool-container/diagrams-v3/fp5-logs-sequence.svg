<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-good { stroke: #1a5432; stroke-width: 2; fill: none; marker-end: url(#arr3); }
    .arrow-bad { stroke: #a02020; stroke-width: 1.5; fill: none; marker-end: url(#arr4); stroke-dasharray: 3,2; }
    .bar { fill: #fafafa; stroke: #ccc; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a5432"/>
    </marker>
    <marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a02020"/>
    </marker>
  </defs>

  <text x="450" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">FP5 时序: AI 推理服务日志收集 (GetLogs 拉取 canld 日志)</text>
  <text x="450" y="40" text-anchor="middle" fill="#666" font-size="11">HealthService.GetLogs(card_id?, since_ts, max_lines, level) → canld 日志缓冲 → 返回</text>

  <!-- Lifelines -->
  <line x1="80" y1="65" x2="80" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="240" y1="65" x2="240" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="400" y1="65" x2="400" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="560" y1="65" x2="560" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="730" y1="65" x2="730" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="860" y1="65" x2="860" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>

  <rect class="box" x="20" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="80" y="73">运维 / 告警</text>
  <text class="sub" x="80" y="86" font-size="9">dctl logs / webhook</text>

  <rect class="box" x="180" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="240" y="73">Health gRPC</text>
  <text class="sub" x="240" y="86" font-size="9">:50052</text>

  <rect class="box" x="340" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="400" y="73">健康监控</text>
  <text class="sub" x="400" y="86" font-size="9">§15.3 canld</text>

  <rect class="box" x="500" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="560" y="73">日志缓冲</text>
  <text class="sub" x="560" y="86" font-size="9">10MB ring + 索引</text>

  <rect class="box" x="670" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="730" y="73">/var/log/dcard</text>
  <text class="sub" x="730" y="86" font-size="9">canld 文件</text>

  <rect class="box" x="800" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="860" y="73">AI 卡使能</text>
  <text class="sub" x="860" y="86" font-size="9">日志源 (init-*.log)</text>

  <text x="470" y="115" text-anchor="middle" fill="#1a5432" font-size="12" font-weight="600">—— 拉取流程 (运维 / 告警触发) ——</text>

  <line class="arrow-good" x1="80" y1="135" x2="235" y2="135"/>
  <text class="sub" x="158" y="128">1. GetLogs(card_id="card-3", since_ts=T-5m, max_lines=500, level=ERROR)</text>

  <line class="arrow" x1="240" y1="160" x2="395" y2="160"/>
  <text class="sub" x="318" y="153">2. 解析查询条件 (card + 时间 + 级别)</text>

  <line class="arrow" x1="400" y1="185" x2="555" y2="185"/>
  <text class="sub" x="478" y="178">3. 查内存索引 (level=ERROR + card=card-3 + ts ≥ T-5m)</text>

  <line class="arrow" x1="560" y1="210" x2="725" y2="210"/>
  <text class="sub" x="643" y="203">4. 命中 → 取 /var/log/dcard/canld-card-3.log</text>

  <line class="arrow" x1="560" y1="235" x2="855" y2="235"/>
  <text class="sub" x="708" y="228">5. 追加查 init-*.log (AI 卡使能日志)</text>

  <line class="arrow-good" x1="730" y1="265" x2="565" y2="265"/>
  <text class="sub" x="648" y="258">6. ✓ 23 entries</text>

  <line class="arrow-good" x1="860" y1="285" x2="565" y2="285"/>
  <text class="sub" x="713" y="278">7. ✓ 5 entries (Init 阶段)</text>

  <line class="arrow-good" x1="560" y1="310" x2="405" y2="310"/>
  <text class="sub" x="483" y="303">8. 合并 + 排序</text>

  <line class="arrow-good" x1="400" y1="335" x2="245" y2="335"/>
  <text class="sub" x="323" y="328">9. GetLogsResponse(entries=[28 LogEntry], next_offset)</text>

  <line class="arrow-good" x1="240" y1="360" x2="85" y2="360"/>
  <text class="sub" x="163" y="353">10. ✓ 日志交给告警系统 / dctl 显示</text>

  <line class="arrow-bad" x1="400" y1="395" x2="85" y2="395" stroke-dasharray="3,2"/>
  <text class="sub" x="243" y="388" fill="#a02020">11. 缓冲未命中 → 落盘扫文件 → DCARD_INTERNAL_ERROR(5)</text>

  <line class="arrow" x1="560" y1="425" x2="405" y2="425"/>
  <text class="sub" x="483" y="418">12. 后台 canld tail-f 持续追加</text>

  <!-- Bottom notes -->
  <rect class="bar" x="20" y="455" width="860" height="70" rx="3"/>
  <text x="30" y="475" fill="#333" font-size="11" font-weight="600">v3.1 GetLogs 关键点</text>
  <text x="30" y="492" fill="#666" font-size="10">• /dcard/health/v1/GetLogs v3.1 新增; 日志源: canld (推理) + init (使能) + acl (框架) + hotplug</text>
  <text x="30" y="507" fill="#666" font-size="10">• 内存索引 + 10MB ring buffer 加速查询; 未命中落盘扫 (兜底); 错误码 DCARD_INTERNAL_ERROR(5)</text>
  <text x="30" y="520" fill="#666" font-size="10">• v3.1 不实现流式 tail (留 v3.2); 当前 unary, max_lines=500 上限</text>
</svg>