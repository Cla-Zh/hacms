<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .box-core { fill: #fff3b0; stroke: #b89000; stroke-width: 1.5; }
    .label { fill: #333; font-size: 12px; font-weight: 600; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-good { stroke: #1a5432; stroke-width: 2; fill: none; marker-end: url(#arr3); }
    .bar { fill: #fafafa; stroke: #ccc; }
    .mono { font-family: monospace; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a5432"/>
    </marker>
  </defs>

  <text x="450" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">FP5 时序: 日志收集 (独立模块 — 采集 / 解析 / GetLogs / Watch / Push)</text>
  <text x="450" y="40" text-anchor="middle" fill="#666" font-size="11">各模块写 *.log → 收集器 tail + 解析 LogEntry → GetLogs 过滤 / Watch 流式 / Push 到 Loki·ES</text>

  <!-- 5 lifelines: 110, 300, 500, 680, 830 -->
  <g stroke="#333" stroke-width="1" stroke-dasharray="4,2">
    <line x1="110" y1="95" x2="110" y2="470"/>
    <line x1="300" y1="95" x2="300" y2="470"/>
    <line x1="500" y1="95" x2="500" y2="470"/>
    <line x1="680" y1="95" x2="680" y2="470"/>
    <line x1="830" y1="95" x2="830" y2="470"/>
  </g>

  <rect class="box" x="45" y="55" width="130" height="42" rx="3"/>
  <text class="label" x="110" y="70" font-size="11">日志源 (5 模块)</text>
  <text class="sub" x="110" y="83" font-size="9">AI推理/健康/CANN</text>
  <text class="sub" x="110" y="93" font-size="8">写 /var/log/d1/*.log</text>

  <rect class="box" x="240" y="55" width="120" height="42" rx="3"/>
  <text class="label" x="300" y="74" font-size="11">/var/log/d1/</text>
  <text class="sub" x="300" y="88" font-size="9">日志文件</text>

  <rect class="box-core" x="440" y="55" width="120" height="42" rx="3"/>
  <text class="label" x="500" y="70" font-size="11">日志收集模块</text>
  <text class="sub" x="500" y="83" font-size="9">收集器/解析器</text>
  <text class="sub" x="500" y="93" font-size="8">GetLogs/Watch/Push</text>

  <rect class="box" x="620" y="55" width="120" height="42" rx="3"/>
  <text class="label" x="680" y="74" font-size="11">运维</text>
  <text class="sub" x="680" y="88" font-size="9">查询 / 订阅</text>

  <rect class="box" x="770" y="55" width="120" height="42" rx="3"/>
  <text class="label" x="830" y="74" font-size="11">Loki / ES</text>
  <text class="sub" x="830" y="88" font-size="9">sink 目标</text>

  <!-- Steps -->
  <line class="arrow" x1="110" y1="122" x2="295" y2="122"/>
  <text class="sub" x="200" y="116" text-anchor="middle" font-family="monospace">1. AI 推理服务 写 ai-inference.log</text>

  <line class="arrow" x1="110" y1="146" x2="295" y2="146"/>
  <text class="sub" x="200" y="140" text-anchor="middle" font-family="monospace">2. 健康监控 写 health-monitor.log</text>

  <line class="arrow" x1="110" y1="170" x2="295" y2="170"/>
  <text class="sub" x="200" y="164" text-anchor="middle" font-family="monospace">3. CANN 写 cann.log</text>

  <line class="arrow" x1="500" y1="194" x2="305" y2="194"/>
  <text class="sub" x="400" y="188" text-anchor="middle">4. 收集器 tail 所有 *.log</text>

  <line class="arrow" x1="500" y1="222" x2="510" y2="222"/>
  <rect class="box" x="498" y="216" width="24" height="12" rx="2"/>
  <text class="sub" x="500" y="211" text-anchor="middle">5. 解析 LogEntry (ts+level+source+message+fields)</text>

  <line class="arrow" x1="680" y1="250" x2="505" y2="250"/>
  <text class="sub" x="592" y="244" text-anchor="middle">6. GetLogs (service=ai-inference, level=ERROR, max=100)</text>

  <line class="arrow" x1="500" y1="278" x2="510" y2="278"/>
  <rect class="box" x="498" y="272" width="24" height="12" rx="2"/>
  <text class="sub" x="500" y="267" text-anchor="middle">7. 过滤 ERROR</text>

  <line class="arrow-good" x1="500" y1="306" x2="675" y2="306"/>
  <text class="sub" x="588" y="300" text-anchor="middle">8. GetLogsResponse (100 entries)</text>

  <line class="arrow" x1="680" y1="330" x2="505" y2="330"/>
  <text class="sub" x="592" y="324" text-anchor="middle">9. Watch 订阅, 实时推日志 (streaming)</text>
  <line class="arrow-good" x1="500" y1="354" x2="675" y2="354" stroke-dasharray="4,2"/>
  <text class="sub" x="588" y="348" text-anchor="middle">↳ stream LogEntry ...</text>

  <line class="arrow-good" x1="500" y1="382" x2="825" y2="382"/>
  <text class="sub" x="662" y="376" text-anchor="middle">10. Push 到 Loki / ES (sink 配置)</text>

  <!-- Bottom notes -->
  <rect class="bar" x="20" y="445" width="860" height="75" rx="3"/>
  <text x="30" y="464" fill="#333" font-size="11" font-weight="600">v3.2 日志收集关键点 (独立模块)</text>
  <text x="30" y="481" fill="#666" font-size="10">• 日志收集与健康监控职责分离: 前者只负责日志采集/解析/推送, 后者只负责 NPU 健康</text>
  <text x="30" y="497" fill="#666" font-size="10">• 3 接口: GetLogs (拉取过滤) / Watch (流式订阅) / Push (批量推 Loki·ES sink)</text>
  <text x="30" y="513" fill="#666" font-size="10" font-family="monospace">• LogEntry schema: timestamp + level + source + message + fields; 数据源 /var/log/d1/*.log</text>
</svg>
