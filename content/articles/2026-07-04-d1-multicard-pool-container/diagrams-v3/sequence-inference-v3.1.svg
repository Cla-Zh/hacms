<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .bar { fill: #fafafa; stroke: #ccc; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="450" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">推理时序 v3.1 — 1 物理 NPU = 多模型, 调度器路由</text>
  <text x="450" y="40" text-anchor="middle" fill="#666" font-size="11">vNic :50051 → 多模型推理框架 (Scheduler → Worker → ACL) → 物理 NPU #0/#3/#7</text>

  <!-- Lifelines (6 actors) -->
  <line x1="80" y1="65" x2="80" y2="480" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="220" y1="65" x2="220" y2="480" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="360" y1="65" x2="360" y2="480" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="500" y1="65" x2="500" y2="480" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="640" y1="65" x2="640" y2="480" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="820" y1="65" x2="820" y2="480" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>

  <rect class="box" x="20" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="80" y="73">业务客户端</text>
  <text class="sub" x="80" y="86" font-size="9">推理应用</text>

  <rect class="box" x="170" y="50" width="100" height="40" rx="3"/>
  <text class="label" x="220" y="73">vNic :50051</text>
  <text class="sub" x="220" y="86" font-size="9">Infer()</text>

  <rect class="box" x="305" y="50" width="110" height="40" rx="3"/>
  <text class="label" x="360" y="73">模型调度器</text>
  <text class="sub" x="360" y="86" font-size="9">Scheduler</text>

  <rect class="box" x="445" y="50" width="110" height="40" rx="3"/>
  <text class="label" x="500" y="73">推理线程池</text>
  <text class="sub" x="500" y="86" font-size="9">Workers × 16</text>

  <rect class="box" x="585" y="50" width="110" height="40" rx="3"/>
  <text class="label" x="640" y="73">昇腾 ACL</text>
  <text class="sub" x="640" y="86" font-size="9">aclmdlExecute</text>

  <rect class="box" x="760" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="820" y="73">物理 NPU 池</text>
  <text class="sub" x="820" y="86" font-size="9">Ascend 910B #0/#3/#7</text>

  <!-- Multi-model routes -->
  <text x="450" y="115" text-anchor="middle" fill="#3a4a6b" font-size="12" font-weight="600">—— 3 个模型并行推理 (m1 → #0, m2 → #3, m3 → #7) ——</text>

  <!-- Model m1 -->
  <line class="arrow" x1="80" y1="140" x2="215" y2="140"/>
  <text class="sub" x="147" y="133">1. m1.Infer(input)</text>

  <line class="arrow" x1="220" y1="160" x2="355" y2="160"/>
  <text class="sub" x="285" y="153">2. lookup model m1</text>

  <line class="arrow" x1="360" y1="180" x2="495" y2="180"/>
  <text class="sub" x="427" y="173">3. route → worker W1</text>
  <text class="sub" x="427" y="188" fill="#1a5432">策略: hash(m1) % 8 = 2</text>

  <line class="arrow" x1="500" y1="210" x2="635" y2="210"/>
  <text class="sub" x="567" y="203">4. aclmdlExecute(m1)</text>

  <line class="arrow" x1="640" y1="230" x2="815" y2="230"/>
  <text class="sub" x="727" y="223">5. NPU #2 / HCCS send</text>

  <line class="arrow" x1="820" y1="250" x2="645" y2="250" stroke-dasharray="2,2"/>
  <line class="arrow" x1="640" y1="270" x2="505" y2="270" stroke-dasharray="2,2"/>
  <line class="arrow" x1="500" y1="285" x2="365" y2="285" stroke-dasharray="2,2"/>
  <line class="arrow" x1="360" y1="300" x2="225" y2="300" stroke-dasharray="2,2"/>
  <line class="arrow" x1="220" y1="315" x2="85" y2="315" stroke-dasharray="2,2"/>
  <text class="sub" x="500" y="305">6. output + latency_us=2350</text>

  <!-- Model m2 (parallel) -->
  <line class="arrow" x1="80" y1="345" x2="215" y2="345"/>
  <text class="sub" x="147" y="338">7. m2.Infer(input)</text>

  <line class="arrow" x1="220" y1="365" x2="355" y2="365"/>
  <line class="arrow" x1="360" y1="385" x2="495" y2="385"/>
  <text class="sub" x="427" y="378">8. route → worker W5</text>
  <text class="sub" x="427" y="393" fill="#1a5432">hash(m2) % 8 = 5</text>

  <line class="arrow" x1="500" y1="415" x2="635" y2="415"/>
  <line class="arrow" x1="640" y1="435" x2="815" y2="435"/>
  <text class="sub" x="727" y="428">9. NPU #5</text>

  <line class="arrow" x1="820" y1="455" x2="85" y2="455" stroke-dasharray="2,2"/>
  <text class="sub" x="450" y="450">10. output m2</text>

  <!-- Notes -->
  <rect class="bar" x="20" y="490" width="860" height="40" rx="3"/>
  <text x="30" y="507" fill="#333" font-size="11" font-weight="600">v3.1 关键变化:</text>
  <text x="30" y="523" fill="#666" font-size="10">v3.0 是 1 模型 = 1 NPU (独占); v3.1 引入调度器, 1 物理 NPU 可服务 M 个模型 (按 hash + QPS 负载均衡). End-to-end latency 2.3ms ≈ 单 NPU 推理耗时.</text>
</svg>
