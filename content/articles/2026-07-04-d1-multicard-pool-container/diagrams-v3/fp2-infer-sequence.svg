<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .box-core { fill: #fff3b0; stroke: #b89000; stroke-width: 1.5; }
    .label { fill: #333; font-size: 12px; font-weight: 600; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-good { stroke: #1a5432; stroke-width: 2; fill: none; marker-end: url(#arr3); }
    .bar { fill: #fafafa; stroke: #ccc; }
    .mono { font-family: monospace; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a5432"/>
    </marker>
  </defs>

  <text x="450" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">FP2 时序: 推理接口 (vNic URL + round-robin 选池)</text>
  <text x="450" y="40" text-anchor="middle" fill="#666" font-size="11">用户 → vnic://vnic0:50051/Infer → 调度器 round-robin → npu0 池 → ACL 推理 → 返回</text>

  <!-- 5 lifelines: 100, 300, 500, 680, 830 -->
  <g stroke="#333" stroke-width="1" stroke-dasharray="4,2">
    <line x1="100" y1="95" x2="100" y2="470"/>
    <line x1="300" y1="95" x2="300" y2="470"/>
    <line x1="500" y1="95" x2="500" y2="470"/>
    <line x1="680" y1="95" x2="680" y2="470"/>
    <line x1="830" y1="95" x2="830" y2="470"/>
  </g>

  <rect class="box" x="40" y="55" width="120" height="42" rx="3"/>
  <text class="label" x="100" y="74">用户应用</text>
  <text class="sub" x="100" y="88" font-size="9">推理客户端</text>

  <rect class="box-core" x="240" y="55" width="120" height="42" rx="3"/>
  <text class="label" x="300" y="74">vNic gRPC</text>
  <text class="sub" x="300" y="88" font-size="9" font-family="monospace">vnic0:50051</text>

  <rect class="box" x="440" y="55" width="120" height="42" rx="3"/>
  <text class="label" x="500" y="70">多模型推理框架</text>
  <text class="sub" x="500" y="83" font-size="9">模型调度器</text>
  <text class="sub" x="500" y="93" font-size="8">round-robin</text>

  <rect class="box" x="620" y="55" width="120" height="42" rx="3"/>
  <text class="label" x="680" y="74">线程池 (npu0)</text>
  <text class="sub" x="680" y="88" font-size="9">aclmdlExecute</text>

  <rect class="box" x="770" y="55" width="120" height="42" rx="3"/>
  <text class="label" x="830" y="74">NPU 0</text>
  <text class="sub" x="830" y="88" font-size="9">物理 Ascend</text>

  <!-- Steps -->
  <line class="arrow-good" x1="100" y1="122" x2="295" y2="122"/>
  <text class="sub" x="197" y="116" text-anchor="middle" font-family="monospace">1. vnic://vnic0:50051/Infer (model_id=resnet50, input)</text>

  <line class="arrow" x1="300" y1="146" x2="300" y2="146"/>
  <line class="arrow" x1="290" y1="146" x2="310" y2="146"/>
  <rect class="box" x="288" y="140" width="24" height="12" rx="2"/>
  <text class="sub" x="300" y="135" text-anchor="middle">2. vNic gRPC 接收</text>

  <line class="arrow" x1="300" y1="170" x2="495" y2="170"/>
  <text class="sub" x="397" y="164" text-anchor="middle">3. vNic → 多模型推理框架.Infer</text>

  <line class="arrow" x1="500" y1="194" x2="510" y2="194"/>
  <rect class="box" x="498" y="188" width="24" height="12" rx="2"/>
  <text class="sub" x="500" y="183" text-anchor="middle">4. 调度器查表 (resnet50 → 3 池都持有)</text>

  <line class="arrow" x1="500" y1="222" x2="510" y2="222"/>
  <rect class="box" x="498" y="216" width="24" height="12" rx="2"/>
  <text class="sub" x="500" y="211" text-anchor="middle">5. round-robin: 选 npu0 池 (本次)</text>

  <line class="arrow" x1="500" y1="250" x2="675" y2="250"/>
  <text class="sub" x="587" y="244" text-anchor="middle">6. 路由到 npu0 推理队列</text>

  <line class="arrow" x1="680" y1="274" x2="690" y2="274"/>
  <rect class="box" x="678" y="268" width="24" height="12" rx="2"/>
  <text class="sub" x="680" y="263" text-anchor="middle">7. 线程池执行 (aclmdlExecute)</text>

  <line class="arrow" x1="680" y1="302" x2="825" y2="302"/>
  <text class="sub" x="752" y="296" text-anchor="middle">8. NPU 0 ACL 推理</text>

  <line class="arrow" x1="830" y1="326" x2="685" y2="326"/>
  <text class="sub" x="757" y="320" text-anchor="middle">9. NPU 0 返回 result</text>

  <line class="arrow" x1="680" y1="350" x2="505" y2="350"/>
  <text class="sub" x="592" y="344" text-anchor="middle">10. 线程池返回</text>

  <line class="arrow-good" x1="500" y1="374" x2="105" y2="374"/>
  <text class="sub" x="300" y="368" text-anchor="middle">11. InferResponse (output + latency + served_by_card_id=npu0)</text>

  <line class="arrow-good" x1="300" y1="398" x2="105" y2="398"/>
  <text class="sub" x="200" y="392" text-anchor="middle">12. 用户应用收响应 ✓</text>

  <!-- Bottom notes -->
  <rect class="bar" x="20" y="430" width="860" height="90" rx="3"/>
  <text x="30" y="450" fill="#333" font-size="11" font-weight="600">v3.2 Infer 关键点</text>
  <text x="30" y="467" fill="#666" font-size="10" font-family="monospace">• 业务面 vnic://vnic0:50051 · 管理面 vnic://vnic0:50053 (2 面 vNic gRPC)</text>
  <text x="30" y="484" fill="#666" font-size="10">• 3 卡 3 池, 每池加载同样 3 模型 (resnet50 / bert-base / llama-7b), 任一池可服务</text>
  <text x="30" y="501" fill="#666" font-size="10">• 调度器负载均衡 round-robin (本图) / least-connections; served_by_card_id 回传实际卡</text>
  <text x="30" y="515" fill="#666" font-size="10">• 1 物理 NPU = 1 线程池, model_id 路由 + 负载均衡</text>
</svg>
