<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-good { stroke: #1a5432; stroke-width: 2; fill: none; marker-end: url(#arr3); }
    .arrow-bad { stroke: #a02020; stroke-width: 1.5; fill: none; marker-end: url(#arr4); stroke-dasharray: 3,2; }
    .bar { fill: #fafafa; stroke: #ccc; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a5432"/>
    </marker>
    <marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a02020"/>
    </marker>
  </defs>

  <text x="450" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">FP3 时序: AI 推理服务模型调度 (Scheduler 路由)</text>
  <text x="450" y="40" text-anchor="middle" fill="#666" font-size="11">Infer 请求 → 调度器查 model_routing_table → 选 card_id (hash + LoadBalance + QPS)</text>

  <!-- Lifelines -->
  <line x1="80" y1="65" x2="80" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="230" y1="65" x2="230" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="390" y1="65" x2="390" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="550" y1="65" x2="550" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="720" y1="65" x2="720" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="860" y1="65" x2="860" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>

  <rect class="box" x="20" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="80" y="73">Infer RPC</text>
  <text class="sub" x="80" y="86" font-size="9">vNic :50051</text>

  <rect class="box" x="170" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="230" y="73">调度器入口</text>
  <text class="sub" x="230" y="86" font-size="9">反序列化</text>

  <rect class="box" x="330" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="390" y="73">model_routing_table</text>
  <text class="sub" x="390" y="86" font-size="9">内存哈希表</text>

  <rect class="box" x="490" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="550" y="73">LoadBalance</text>
  <text class="sub" x="550" y="86" font-size="9">QPS / 队列</text>

  <rect class="box" x="660" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="720" y="73">Worker Pool</text>
  <text class="sub" x="720" y="86" font-size="9">NPU × 2 worker</text>

  <rect class="box" x="800" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="860" y="73">NPU 物理</text>
  <text class="sub" x="860" y="86" font-size="9">执行</text>

  <text x="470" y="115" text-anchor="middle" fill="#1a5432" font-size="12" font-weight="600">—— 3 步路由: 哈希查表 → 负载过滤 → worker 派发 ——</text>

  <line class="arrow-good" x1="80" y1="135" x2="225" y2="135"/>
  <text class="sub" x="153" y="128">1. Infer(model_id="resnet50", trace_id)</text>

  <line class="arrow" x1="230" y1="160" x2="385" y2="160"/>
  <text class="sub" x="308" y="153">2. route(model_id) → 查哈希表</text>

  <line class="arrow" x1="390" y1="185" x2="235" y2="185"/>
  <text class="sub" x="313" y="178">3. 候选 cards = [card-0, card-3, card-5] (Init 阶段 d 分配)</text>

  <line class="arrow" x1="230" y1="210" x2="545" y2="210"/>
  <text class="sub" x="388" y="203">4. 过滤 unhealthy (查健康监控)</text>

  <line class="arrow" x1="550" y1="235" x2="235" y2="235"/>
  <text class="sub" x="393" y="228">5. 按 QPS+队列 权重 → card-3 (当前负载最低)</text>

  <line class="arrow" x1="230" y1="260" x2="715" y2="260"/>
  <text class="sub" x="473" y="253">6. dispatch(card-3, inputs) → 选 worker</text>

  <line class="arrow" x1="720" y1="285" x2="855" y2="285"/>
  <text class="sub" x="788" y="278">7. aclmdlExecute(model_handle)</text>

  <line class="arrow-good" x1="860" y1="310" x2="725" y2="310"/>
  <text class="sub" x="793" y="303">8. ✓ outputs</text>

  <line class="arrow-good" x1="720" y1="335" x2="85" y2="335"/>
  <text class="sub" x="403" y="328">9. InferResponse(output_data, latency_us=2400, served_by_card_id="card-3")</text>

  <line class="arrow-bad" x1="390" y1="365" x2="85" y2="365" stroke-dasharray="3,2"/>
  <text class="sub" x="238" y="358" fill="#a02020">10. 表里无 model_id → DCARD_MODEL_NOT_FOUND(6)</text>

  <line class="arrow-bad" x1="550" y1="395" x2="85" y2="395" stroke-dasharray="3,2"/>
  <text class="sub" x="318" y="388" fill="#a02020">11. 全部候选卡 unhealthy → DCARD_RESOURCE_BUSY(9)</text>

  <line class="arrow-bad" x1="720" y1="425" x2="85" y2="425" stroke-dasharray="3,2"/>
  <text class="sub" x="403" y="418" fill="#a02020">12. ACL 异常 → DCARD_INFERENCE_FAILED(8) + ReportAlert</text>

  <!-- Bottom notes -->
  <rect class="bar" x="20" y="455" width="860" height="70" rx="3"/>
  <text x="30" y="475" fill="#333" font-size="11" font-weight="600">v3.1 调度器关键点</text>
  <text x="30" y="492" fill="#666" font-size="10">• model_assignment 在 Init 阶段 d 持久化 (内存); O(1) 哈希查询, 不重启</text>
  <text x="30" y="507" fill="#666" font-size="10">• 策略: round_robin / pin_by_model (Init AssignmentStrategy); v3.1 不做 A/B / 蓝绿 / 精细 QPS</text>
  <text x="30" y="520" fill="#666" font-size="10">• 联动健康监控: 过滤 unhealthy; 热拔出时剔除 card_id (FP7 状态感知触发)</text>
</svg>