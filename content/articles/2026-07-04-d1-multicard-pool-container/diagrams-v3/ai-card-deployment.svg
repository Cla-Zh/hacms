<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .box-fill { fill: #eef0f6; stroke: #3a4a6b; stroke-width: 1.5; }
    .box-warn { fill: #fdf6ef; stroke: #a0440c; stroke-width: 1.5; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-ok { stroke: #1a5432; stroke-width: 2; fill: none; marker-end: url(#arr3); }
    .arrow-err { stroke: #a02020; stroke-width: 1.5; fill: none; marker-end: url(#arr4); stroke-dasharray: 3,2; }
    .bar { fill: #fafafa; stroke: #ccc; }
    .accent { fill: #3a4a6b; }
    .accent-text { fill: #fff; font-size: 11px; font-weight: 600; text-anchor: middle; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a5432"/>
    </marker>
    <marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a02020"/>
    </marker>
  </defs>

  <text x="440" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">AI 卡部署 (17) — VM 激活 + 告警事件上报</text>
  <text x="440" y="40" text-anchor="middle" fill="#666" font-size="11">Qemu 启动 VM → 装 Ascend 驱动 + 固件 → NPU 可见 → 在 AI 推理服务注册 → 部署成功 / 上报告警</text>

  <!-- 17.1 VM 激活主流程 -->
  <rect class="box-fill" x="40" y="60" width="500" height="180" rx="4"/>
  <text x="290" y="80" class="label">17.1 VM 激活 (ActivateVM)</text>

  <rect class="box" x="60" y="95" width="120" height="40" rx="3"/>
  <text x="120" y="113" class="label" font-size="11">dctl activate</text>
  <text x="120" y="127" class="sub">--pool=ascend-1</text>

  <rect class="box" x="210" y="95" width="130" height="40" rx="3"/>
  <text x="275" y="113" class="label" font-size="11">Qemu 启动 VM</text>
  <text x="275" y="127" class="sub">libvirt domain create</text>

  <rect class="box" x="370" y="95" width="150" height="40" rx="3"/>
  <text x="445" y="113" class="label" font-size="11">PCIe Passthrough 绑定</text>
  <text x="445" y="127" class="sub">vfio-pci /dev/davinci*</text>

  <rect class="box" x="60" y="160" width="130" height="40" rx="3"/>
  <text x="125" y="178" class="label" font-size="11">VM 内装驱动</text>
  <text x="125" y="192" class="sub">run 包 .run (NPU 驱动)</text>

  <rect class="box" x="220" y="160" width="130" height="40" rx="3"/>
  <text x="285" y="178" class="label" font-size="11">加载固件</text>
  <text x="285" y="192" class="sub">npu-firmware 1.78</text>

  <rect class="box" x="380" y="160" width="140" height="40" rx="3"/>
  <text x="450" y="178" class="label" font-size="11">验证 NPU 可见</text>
  <text x="450" y="192" class="sub">npu-smi info = 8 卡</text>

  <!-- Arrows in 17.1 row -->
  <line class="arrow-ok" x1="180" y1="115" x2="208" y2="115"/>
  <line class="arrow-ok" x1="340" y1="115" x2="368" y2="115"/>
  <line class="arrow" x1="445" y1="135" x2="125" y2="158"/>
  <line class="arrow-ok" x1="190" y1="180" x2="218" y2="180"/>
  <line class="arrow-ok" x1="350" y1="180" x2="378" y2="180"/>

  <!-- 17.2 告警事件上报 -->
  <rect class="box-warn" x="40" y="260" width="800" height="160" rx="4"/>
  <text x="440" y="280" text-anchor="middle" fill="#a0440c" font-size="13" font-weight="600">17.2 部署时告警事件上报 (ReportDeploymentAlert)</text>
  <text x="440" y="295" text-anchor="middle" fill="#666" font-size="10">5 类告警 → 实时上报 HealthService.Watch stream → 触发容器回滚 / K8s event</text>

  <rect class="box" x="60" y="310" width="150" height="50" rx="3"/>
  <text x="135" y="328" class="label" font-size="11" fill="#a02020">DRIVER_INSTALL_FAIL</text>
  <text x="135" y="345" class="sub">驱动 .run 包安装错误</text>
  <text x="135" y="358" class="sub">→ 退出码 ≠ 0</text>

  <rect class="box" x="225" y="310" width="150" height="50" rx="3"/>
  <text x="300" y="328" class="label" font-size="11" fill="#a02020">FIRMWARE_MISMATCH</text>
  <text x="300" y="345" class="sub">固件版本 ≠ 驱动期望</text>
  <text x="300" y="358" class="sub">→ 重刷或升级</text>

  <rect class="box" x="390" y="310" width="150" height="50" rx="3"/>
  <text x="465" y="328" class="label" font-size="11" fill="#a02020">VM_BOOT_FAILED</text>
  <text x="465" y="345" class="sub">libvirt domain create 失败</text>
  <text x="465" y="358" class="sub">→ 检查池配额</text>

  <rect class="box" x="555" y="310" width="150" height="50" rx="3"/>
  <text x="630" y="328" class="label" font-size="11" fill="#a02020">NPU_INVISIBLE</text>
  <text x="630" y="345" class="sub">npu-smi 看到 0 张</text>
  <text x="630" y="358" class="sub">→ PCIe 拓扑错配</text>

  <rect class="box" x="720" y="310" width="110" height="50" rx="3"/>
  <text x="775" y="328" class="label" font-size="11" fill="#a02020">REGISTER_FAIL</text>
  <text x="775" y="345" class="sub">注册到推理服务</text>
  <text x="775" y="358" class="sub">失败</text>

  <rect class="box" x="60" y="375" width="380" height="30" rx="3" fill="#fef4f4"/>
  <text x="250" y="394" text-anchor="middle" fill="#a02020" font-size="11" font-weight="600">→ HealthService.ReportAlert(level=CRITICAL, code, msg)</text>

  <rect class="box" x="460" y="375" width="380" height="30" rx="3" fill="#f0faf4"/>
  <text x="650" y="394" text-anchor="middle" fill="#1a5432" font-size="11" font-weight="600">→ K8s Event (Reason=DeployFailed) + dctl 可见</text>

  <!-- 17.3 成功路径 -->
  <rect x="40" y="440" width="500" height="60" rx="4" fill="#f0faf4" stroke="#1a5432" stroke-width="1.5"/>
  <text x="290" y="460" text-anchor="middle" fill="#1a5432" font-size="12" font-weight="600">成功路径: 所有阶段 OK → 注册到 AI 推理服务 → 报告 ActivateVM OK</text>
  <text x="290" y="478" text-anchor="middle" fill="#666" font-size="10">D-Card Mgr 标记 pool=ascend-1 状态 = ACTIVE · HCCS 拓扑完成</text>
  <text x="290" y="492" text-anchor="middle" fill="#666" font-size="10">InferenceService.Init 自动触发 → 加载 /opt/dcard/models/*.om</text>

  <!-- Arrows from VM 激活 to 告警 box -->
  <line class="arrow-err" x1="125" y1="200" x2="135" y2="310" stroke-dasharray="3,2"/>
  <line class="arrow-err" x1="285" y1="200" x2="300" y2="310" stroke-dasharray="3,2"/>
  <line class="arrow-err" x1="265" y1="135" x2="465" y2="310" stroke-dasharray="3,2"/>
  <line class="arrow-err" x1="450" y1="200" x2="630" y2="310" stroke-dasharray="3,2"/>
  <line class="arrow-err" x1="445" y1="200" x2="775" y2="310" stroke-dasharray="3,2"/>

  <!-- Arrows from 17.1 to success -->
  <line class="arrow-ok" x1="450" y1="200" x2="290" y2="440"/>
  <line class="arrow-ok" x1="290" y1="420" x2="135" y2="375" stroke-dasharray="3,2"/>
  <line class="arrow-ok" x1="290" y1="420" x2="650" y2="375" stroke-dasharray="3,2"/>
</svg>
