<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .label { fill: #333; font-size: 14px; font-weight: 600; }
    .sub { fill: #666; font-size: 11px; }
    .sub-center { fill: #666; font-size: 11px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    .layer { fill: #f5f5f5; stroke: #999; stroke-width: 1; stroke-dasharray: 4,2; }
    .pci-bg { fill: #fafafa; stroke: #999; stroke-width: 1; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="22" text-anchor="middle" class="label" font-size="16">D-Series D1 部署架构 (K8s Node)</text>
  <text x="400" y="40" text-anchor="middle" class="sub">v3.0 Ascend 910B × 8 + CANN 8.0.RC2 Runtime + HCCS 全互联</text>

  <!-- Layer 3: K8s Integration -->
  <rect class="layer" x="30" y="55" width="740" height="92" rx="3"/>
  <text x="40" y="72" class="sub">Layer 3 · K8s Integration</text>
  <rect class="box" x="60" y="82" width="280" height="55" rx="3"/>
  <text x="200" y="104" text-anchor="middle" class="label">K8s Device Plugin</text>
  <text x="200" y="122" text-anchor="middle" class="sub-center">vendor=Ascend · pool=ascend-pool · HCCS 拓扑</text>
  <rect class="box" x="460" y="82" width="280" height="55" rx="3"/>
  <text x="600" y="104" text-anchor="middle" class="label">Container Runtime Shim</text>
  <text x="600" y="122" text-anchor="middle" class="sub-center">注入 cann-init.sh · /dev/davinci*</text>

  <!-- Layer 2: Pool Abstraction -->
  <rect class="layer" x="30" y="160" width="740" height="56" rx="3"/>
  <text x="40" y="177" class="sub">Layer 2 · Pool Abstraction (D1 简化)</text>
  <rect class="box" x="260" y="188" width="280" height="24" rx="3"/>
  <text x="400" y="204" text-anchor="middle" class="label">dctl CLI · (运维)</text>

  <!-- Layer 1: Hardware Abstraction -->
  <rect class="layer" x="30" y="229" width="740" height="92" rx="3"/>
  <text x="40" y="246" class="sub">Layer 1 · Hardware Abstraction</text>
  <rect class="box" x="60" y="256" width="280" height="55" rx="3"/>
  <text x="200" y="278" text-anchor="middle" class="label">D-Card Manager</text>
  <text x="200" y="296" text-anchor="middle" class="sub-center">健康检查 · 池创建 · 故障隔离</text>
  <rect class="box" x="460" y="256" width="280" height="55" rx="3"/>
  <text x="600" y="278" text-anchor="middle" class="label">CANN HAL 8.0.RC2</text>
  <text x="600" y="296" text-anchor="middle" class="sub-center">HCCS 集合通信 · DVPP · AIPP</text>

  <!-- Physical NPUs (bottom) -->
  <rect class="pci-bg" x="30" y="334" width="740" height="106" rx="3"/>
  <text x="400" y="354" text-anchor="middle" class="label">物理 NPU (PCIe Slots 0–7 · 8 × Ascend 910B)</text>
  <g class="sub">
    <text x="92" y="378">Slot 0</text><text x="160" y="378">Slot 1</text>
    <text x="228" y="378">Slot 2</text><text x="296" y="378">Slot 3</text>
    <text x="364" y="378">Slot 4</text><text x="432" y="378">Slot 5</text>
    <text x="500" y="378">Slot 6</text><text x="568" y="378">Slot 7</text>
  </g>
  <!-- HCCS mesh hints -->
  <line x1="100" y1="388" x2="560" y2="388" stroke="#999" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="400" y="402" text-anchor="middle" class="sub">▲ HCCS 100 GB/s 全互联 (Ring + Mesh)</text>

  <!-- Models path (overlay) -->
  <rect class="box" x="60" y="412" width="360" height="22" rx="3" fill="#fff"/>
  <text x="240" y="427" text-anchor="middle" class="sub" fill="#333">/opt/dcard/models/  (mindformers / mmcv / torch_npu)</text>

  <text x="640" y="427" text-anchor="middle" class="sub">1 逻辑 D-Card = 8 物理 910B (1:1 切片)</text>

  <!-- Arrows between layers -->
  <line class="arrow" x1="400" y1="212" x2="400" y2="240"/>
  <line class="arrow" x1="200" y1="311" x2="200" y2="334"/>
  <line class="arrow" x1="600" y1="311" x2="600" y2="334"/>
  <line class="arrow" x1="600" y1="256" x2="600" y2="152" stroke-dasharray="3,2"/>
  <line class="arrow" x1="200" y1="137" x2="200" y2="152" stroke-dasharray="3,2"/>
</svg>
