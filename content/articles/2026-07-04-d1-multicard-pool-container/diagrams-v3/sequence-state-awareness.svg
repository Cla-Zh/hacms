<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-good { stroke: #1a5432; stroke-width: 2; fill: none; marker-end: url(#arr3); }
    .arrow-bad { stroke: #a02020; stroke-width: 1.5; fill: none; marker-end: url(#arr4); stroke-dasharray: 3,2; }
    .bar { fill: #fafafa; stroke: #ccc; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a5432"/>
    </marker>
    <marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a02020"/>
    </marker>
  </defs>

  <text x="450" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">AI 卡状态感知时序 — Qemu 热插拔事件 (15.5 + 16.2 Watch)</text>
  <text x="450" y="40" text-anchor="middle" fill="#666" font-size="11">Qemu/libvirt hot-plug → libvirt 事件回调 → AI 卡状态感知模块 → 注册 / 去注册 + Watch stream 上报</text>

  <!-- Lifelines (6 actors) -->
  <line x1="70" y1="65" x2="70" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="220" y1="65" x2="220" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="370" y1="65" x2="370" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="520" y1="65" x2="520" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="680" y1="65" x2="680" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="830" y1="65" x2="830" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>

  <rect class="box" x="10" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="70" y="73">Qemu/libvirt</text>
  <text class="sub" x="70" y="86" font-size="9">宿主机 hypervisor</text>

  <rect class="box" x="160" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="220" y="73">AI 卡状态感知</text>
  <text class="sub" x="220" y="86" font-size="9">libvirt 事件监听</text>

  <rect class="box" x="310" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="370" y="73">AI 卡使能</text>
  <text class="sub" x="370" y="86" font-size="9">register/unregister</text>

  <rect class="box" x="460" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="520" y="73">AI 推理服务</text>
  <text class="sub" x="520" y="86" font-size="9">vNic :50051</text>

  <rect class="box" x="620" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="680" y="73">HealthService</text>
  <text class="sub" x="680" y="86" font-size="9">Watch stream</text>

  <rect class="box" x="770" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="830" y="73">监控 / dctl</text>
  <text class="sub" x="830" y="86" font-size="9">告警订阅方</text>

  <text x="450" y="115" text-anchor="middle" fill="#1a5432" font-size="12" font-weight="600">—— 状态 1: 新 AI 卡热插 ——</text>

  <line class="arrow-good" x1="70" y1="135" x2="215" y2="135"/>
  <text class="sub" x="143" y="128">1. hot-plug event (device=910B-5)</text>

  <line class="arrow-good" x1="220" y1="155" x2="365" y2="155"/>
  <text class="sub" x="293" y="148">2. onAttach(deviceId)</text>

  <line class="arrow" x1="370" y1="180" x2="515" y2="180"/>
  <text class="sub" x="443" y="173">3. RegisterNpu(device, card-uuid)</text>

  <line class="arrow" x1="520" y1="205" x2="375" y2="205" stroke-dasharray="2,2"/>
  <text class="sub" x="448" y="198">4. registered → ACL bind</text>

  <line class="arrow-good" x1="520" y1="230" x2="675" y2="230"/>
  <text class="sub" x="598" y="223">5. Watch.push(ADDED, card-uuid)</text>

  <line class="arrow-good" x1="680" y1="255" x2="825" y2="255"/>
  <text class="sub" x="753" y="248">6. ✓ k8s event + dctl 可见</text>

  <text x="450" y="295" text-anchor="middle" fill="#a02020" font-size="12" font-weight="600">—— 状态 2: 异常移除 (ECC 不可恢复错误) ——</text>

  <line class="arrow-bad" x1="70" y1="320" x2="215" y2="320"/>
  <text class="sub" x="143" y="313">7. hot-unplug (ECC fatal)</text>

  <line class="arrow-bad" x1="220" y1="345" x2="365" y2="345"/>
  <text class="sub" x="293" y="338">8. onDetach(deviceId)</text>

  <line class="arrow" x1="370" y1="370" x2="515" y2="370"/>
  <text class="sub" x="443" y="363">9. UnregisterNpu(device, reason=ECC_FATAL)</text>

  <line class="arrow-bad" x1="520" y1="395" x2="675" y2="395"/>
  <text class="sub" x="598" y="388">10. Watch.push(REMOVED, level=CRITICAL)</text>

  <line class="arrow-bad" x1="680" y1="420" x2="825" y2="420"/>
  <text class="sub" x="753" y="413">11. ⚠ ReportAlert(CODE=CARD_UNREGISTERED)</text>

  <!-- Bottom notes -->
  <rect class="bar" x="20" y="455" width="860" height="70" rx="3"/>
  <text x="30" y="475" fill="#333" font-size="11" font-weight="600">v3.1 关键点</text>
  <text x="30" y="492" fill="#666" font-size="10">• Qemu 热插拔事件源: QMP (Qemu Machine Protocol) + libvirt domain events (subscribe)</text>
  <text x="30" y="507" fill="#666" font-size="10">• AI 卡状态感知模块订阅两类事件: DEVICE_ATTACHED + DEVICE_DETACHED, 通过 event-loop 异步处理</text>
  <text x="30" y="520" fill="#666" font-size="10">• 与 §16 HealthService.Watch 协同: push 流式, 客户端 (dctl / 监控) 实时收到, 可做自动摘流</text>
</svg>
