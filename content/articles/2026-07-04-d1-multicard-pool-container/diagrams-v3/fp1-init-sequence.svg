<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .box-core { fill: #fff3b0; stroke: #b89000; stroke-width: 1.5; }
    .label { fill: #333; font-size: 12px; font-weight: 600; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-good { stroke: #1a5432; stroke-width: 2; fill: none; marker-end: url(#arr3); }
    .bar { fill: #fafafa; stroke: #ccc; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a5432"/>
    </marker>
  </defs>

  <text x="450" y="20" text-anchor="middle" fill="#333" font-size="16" font-weight="600">FP1 时序: AI 推理服务初始化 (activate.sh 7 阶段 + XML 持久化 + 3 卡)</text>
  <text x="450" y="37" text-anchor="middle" fill="#666" font-size="11">容器/主机启动 → activate.sh → AI 卡使能 (a-g) → state.xml → vNic 监听 → exit 0</text>

  <!-- 8 lifelines -->
  <!-- x positions: 55, 175, 300, 425, 550, 665, 775, 875 -->
  <g stroke="#333" stroke-width="1" stroke-dasharray="4,2">
    <line x1="55" y1="82" x2="55" y2="500"/>
    <line x1="175" y1="82" x2="175" y2="500"/>
    <line x1="300" y1="82" x2="300" y2="500"/>
    <line x1="425" y1="82" x2="425" y2="500"/>
    <line x1="550" y1="82" x2="550" y2="500"/>
    <line x1="665" y1="82" x2="665" y2="500"/>
    <line x1="775" y1="82" x2="775" y2="500"/>
    <line x1="875" y1="82" x2="875" y2="500"/>
  </g>

  <rect class="box" x="8" y="48" width="94" height="34" rx="3"/>
  <text class="label" x="55" y="65" font-size="10">启动触发</text>
  <text class="sub" x="55" y="77" font-size="8">容器/systemd</text>

  <rect class="box-core" x="128" y="48" width="94" height="34" rx="3"/>
  <text class="label" x="175" y="65" font-size="10">activate.sh</text>
  <text class="sub" x="175" y="77" font-size="8">启动脚本</text>

  <rect class="box" x="253" y="48" width="94" height="34" rx="3"/>
  <text class="label" x="300" y="65" font-size="10">AI 推理服务</text>
  <text class="sub" x="300" y="77" font-size="8">ai-inference-service</text>

  <rect class="box" x="378" y="48" width="94" height="34" rx="3"/>
  <text class="label" x="425" y="65" font-size="10">AI 卡使能</text>
  <text class="sub" x="425" y="77" font-size="8">a-g 阶段</text>

  <rect class="box" x="503" y="48" width="94" height="34" rx="3"/>
  <text class="label" x="550" y="65" font-size="10">state.xml</text>
  <text class="sub" x="550" y="77" font-size="8">XML 持久化</text>

  <rect class="box" x="620" y="48" width="90" height="34" rx="3"/>
  <text class="label" x="665" y="65" font-size="10">ACL 内存</text>
  <text class="sub" x="665" y="77" font-size="8">acl 队列</text>

  <rect class="box" x="732" y="48" width="86" height="34" rx="3"/>
  <text class="label" x="775" y="65" font-size="10">vNic</text>
  <text class="sub" x="775" y="77" font-size="8">:50051/:50053</text>

  <rect class="box" x="835" y="48" width="60" height="34" rx="3"/>
  <text class="label" x="875" y="65" font-size="10">NPU</text>
  <text class="sub" x="875" y="77" font-size="8">3 卡</text>

  <!-- Steps -->
  <line class="arrow-good" x1="55" y1="108" x2="170" y2="108"/>
  <text class="sub" x="112" y="102" text-anchor="middle">1. 启动, 调用 activate.sh</text>

  <line class="arrow" x1="175" y1="130" x2="175" y2="130"/>
  <line class="arrow" x1="175" y1="128" x2="870" y2="128"/>
  <text class="sub" x="500" y="122" text-anchor="middle">2. modprobe drv_pcie_ascend (加载驱动)</text>

  <line class="arrow" x1="175" y1="150" x2="870" y2="150"/>
  <text class="sub" x="500" y="144" text-anchor="middle">3. 扫描 3 张 NPU (npu-smi info -l)</text>

  <line class="arrow" x1="175" y1="172" x2="295" y2="172"/>
  <text class="sub" x="235" y="166" text-anchor="middle">4. 调 /usr/local/dcard/bin/ai-inference-service</text>

  <line class="arrow" x1="300" y1="194" x2="420" y2="194"/>
  <text class="sub" x="360" y="188" text-anchor="middle">5. (a) aclInit + hcclInit</text>

  <line class="arrow" x1="425" y1="216" x2="870" y2="216"/>
  <text class="sub" x="600" y="210" text-anchor="middle">6. (b) 扫描本控 3 NPU, 加 deviceid 0/1/2</text>

  <line class="arrow" x1="425" y1="238" x2="545" y2="238"/>
  <text class="sub" x="485" y="232" text-anchor="middle">7. (c) 读 state.xml (旧 NPU 状态)</text>

  <line class="arrow-good" x1="425" y1="260" x2="545" y2="260"/>
  <text class="sub" x="485" y="254" text-anchor="middle">8. (c) 写 state.xml (新 NPU 状态)</text>

  <line class="arrow" x1="425" y1="282" x2="660" y2="282"/>
  <text class="sub" x="540" y="276" text-anchor="middle">9. (d) 初始化 per-model 推理队列</text>

  <line class="arrow" x1="425" y1="304" x2="660" y2="304"/>
  <text class="sub" x="540" y="298" text-anchor="middle">10. (e) ACL 内存分配 32GB (per-model 8GB)</text>

  <line class="arrow" x1="425" y1="326" x2="870" y2="326"/>
  <text class="sub" x="620" y="320" text-anchor="middle">11. (f) 加载 3 模型 (resnet50 / bert-base / llama-7b)</text>

  <line class="arrow" x1="425" y1="348" x2="770" y2="348"/>
  <text class="sub" x="595" y="342" text-anchor="middle">12. (g) 启动 vNic 监听 (:50051 业务 / :50053 管理)</text>

  <line class="arrow-good" x1="425" y1="370" x2="305" y2="370"/>
  <text class="sub" x="365" y="364" text-anchor="middle">13. AI 推理服务 启动 OK</text>

  <line class="arrow" x1="300" y1="392" x2="180" y2="392"/>
  <text class="sub" x="240" y="386" text-anchor="middle">14. activate.sh 验证 PID alive</text>

  <line class="arrow-good" x1="175" y1="414" x2="60" y2="414"/>
  <text class="sub" x="118" y="408" text-anchor="middle">15. activate.sh exit 0</text>

  <!-- Bottom notes -->
  <rect class="bar" x="20" y="440" width="860" height="80" rx="3"/>
  <text x="30" y="460" fill="#333" font-size="11" font-weight="600">v3.2 Init 关键点</text>
  <text x="30" y="477" fill="#666" font-size="10">• 启动脚本 /etc/d1/activate.sh 编排 7 阶段 a-g; 每阶段结果写入 state.xml, 崩溃可恢复</text>
  <text x="30" y="493" fill="#666" font-size="10">• XML 持久化 /var/lib/d1/state.xml: NPU 状态 + 3 模型 + ACL 内存 (32GB) + per-model 队列</text>
  <text x="30" y="509" fill="#666" font-size="10">• 3 卡 (deviceid 0/1/2), vNic 双面 :50051 业务 + :50053 管理; activate.sh exit 0 = 就绪</text>
</svg>
