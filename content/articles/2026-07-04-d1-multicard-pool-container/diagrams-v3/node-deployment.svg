<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="sans-serif" font-size="13" fill="#222">
  <defs>
    <marker id="arrow-3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>
  <rect width="900" height="540" fill="#fff"/>
  <text x="20" y="22" font-size="15" font-weight="700">部署图: 4 节点 × 3 AI 卡 (12 卡同构, 负载均衡 + 故障倒换)</text>
  <text x="20" y="40" font-size="11" fill="#666">v3.2 新增 — §25.1 — max 16 节点, 4 节点举例; 每节点 1-3 AI 卡, 同模型, 不同副本</text>

  <!-- 节点 N1 -->
  <rect x="60" y="80" width="180" height="180" fill="#fafafa" stroke="#333" stroke-width="1.5"/>
  <text x="150" y="100" text-anchor="middle" font-size="13" font-weight="700">Node-1 (Active)</text>
  <text x="150" y="115" text-anchor="middle" font-size="10" fill="#666">192.168.10.1</text>

  <rect x="75" y="125" width="150" height="32" fill="#fff" stroke="#333" stroke-width="1"/>
  <text x="150" y="138" text-anchor="middle" font-size="11" font-weight="700">AI 推理服务</text>
  <text x="150" y="151" text-anchor="middle" font-size="9" fill="#666">:50051 业务 / :50053 管理</text>

  <rect x="75" y="165" width="45" height="36" fill="#fff3b0" stroke="#333" stroke-width="1"/>
  <text x="97" y="180" text-anchor="middle" font-size="10" font-weight="700">AI卡-0</text>
  <text x="97" y="193" text-anchor="middle" font-size="9">resnet50</text>
  <rect x="127" y="165" width="45" height="36" fill="#fff3b0" stroke="#333" stroke-width="1"/>
  <text x="149" y="180" text-anchor="middle" font-size="10" font-weight="700">AI卡-1</text>
  <text x="149" y="193" text-anchor="middle" font-size="9">bert-base</text>
  <rect x="179" y="165" width="45" height="36" fill="#fff3b0" stroke="#333" stroke-width="1"/>
  <text x="201" y="180" text-anchor="middle" font-size="10" font-weight="700">AI卡-2</text>
  <text x="201" y="193" text-anchor="middle" font-size="9">llama-7b</text>

  <rect x="75" y="210" width="150" height="40" fill="#e7f4e7" stroke="#2d7a2d" stroke-width="1"/>
  <text x="150" y="225" text-anchor="middle" font-size="10" font-weight="700" fill="#2d7a2d">PeerDiscovery</text>
  <text x="150" y="238" text-anchor="middle" font-size="9" fill="#666">etcd: /d1/peers/N1</text>

  <!-- 节点 N2 -->
  <rect x="280" y="80" width="180" height="180" fill="#fafafa" stroke="#333" stroke-width="1.5"/>
  <text x="370" y="100" text-anchor="middle" font-size="13" font-weight="700">Node-2 (Active)</text>
  <text x="370" y="115" text-anchor="middle" font-size="10" fill="#666">192.168.10.2</text>

  <rect x="295" y="125" width="150" height="32" fill="#fff" stroke="#333" stroke-width="1"/>
  <text x="370" y="138" text-anchor="middle" font-size="11" font-weight="700">AI 推理服务</text>
  <text x="370" y="151" text-anchor="middle" font-size="9" fill="#666">:50051 业务 / :50053 管理</text>

  <rect x="295" y="165" width="45" height="36" fill="#fff3b0" stroke="#333" stroke-width="1"/>
  <text x="317" y="180" text-anchor="middle" font-size="10" font-weight="700">AI卡-0</text>
  <text x="317" y="193" text-anchor="middle" font-size="9">resnet50</text>
  <rect x="347" y="165" width="45" height="36" fill="#fff3b0" stroke="#333" stroke-width="1"/>
  <text x="369" y="180" text-anchor="middle" font-size="10" font-weight="700">AI卡-1</text>
  <text x="369" y="193" text-anchor="middle" font-size="9">bert-base</text>
  <rect x="399" y="165" width="45" height="36" fill="#fff3b0" stroke="#333" stroke-width="1"/>
  <text x="421" y="180" text-anchor="middle" font-size="10" font-weight="700">AI卡-2</text>
  <text x="421" y="193" text-anchor="middle" font-size="9">llama-7b</text>

  <rect x="295" y="210" width="150" height="40" fill="#e7f4e7" stroke="#2d7a2d" stroke-width="1"/>
  <text x="370" y="225" text-anchor="middle" font-size="10" font-weight="700" fill="#2d7a2d">PeerDiscovery</text>
  <text x="370" y="238" text-anchor="middle" font-size="9" fill="#666">etcd: /d1/peers/N2</text>

  <!-- 节点 N3 (DEGRADED: 1 卡故障) -->
  <rect x="500" y="80" width="180" height="180" fill="#fafafa" stroke="#b07020" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="590" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#a07020">Node-3 (Degraded)</text>
  <text x="590" y="115" text-anchor="middle" font-size="10" fill="#a07020">192.168.10.3</text>

  <rect x="515" y="125" width="150" height="32" fill="#fff" stroke="#333" stroke-width="1"/>
  <text x="590" y="138" text-anchor="middle" font-size="11" font-weight="700">AI 推理服务</text>
  <text x="590" y="151" text-anchor="middle" font-size="9" fill="#666">:50051 业务 / :50053 管理</text>

  <rect x="515" y="165" width="45" height="36" fill="#fae0e0" stroke="#b03030" stroke-width="1"/>
  <text x="537" y="180" text-anchor="middle" font-size="10" font-weight="700" fill="#b03030">AI卡-0 ✗</text>
  <text x="537" y="193" text-anchor="middle" font-size="9" fill="#b03030">FAIL</text>
  <rect x="567" y="165" width="45" height="36" fill="#fff3b0" stroke="#333" stroke-width="1"/>
  <text x="589" y="180" text-anchor="middle" font-size="10" font-weight="700">AI卡-1</text>
  <text x="589" y="193" text-anchor="middle" font-size="9">bert-base</text>
  <rect x="619" y="165" width="45" height="36" fill="#fff3b0" stroke="#333" stroke-width="1"/>
  <text x="641" y="180" text-anchor="middle" font-size="10" font-weight="700">AI卡-2</text>
  <text x="641" y="193" text-anchor="middle" font-size="9">llama-7b</text>

  <rect x="515" y="210" width="150" height="40" fill="#fff3b0" stroke="#a07020" stroke-width="1"/>
  <text x="590" y="225" text-anchor="middle" font-size="10" font-weight="700" fill="#a07020">本地负载均衡</text>
  <text x="590" y="238" text-anchor="middle" font-size="9" fill="#a07020">3→2 卡, resnet50 失败</text>

  <!-- 节点 N4 (FAILED: 整节点故障) -->
  <rect x="720" y="80" width="160" height="180" fill="#fae0e0" stroke="#b03030" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="800" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#b03030">Node-4 (Failed)</text>
  <text x="800" y="115" text-anchor="middle" font-size="10" fill="#b03030">192.168.10.4 ✗</text>

  <rect x="735" y="125" width="130" height="32" fill="#fae0e0" stroke="#b03030" stroke-width="1"/>
  <text x="800" y="138" text-anchor="middle" font-size="11" font-weight="700" fill="#b03030">AI 推理服务 OFFLINE</text>
  <text x="800" y="151" text-anchor="middle" font-size="9" fill="#b03030">DOWN</text>

  <rect x="735" y="165" width="40" height="36" fill="#fae0e0" stroke="#b03030" stroke-width="1"/>
  <text x="755" y="180" text-anchor="middle" font-size="10" font-weight="700" fill="#b03030">✗</text>
  <text x="755" y="193" text-anchor="middle" font-size="9" fill="#b03030">FAIL</text>
  <rect x="781" y="165" width="40" height="36" fill="#fae0e0" stroke="#b03030" stroke-width="1"/>
  <text x="801" y="180" text-anchor="middle" font-size="10" font-weight="700" fill="#b03030">✗</text>
  <text x="801" y="193" text-anchor="middle" font-size="9" fill="#b03030">FAIL</text>
  <rect x="827" y="165" width="40" height="36" fill="#fae0e0" stroke="#b03030" stroke-width="1"/>
  <text x="847" y="180" text-anchor="middle" font-size="10" font-weight="700" fill="#b03030">✗</text>
  <text x="847" y="193" text-anchor="middle" font-size="9" fill="#b03030">FAIL</text>

  <rect x="735" y="210" width="130" height="40" fill="#fae0e0" stroke="#b03030" stroke-width="1"/>
  <text x="800" y="225" text-anchor="middle" font-size="10" font-weight="700" fill="#b03030">不参与路由</text>
  <text x="800" y="238" text-anchor="middle" font-size="9" fill="#b03030">10s 内未恢复</text>

  <!-- etcd 中枢 -->
  <rect x="280" y="310" width="380" height="80" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="470" y="330" text-anchor="middle" font-size="13" font-weight="700">etcd 集群 (Peer Registry + Health Watch)</text>
  <text x="470" y="350" text-anchor="middle" font-size="10">/d1/peers/N{1..16} → {ip, vnic_urls, card_status[], health_score, last_heartbeat}</text>
  <text x="470" y="365" text-anchor="middle" font-size="10">Watch 事件: NODE_UP / NODE_DOWN / CARD_FAIL / MODEL_UNLOAD</text>
  <text x="470" y="380" text-anchor="middle" font-size="10">TTL=10s (3 次心跳丢失 → 标记 OFFLINE)</text>

  <!-- 节点 → etcd 心跳 -->
  <line x1="150" y1="250" x2="350" y2="310" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="370" y1="250" x2="400" y2="310" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="590" y1="250" x2="500" y2="310" stroke="#b07020" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="800" y1="250" x2="540" y2="310" stroke="#b03030" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="230" y="285" font-size="9" fill="#666">心跳 1s</text>
  <text x="450" y="285" font-size="9" fill="#a07020">DEGRADED</text>
  <text x="600" y="285" font-size="9" fill="#b03030">DOWN 12s</text>

  <!-- etcd → 节点重定向 -->
  <line x1="500" y1="390" x2="180" y2="260" stroke="#2d7a2d" stroke-width="1.2" marker-end="url(#arrow-3)"/>
  <line x1="540" y1="390" x2="380" y2="260" stroke="#2d7a2d" stroke-width="1.2" marker-end="url(#arrow-3)"/>
  <text x="330" y="410" font-size="10" fill="#2d7a2d" font-weight="700">PeerHealthPoller (5s 轮询, 选 health_score 最高的 active 节点)</text>
  <text x="330" y="425" font-size="9" fill="#2d7a2d">故障节点 N4 的请求 → 重定向到 N1/N2 (InferenceRedirect)</text>

  <!-- 客户端层 -->
  <rect x="60" y="430" width="800" height="80" fill="#f0f4ff" stroke="#3a4a6b" stroke-width="1.2"/>
  <text x="460" y="450" text-anchor="middle" font-size="13" font-weight="700">客户端 (anti-ransom / dctl / monitoring) — 通过 Node Selector 选节点</text>
  <text x="460" y="470" text-anchor="middle" font-size="10">策略: (1) 本节点优先 (亲和); (2) 跨节点 round-robin; (3) 故障节点从 selector 中剔除 (10s TTL)</text>
  <text x="460" y="485" text-anchor="middle" font-size="10">健康评分 = 0.4 × liveness + 0.3 × readiness + 0.2 × model_loaded + 0.1 × card_count (动态加权)</text>
  <text x="460" y="500" text-anchor="middle" font-size="9" fill="#666">单节点故障: 本控负载均衡 (3→2 张卡, 推理性能下降 33% 但 SLA 仍满足); 整节点故障: 跨节点重定向 (N4 → N1/N2)</text>
</svg>
