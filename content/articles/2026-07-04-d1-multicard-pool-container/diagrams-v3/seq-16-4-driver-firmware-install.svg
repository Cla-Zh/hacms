<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .box-fill { fill: #eef0f6; stroke: #3a4a6b; stroke-width: 1.5; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-dash { stroke: #666; stroke-width: 1.2; fill: none; marker-end: url(#arr2); stroke-dasharray: 3,2; }
    .bar { fill: #fafafa; stroke: #ccc; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>
  <text x="450" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">§16.4 虚拟机拉起驱动固件安装 (EulerOS Hook)</text>
  <text x="450" y="40" text-anchor="middle" fill="#666" font-size="11">eulerOS 启动 + cloud-init + .run 安装 + firmware 加载 + npu-smi 验证</text>

  <line x1="80" y1="65" x2="80" y2="520" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="220" y1="65" x2="220" y2="520" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="360" y1="65" x2="360" y2="520" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="500" y1="65" x2="500" y2="520" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="640" y1="65" x2="640" y2="520" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="800" y1="65" x2="800" y2="520" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>

  <rect class="box" x="20" y="50" width="120" height="40" rx="3"/><text class="label" x="80" y="73">libvirt</text><text class="sub" x="80" y="86" font-size="9">qemu VM</text>
  <rect class="box" x="170" y="50" width="100" height="40" rx="3"/><text class="label" x="220" y="73">cloud-init</text><text class="sub" x="220" y="86" font-size="9">user-data</text>
  <rect class="box" x="310" y="50" width="100" height="40" rx="3"/><text class="label" x="360" y="73">eulerOS</text><text class="sub" x="360" y="86" font-size="9">VM 内核</text>
  <rect class="box" x="450" y="50" width="100" height="40" rx="3"/><text class="label" x="500" y="73">.run 安装</text><text class="sub" x="500" y="86" font-size="9">driver + fw</text>
  <rect class="box" x="590" y="50" width="100" height="40" rx="3"/><text class="label" x="640" y="73">canld</text><text class="sub" x="640" y="86" font-size="9">CANN daemon</text>
  <rect class="box" x="740" y="50" width="120" height="40" rx="3"/><text class="label" x="800" y="73">DeployService</text><text class="sub" x="800" y="86" font-size="9">:50054</text>

  <text x="450" y="115" text-anchor="middle" fill="#3a4a6b" font-size="12" font-weight="600">— eulerOS 启动 → cloud-init 触发 —</text>
  <line class="arrow" x1="80" y1="140" x2="215" y2="140"/><text class="sub" x="147" y="133">1. qemu boot (§16.1.D 阶段)</text>
  <line class="arrow" x1="220" y1="160" x2="355" y2="160"/><text class="sub" x="287" y="153">2. cloud-init read user-data</text>
  <line class="arrow" x1="360" y1="180" x2="215" y2="180"/><text class="sub" x="287" y="173">3. mount /dev/vdb (ISO with .run)</text>

  <text x="450" y="210" text-anchor="middle" fill="#3a4a6b" font-size="12" font-weight="600">— systemd runcmd 触发安装脚本 —</text>
  <line class="arrow" x1="220" y1="235" x2="355" y2="235"/><text class="sub" x="287" y="228">4. runcmd: /etc/d1/install.sh</text>
  <line class="arrow" x1="360" y1="255" x2="495" y2="255"/><text class="sub" x="427" y="248">5. ./Ascend-hdk-npu-8.0.RC2.run</text>
  <line class="arrow-dash" x1="500" y1="275" x2="365" y2="275"/><text class="sub" x="427" y="268" fill="#1a5432">6. driver install OK (exit=0)</text>
  <line class="arrow" x1="360" y1="295" x2="495" y2="295"/><text class="sub" x="427" y="288">7. ./Ascend-firmware-1.78.run</text>
  <line class="arrow-dash" x1="500" y1="315" x2="365" y2="315"/><text class="sub" x="427" y="308" fill="#1a5432">8. firmware load OK (version match)</text>

  <text x="450" y="345" text-anchor="middle" fill="#3a4a6b" font-size="12" font-weight="600">— 拉起 canld → npu-smi 验证 —</text>
  <line class="arrow" x1="360" y1="370" x2="635" y2="370"/><text class="sub" x="497" y="363">9. systemctl start canld</text>
  <line class="arrow" x1="640" y1="390" x2="360" y2="390"/><text class="sub" x="497" y="383">10. npu-smi info -l</text>
  <line class="arrow-dash" x1="365" y1="410" x2="640" y2="410"/><text class="sub" x="497" y="403" fill="#1a5432">11. NPU 0/1/2 healthy ✓</text>

  <line class="arrow" x1="640" y1="440" x2="795" y2="440"/><text class="sub" x="717" y="433">12. ReportStatus(NPU ready)</text>
  <line class="arrow-dash" x1="800" y1="460" x2="645" y2="460"/><text class="sub" x="717" y="453" fill="#1a5432">13. ACK</text>

  <rect class="bar" x="20" y="530" width="860" height="40" rx="3"/>
  <text x="30" y="547" fill="#333" font-size="11" font-weight="600">§16.4 关键设计:</text>
  <text x="30" y="563" fill="#666" font-size="10">eulerOS 启动 → cloud-init mount ISO → systemd runcmd 触发 /etc/d1/install.sh. .run 包内置校验 (kernel headers + 签名), 失败立即 stop. firmware 版本与 driver 必须从 §16.3 兼容矩阵对齐, 否则 §18 FIRMWARE_MISMATCH 告警.</text>
</svg>