<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" style="background: white; font-family: -apple-system, sans-serif;">
  <!-- D1 推理服务 Request/Response Body Schema 可视化 -->
  <!-- 黑白灰 + 蓝强调 (#3a4a6b) -->

  <defs>
    <style>
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .subtitle { font-size: 12px; fill: #5a5a5a; }
      .field-name { font-size: 11px; font-weight: 600; fill: #1a1a1a; }
      .field-type { font-size: 10px; fill: #3a4a6b; font-family: monospace; }
      .field-desc { font-size: 9px; fill: #5a5a5a; }
      .required { font-size: 9px; font-weight: 700; fill: #c7000b; }
      .box-blue { fill: #3a4a6b; stroke: #2c3a54; stroke-width: 1.5; }
      .box-white { fill: white; stroke: #3a4a6b; stroke-width: 1.5; }
      .box-gray { fill: #f0f0f0; stroke: #5a5a5a; stroke-width: 1; }
      .box-success { fill: #d4edda; stroke: #155724; stroke-width: 1.5; }
      .box-error { fill: #f8d7da; stroke: #721c24; stroke-width: 1.5; }
      .text-on-blue { fill: white; font-size: 12px; font-weight: 600; }
      .section-title { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <!-- 标题 -->
  <text x="450" y="25" text-anchor="middle" class="title">D1 推理服务 Request / Response Body Schema (v3.2)</text>
  <text x="450" y="45" text-anchor="middle" class="subtitle">POST /v1/inference — JSON Schema 严格定义, gRPC-Gateway 翻译</text>

  <!-- ============================ 左侧: Request Body ============================ -->
  <text x="225" y="70" text-anchor="middle" class="section-title">📥 Request Body (JSON)</text>

  <!-- Request 整体框 -->
  <rect x="40" y="80" width="370" height="380" rx="6" class="box-blue" />
  <text x="225" y="100" text-anchor="middle" class="text-on-blue">InferenceRequest { ... }</text>

  <!-- 字段: model_id (required) -->
  <rect x="55" y="115" width="340" height="50" rx="4" class="box-white" />
  <text x="65" y="130" class="field-name">model_id <tspan class="required">[REQUIRED]</tspan></text>
  <text x="65" y="145" class="field-type">string</text>
  <text x="65" y="160" class="field-desc">模型短名, e.g. "resnet50" / "llama-7b" / "bert-base"</text>

  <!-- 字段: inputs (required) -->
  <rect x="55" y="170" width="340" height="80" rx="4" class="box-white" />
  <text x="65" y="185" class="field-name">inputs <tspan class="required">[REQUIRED]</tspan></text>
  <text x="65" y="200" class="field-type">object (oneOf: image | text | audio)</text>
  <text x="65" y="215" class="field-desc">├─ image_url: "https://..." (CV)</text>
  <text x="65" y="228" class="field-desc">├─ image_base64: "..." (CV base64)</text>
  <text x="65" y="241" class="field-desc">├─ text: "..." (NLP)</text>
  <text x="65" y="252" class="field-desc">└─ audio_base64: "..." (ASR)</text>

  <!-- 字段: parameters (optional) -->
  <rect x="55" y="255" width="340" height="115" rx="4" class="box-white" />
  <text x="65" y="270" class="field-name">parameters <tspan style="fill: #5a5a5a;">[OPTIONAL]</tspan></text>
  <text x="65" y="285" class="field-type">object (5 fields)</text>
  <text x="65" y="300" class="field-desc">├─ top_k: integer, default 5, range 1-100</text>
  <text x="65" y="313" class="field-desc">├─ temperature: number, default 1.0, range 0-2</text>
  <text x="65" y="326" class="field-desc">├─ max_tokens: integer, default 1024</text>
  <text x="65" y="339" class="field-desc">├─ device_preference: "auto" | "npu:0" | "npu:1" | "npu:2"</text>
  <text x="65" y="352" class="field-desc">└─ precision: "fp16" | "bf16" | "int8"</text>
  <text x="65" y="365" class="field-desc" style="font-style: italic;">device_preference="auto" 走多卡管理子模块动态分配</text>

  <!-- 字段: callback_url (optional) -->
  <rect x="55" y="375" width="340" height="35" rx="4" class="box-white" />
  <text x="65" y="390" class="field-name">callback_url <tspan style="fill: #5a5a5a;">[OPTIONAL]</tspan></text>
  <text x="65" y="403" class="field-type">string (URI format)</text>

  <!-- 箭头 (Request → 客户端到 vNic) -->
  <text x="225" y="478" text-anchor="middle" class="field-desc">↑ POST http://vnic0:50051/v1/inference ↑</text>
  <text x="225" y="492" text-anchor="middle" class="field-desc" style="font-style: italic;">HTTP/JSON over gRPC-Gateway</text>

  <!-- 头部 -->
  <text x="225" y="510" text-anchor="middle" class="field-desc">Content-Type: application/json | Authorization: Bearer d1-token-abc123</text>
  <text x="225" y="525" text-anchor="middle" class="field-desc" style="font-style: italic;">X-Request-ID: &lt;uuid&gt; (可选, 客户端追踪)</text>

  <!-- ============================ 中间: 转换箭头 ============================ -->
  <g transform="translate(450, 270)">
    <rect x="-30" y="-30" width="60" height="60" rx="30" fill="#3a4a6b" />
    <text x="0" y="0" text-anchor="middle" class="text-on-blue" style="font-size: 24px;">⇄</text>
    <text x="0" y="50" text-anchor="middle" class="field-desc">JSON ↔ Protobuf</text>
    <text x="0" y="63" text-anchor="middle" class="field-desc">envoy</text>
    <text x="0" y="76" text-anchor="middle" class="field-desc">gRPC-Gateway</text>
  </g>

  <!-- ============================ 右侧: Response Body ============================ -->
  <text x="675" y="70" text-anchor="middle" class="section-title">📤 Response Body (JSON, HTTP 200)</text>

  <!-- Response 整体框 -->
  <rect x="490" y="80" width="370" height="380" rx="6" class="box-success" />
  <text x="675" y="100" text-anchor="middle" class="section-title" style="fill: #155724;">InferenceResponse { ... }</text>

  <!-- 字段: request_id (required) -->
  <rect x="505" y="115" width="340" height="50" rx="4" class="box-white" />
  <text x="515" y="130" class="field-name">request_id <tspan class="required">[REQUIRED]</tspan></text>
  <text x="515" y="145" class="field-type">string (UUID format)</text>
  <text x="515" y="160" class="field-desc">服务端生成, 关联 X-Request-ID, 用于日志追踪</text>

  <!-- 字段: model_id (required) -->
  <rect x="505" y="170" width="340" height="40" rx="4" class="box-white" />
  <text x="515" y="185" class="field-name">model_id <tspan class="required">[REQUIRED]</tspan></text>
  <text x="515" y="200" class="field-desc">回显请求中的 model_id</text>

  <!-- 字段: outputs (required) -->
  <rect x="505" y="215" width="340" height="80" rx="4" class="box-white" />
  <text x="515" y="230" class="field-name">outputs <tspan class="required">[REQUIRED]</tspan></text>
  <text x="515" y="245" class="field-type">object (按模型类型)</text>
  <text x="515" y="260" class="field-desc">├─ predictions: [{label, score}] (CV 分类)</text>
  <text x="515" y="273" class="field-desc">├─ text: "..." (NLP 生成)</text>
  <text x="515" y="286" class="field-desc">├─ image_base64: "..." (图像生成)</text>

  <!-- 字段: metadata (required) -->
  <rect x="505" y="300" width="340" height="125" rx="4" class="box-white" />
  <text x="515" y="315" class="field-name">metadata <tspan class="required">[REQUIRED]</tspan></text>
  <text x="515" y="330" class="field-type">object (6 fields)</text>
  <text x="515" y="345" class="field-desc">├─ device: "Ascend 910B NPU:0/1/2"</text>
  <text x="515" y="358" class="field-desc">├─ latency_ms: 23 (端到端)</text>
  <text x="515" y="371" class="field-desc">├─ queue_time_ms: 2 (排队)</text>
  <text x="515" y="384" class="field-desc">├─ compute_time_ms: 21 (纯计算)</text>
  <text x="515" y="397" class="field-desc">├─ tokens_generated: 128 (NLP)</text>
  <text x="515" y="410" class="field-desc">└─ model_version: "resnet50-1.0.0"</text>
  <text x="515" y="422" class="field-desc" style="font-style: italic;">端到端 = queue + compute + 后处理</text>

  <!-- 错误响应 -->
  <text x="675" y="478" text-anchor="middle" class="field-desc">↓ HTTP 4xx/5xx 错误响应 (16 类错误码) ↓</text>
  <rect x="510" y="485" width="330" height="35" rx="4" class="box-error" />
  <text x="675" y="500" text-anchor="middle" class="field-name" style="fill: #721c24;">{ "error": { "code": "INFERENCE_TIMEOUT",</text>
  <text x="675" y="515" text-anchor="middle" class="field-desc" style="fill: #721c24;">"message": "推理超时 (>30s)", "retry_after_ms": 1000 } }</text>
</svg>
