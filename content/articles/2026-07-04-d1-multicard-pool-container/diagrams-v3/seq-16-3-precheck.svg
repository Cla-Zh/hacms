<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .box-fill { fill: #eef0f6; stroke: #3a4a6b; stroke-width: 1.5; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-dash { stroke: #666; stroke-width: 1.2; fill: none; marker-end: url(#arr2); stroke-dasharray: 3,2; }
    .bar { fill: #fafafa; stroke: #ccc; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>
  <text x="450" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">§16.3 AI 卡激活前检查 (资源/版本/拓扑 6 维度)</text>
  <text x="450" y="40" text-anchor="middle" fill="#666" font-size="11">激活前置 · 资源 2 + 版本 2 + 拓扑 1 + 依赖 1 = 6 类检查</text>

  <line x1="80" y1="65" x2="80" y2="500" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="240" y1="65" x2="240" y2="500" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="400" y1="65" x2="400" y2="500" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="560" y1="65" x2="560" y2="500" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="720" y1="65" x2="720" y2="500" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>

  <rect class="box" x="20" y="50" width="120" height="40" rx="3"/><text class="label" x="80" y="73">dctl / K8s</text><text class="sub" x="80" y="86" font-size="9">触发方</text>
  <rect class="box" x="180" y="50" width="120" height="40" rx="3"/><text class="label" x="240" y="73">PreCheck Svc</text><text class="sub" x="240" y="86" font-size="9">gRPC :50055</text>
  <rect class="box" x="340" y="50" width="120" height="40" rx="3"/><text class="label" x="400" y="73">节点 / Pool</text><text class="sub" x="400" y="86" font-size="9">资源池</text>
  <rect class="box" x="500" y="50" width="120" height="40" rx="3"/><text class="label" x="560" y="73">版本仓库</text><text class="sub" x="560" y="86" font-size="9">driver/cann/fw</text>
  <rect class="box" x="670" y="50" width="100" height="40" rx="3"/><text class="label" x="720" y="73">HealthService</text><text class="sub" x="720" y="86" font-size="9">:50052</text>

  <text x="450" y="115" text-anchor="middle" fill="#3a4a6b" font-size="12" font-weight="600">— 资源 2 检查 (CPU/内存 + PCIe 拓扑) —</text>
  <line class="arrow" x1="80" y1="140" x2="235" y2="140"/><text class="sub" x="157" y="133">1. PreCheck(pool=ascend-1, card=1)</text>
  <line class="arrow" x1="240" y1="160" x2="395" y2="160"/><text class="sub" x="317" y="153">2. qry node CPU/mem free</text>
  <line class="arrow-dash" x1="400" y1="180" x2="245" y2="180"/><text class="sub" x="317" y="173" fill="#1a5432">3. node1: 32C/64G free ✓</text>
  <line class="arrow" x1="240" y1="200" x2="395" y2="200"/><text class="sub" x="317" y="193">4. lspci -tv | grep -i ascend</text>
  <line class="arrow-dash" x1="400" y1="220" x2="245" y2="220"/><text class="sub" x="317" y="213" fill="#1a5432">5. Ascend 910B x3 @ 0000:01:00.0 ✓</text>

  <text x="450" y="250" text-anchor="middle" fill="#3a4a6b" font-size="12" font-weight="600">— 版本 2 检查 (driver/firmware 兼容矩阵) —</text>
  <line class="arrow" x1="240" y1="275" x2="555" y2="275"/><text class="sub" x="397" y="268">6. GET /repo/versions?target=ascend-910b</text>
  <line class="arrow-dash" x1="560" y1="295" x2="245" y2="295"/><text class="sub" x="397" y="288" fill="#1a5432">7. driver=8.0.RC2 ↔ fw=1.78 ↔ cann=8.0.RC2 ✓</text>

  <text x="450" y="325" text-anchor="middle" fill="#3a4a6b" font-size="12" font-weight="600">— 拓扑 1 + 依赖 1 检查 (HCCS 拓扑 + 现有 AI 卡健康) —</text>
  <line class="arrow" x1="240" y1="350" x2="555" y2="350"/><text class="sub" x="397" y="343">8. GET /topology?pool=ascend-1</text>
  <line class="arrow-dash" x1="560" y1="370" x2="245" y2="370"/><text class="sub" x="397" y="363" fill="#1a5432">9. HCCS ring OK, 3 NPU / ctrl ✓</text>
  <line class="arrow" x1="240" y1="395" x2="715" y2="395"/><text class="sub" x="477" y="388">10. Check(scope=CARD, ALL) (§16.1.A)</text>
  <line class="arrow-dash" x1="720" y1="415" x2="245" y2="415"/><text class="sub" x="477" y="408" fill="#1a5432">11. all green ✓</text>

  <line class="arrow-dash" x1="240" y1="445" x2="85" y2="445"/><text class="sub" x="157" y="438" fill="#1a5432">12. PreCheckResult{ok=true}, 进入 §16.4</text>

  <rect class="bar" x="20" y="510" width="860" height="40" rx="3"/>
  <text x="30" y="527" fill="#333" font-size="11" font-weight="600">§16.3 关键设计:</text>
  <text x="30" y="543" fill="#666" font-size="10">6 类检查全过才放行 §16.4; 任一失败立即停止 + 上报 PRECHECK_FAIL 告警. 检查耗时 P99 &lt; 5s (含 lspci + GET /repo + HealthService Check). 资源检查是 §16.4 切换 2档 8C16G 的前提.</text>
</svg>