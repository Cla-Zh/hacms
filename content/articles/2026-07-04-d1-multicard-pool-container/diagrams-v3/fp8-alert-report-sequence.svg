<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-good { stroke: #1a5432; stroke-width: 2; fill: none; marker-end: url(#arr3); }
    .arrow-bad { stroke: #a02020; stroke-width: 1.5; fill: none; marker-end: url(#arr4); stroke-dasharray: 3,2; }
    .bar { fill: #fafafa; stroke: #ccc; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a5432"/>
    </marker>
    <marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a02020"/>
    </marker>
  </defs>

  <text x="450" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">FP8 时序: AI 推理服务告警事件上报 (ReportAlert 统一入口)</text>
  <text x="450" y="40" text-anchor="middle" fill="#666" font-size="11">任意子模块异常 → ReportAlert(type, severity) → 聚合 → 外部告警系统</text>

  <!-- Lifelines -->
  <line x1="80" y1="65" x2="80" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="230" y1="65" x2="230" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="390" y1="65" x2="390" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="550" y1="65" x2="550" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="720" y1="65" x2="720" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="860" y1="65" x2="860" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>

  <rect class="box" x="20" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="80" y="73">异常源</text>
  <text class="sub" x="80" y="86" font-size="9">推理/使能/状态感知</text>

  <rect class="box" x="170" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="230" y="73">Health gRPC</text>
  <text class="sub" x="230" y="86" font-size="9">:50052</text>

  <rect class="box" x="330" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="390" y="73">告警聚合器</text>
  <text class="sub" x="390" y="86" font-size="9">§15.3 健康监控</text>

  <rect class="box" x="490" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="550" y="73">去重 / 抑制</text>
  <text class="sub" x="550" y="86" font-size="9">5min 滑动窗口</text>

  <rect class="box" x="660" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="720" y="73">外部告警系统</text>
  <text class="sub" x="720" y="86" font-size="9">AlertManager</text>

  <rect class="box" x="800" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="860" y="73">业务方</text>
  <text class="sub" x="860" y="86" font-size="9">客户端收到 alert_id</text>

  <text x="470" y="115" text-anchor="middle" fill="#1a5432" font-size="12" font-weight="600">—— 3 类常见告警路径 ——</text>

  <line class="arrow-bad" x1="80" y1="135" x2="225" y2="135"/>
  <text class="sub" x="153" y="128" fill="#a02020">1. ACL 异常 (推理超时 30s) → INFERENCE_TIMEOUT / CANN_ERROR</text>

  <line class="arrow" x1="230" y1="160" x2="385" y2="160"/>
  <text class="sub" x="308" y="153">2. ReportAlert(type=CANN_ERROR, severity=ERROR, context)</text>

  <line class="arrow" x1="390" y1="185" x2="545" y2="185"/>
  <text class="sub" x="468" y="178">3. 5min 窗口去重 + 分配 alert_id</text>

  <line class="arrow-good" x1="550" y1="210" x2="715" y2="210"/>
  <text class="sub" x="633" y="203">4. ✓ 转发 Prometheus webhook</text>

  <line class="arrow-good" x1="720" y1="235" x2="395" y2="235"/>
  <text class="sub" x="558" y="228">5. ✓ AlertManager 接收, alert_id="alert-abc123"</text>

  <line class="arrow-good" x1="390" y1="260" x2="235" y2="260"/>
  <text class="sub" x="313" y="253">6. ReportAlertResponse(accepted=true, alert_id)</text>

  <line class="arrow-good" x1="230" y1="285" x2="85" y2="285"/>
  <text class="sub" x="158" y="278">7. ✓ 异常源收到 alert_id 用于回填错误码</text>

  <line class="arrow-bad" x1="80" y1="320" x2="225" y2="320"/>
  <text class="sub" x="153" y="313" fill="#a02020">8. 热拔出 (CRITICAL) → CARD_UNREGISTERED</text>

  <line class="arrow-bad" x1="230" y1="345" x2="385" y2="345"/>
  <text class="sub" x="308" y="338">9. ReportAlert(type=CARD_UNREGISTERED, severity=CRITICAL)</text>

  <line class="arrow-bad" x1="390" y1="370" x2="545" y2="370"/>
  <text class="sub" x="468" y="363">10. CRITICAL → 跳过去重, 直接转发</text>

  <line class="arrow-bad" x1="550" y1="395" x2="715" y2="395"/>
  <text class="sub" x="633" y="388" fill="#a02020">11. → PagerDuty 升级 + 邮件 + Slack</text>

  <line class="arrow-bad" x1="720" y1="420" x2="85" y2="420"/>
  <text class="sub" x="403" y="413" fill="#a02020">12. ⚠ 业务方: 自动摘流 / 触发容灾</text>

  <line class="arrow-bad" x1="390" y1="445" x2="230" y2="445" stroke-dasharray="3,2"/>
  <text class="sub" x="313" y="438" fill="#a02020">13. 失败: DCARD_INTERNAL_ERROR(5) → 本地文件兜底</text>

  <!-- Bottom notes -->
  <rect class="bar" x="20" y="455" width="860" height="70" rx="3"/>
  <text x="30" y="475" fill="#333" font-size="11" font-weight="600">v3.1 ReportAlert 关键点</text>
  <text x="30" y="492" fill="#666" font-size="10">• AlertType 9+ 类: 部署期 5 类 (VM/DRIVER/FIRMWARE/NPU/CARD_REGISTER) + 推理期 3 类 (TIMEOUT/CANN/RESOURCE) + 运行时 1 类 (UNREGISTERED)</text>
  <text x="30" y="507" fill="#666" font-size="10">• 告警聚合: 5min 去重 + 抑制; CRITICAL 跳过抑制直接升级; 失败本地文件兜底</text>
  <text x="30" y="520" fill="#666" font-size="10">• 与 HealthService.Watch 协同: alert_id 回填到 Infer 错误码, 客户端可追踪全链路</text>
</svg>