<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .box-fill { fill: #eef0f6; stroke: #3a4a6b; stroke-width: 1.5; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-thin { stroke: #666; stroke-width: 1; fill: none; marker-end: url(#arr2); }
    .bar { fill: #fafafa; stroke: #ccc; }
    .accent { fill: #3a4a6b; }
    .accent-text { fill: #fff; font-size: 11px; font-weight: 600; text-anchor: middle; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>

  <text x="440" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">AI 推理服务 (InferenceService) 内部架构 — v3.1</text>
  <text x="440" y="40" text-anchor="middle" fill="#666" font-size="11">vNic 通信 (gRPC :50051 / :50053) + 多模型推理框架 (调度器 / 线程池 / 昇腾 ACL) + 4 管理模块</text>

  <!-- Outer AI Inference Service container -->
  <rect x="20" y="55" width="840" height="465" rx="6" fill="#fcfcfd" stroke="#3a4a6b" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="28" y="63" width="120" height="22" rx="3" class="accent"/>
  <text x="88" y="78" class="accent-text">AI InferenceService</text>

  <!-- Column 1: vNic 通信模块 -->
  <rect class="box-fill" x="40" y="105" width="200" height="180" rx="4"/>
  <text x="140" y="125" class="label">15.1 vNic 通信模块</text>
  <rect class="box" x="55" y="140" width="170" height="40" rx="3"/>
  <text x="140" y="158" class="label" font-size="11">推理 gRPC :50051</text>
  <text x="140" y="172" class="sub">(Infer / GetInference)</text>
  <rect class="box" x="55" y="190" width="170" height="40" rx="3"/>
  <text x="140" y="208" class="label" font-size="11">维护 gRPC :50053</text>
  <text x="140" y="222" class="sub">(Status / Debug / Alert)</text>
  <text x="140" y="260" class="sub" font-weight="600">2 个独立端口 / 双向 TLS</text>
  <text x="140" y="275" class="sub">unix:///var/run/dcard-*.sock</text>

  <!-- Column 2: 多模型推理框架 -->
  <rect class="box-fill" x="260" y="105" width="200" height="180" rx="4"/>
  <text x="360" y="125" class="label">15.2 多模型推理框架</text>
  <rect class="box" x="275" y="140" width="170" height="48" rx="3"/>
  <text x="360" y="158" class="label" font-size="11">模型调度器 (Scheduler)</text>
  <text x="360" y="172" class="sub">LoadBalance / QPS 路由</text>
  <text x="360" y="183" class="sub">多模型 → 多 NPU</text>
  <rect class="box" x="275" y="195" width="170" height="38" rx="3"/>
  <text x="360" y="213" class="label" font-size="11">推理线程池 (Workers)</text>
  <text x="360" y="227" class="sub">线程数 = NPU 数 × 2</text>
  <rect class="box" x="275" y="240" width="170" height="38" rx="3"/>
  <text x="360" y="258" class="label" font-size="11">昇腾 ACL 框架</text>
  <text x="360" y="272" class="sub">aclmdlExecute / HCCL</text>

  <!-- Column 3: 健康监控 -->
  <rect class="box-fill" x="480" y="105" width="180" height="180" rx="4"/>
  <text x="570" y="125" class="label">15.3 健康监控</text>
  <rect class="box" x="495" y="140" width="150" height="40" rx="3"/>
  <text x="570" y="158" class="label" font-size="11">NPU 健康</text>
  <text x="570" y="172" class="sub">temp/power/util 1s 探测</text>
  <rect class="box" x="495" y="190" width="150" height="40" rx="3"/>
  <text x="570" y="208" class="label" font-size="11">错误侦测</text>
  <text x="570" y="222" class="sub">acl 异常 / HCCL timeout</text>
  <rect class="box" x="495" y="240" width="150" height="40" rx="3"/>
  <text x="570" y="258" class="label" font-size="11">日志收集</text>
  <text x="570" y="272" class="sub">canld 日志流</text>

  <!-- Column 4: AI 卡使能 + 状态感知 -->
  <rect class="box-fill" x="680" y="105" width="160" height="180" rx="4"/>
  <text x="760" y="125" class="label">15.4 / 15.5</text>
  <rect class="box" x="695" y="135" width="130" height="65" rx="3"/>
  <text x="760" y="153" class="label" font-size="11">AI 卡使能</text>
  <text x="760" y="170" class="sub">init / load / 配置 /</text>
  <text x="760" y="184" class="sub">register / unregister</text>
  <text x="760" y="195" class="sub">持久化内存</text>
  <rect class="box" x="695" y="207" width="130" height="70" rx="3"/>
  <text x="760" y="225" class="label" font-size="11">AI 卡状态感知</text>
  <text x="760" y="242" class="sub">Qemu 热插拔事件</text>
  <text x="760" y="256" class="sub">监听 libvirt 回调</text>
  <text x="760" y="270" class="sub">自动注册 / 去注册</text>

  <!-- Bottom row: 外部实体 -->
  <rect class="bar" x="40" y="305" width="800" height="100" rx="3"/>
  <text x="50" y="322" fill="#333" font-size="12" font-weight="600">外部调用方</text>

  <rect class="box" x="60" y="335" width="150" height="40" rx="3"/>
  <text x="135" y="352" class="label" font-size="11">业务推理容器</text>
  <text x="135" y="366" class="sub">gRPC client → :50051</text>

  <rect class="box" x="230" y="335" width="150" height="40" rx="3"/>
  <text x="305" y="352" class="label" font-size="11">dctl / 运维</text>
  <text x="305" y="366" class="sub">诊断 / 状态查询 → :50053</text>

  <rect class="box" x="400" y="335" width="150" height="40" rx="3"/>
  <text x="475" y="352" class="label" font-size="11">HealthService</text>
  <text x="475" y="366" class="sub">拉取 Status / GetLogs</text>

  <rect class="box" x="570" y="335" width="150" height="40" rx="3"/>
  <text x="645" y="352" class="label" font-size="11">AI 卡部署层</text>
  <text x="645" y="366" class="sub">ActivateVM 触发使能</text>

  <!-- Physical NPU layer -->
  <rect x="40" y="425" width="800" height="80" rx="4" fill="#fafafa" stroke="#999" stroke-width="1"/>
  <text x="440" y="445" text-anchor="middle" class="label">物理 NPU (1 逻辑 D-Card = N × Ascend 910B / 310P, HCCS 互联)</text>
  <g class="sub" fill="#3a4a6b">
    <rect x="60" y="458" width="80" height="35" rx="3" fill="#fff" stroke="#3a4a6b" stroke-width="1"/>
    <text x="100" y="480" text-anchor="middle">910B #0</text>
    <rect x="160" y="458" width="80" height="35" rx="3" fill="#fff" stroke="#3a4a6b" stroke-width="1"/>
    <text x="200" y="480" text-anchor="middle">910B #1</text>
    <rect x="260" y="458" width="80" height="35" rx="3" fill="#fff" stroke="#3a4a6b" stroke-width="1"/>
    <text x="300" y="480" text-anchor="middle">910B #2</text>
    <text x="360" y="478" class="sub">· · ·</text>
    <rect x="400" y="458" width="80" height="35" rx="3" fill="#fff" stroke="#3a4a6b" stroke-width="1"/>
    <text x="440" y="480" text-anchor="middle">910B #N-1</text>
  </g>

  <!-- Bottom notes -->
  <rect class="bar" x="40" y="465" width="800" height="0" />
  <text x="40" y="513" fill="#666" font-size="11">• 1 物理 NPU 跑多模型: 调度器按模型哈希 + QPS 路由到对应线程池 worker</text>
  <text x="40" y="528" fill="#666" font-size="11">• ACL 框架层是 CANN 8.0.RC2 用户态 SDK, 上层屏蔽硬件细节</text>

  <!-- Arrows showing flow -->
  <line class="arrow-thin" x1="140" y1="285" x2="140" y2="335"/>
  <line class="arrow-thin" x1="360" y1="285" x2="475" y2="335"/>
  <line class="arrow-thin" x1="570" y1="285" x2="305" y2="335"/>
  <line class="arrow-thin" x1="760" y1="285" x2="645" y2="335"/>

  <!-- Internal connections -->
  <line class="arrow-thin" x1="240" y1="160" x2="260" y2="160"/>
  <line class="arrow-thin" x1="460" y1="195" x2="480" y2="195"/>
  <line class="arrow-thin" x1="660" y1="170" x2="680" y2="170"/>

  <!-- ACL to NPU -->
  <line class="arrow" x1="360" y1="278" x2="360" y2="455"/>
  <line class="arrow" x1="570" y1="282" x2="570" y2="455"/>
  <line class="arrow" x1="760" y1="278" x2="760" y2="455" stroke-dasharray="3,2"/>
</svg>
