<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .box-core { fill: #fff3b0; stroke: #b89000; stroke-width: 2; }
    .box-fade { fill: #fafafa; stroke: #ccc; stroke-width: 1; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .label-core { fill: #5a4400; font-size: 13px; font-weight: 700; text-anchor: middle; }
    .label-fade { fill: #999; font-size: 13px; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .sub-fade { fill: #aaa; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-thin { stroke: #666; stroke-width: 1; fill: none; marker-end: url(#arr2); }
    .callout-core { fill: #fff3b0; stroke: #b89000; stroke-width: 1.5; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>

  <text x="400" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">FP3: AI 推理服务模型调度 — 子模块图 (Scheduler 路由)</text>
  <text x="400" y="40" text-anchor="middle" fill="#666" font-size="11">核心子模块: 多模型推理框架.调度器 (黄) · 策略: hash + LoadBalance + QPS</text>

  <!-- Input -->
  <rect class="box" x="20" y="60" width="760" height="50" rx="3"/>
  <text x="400" y="80" class="label" font-size="12">触发: InferRequest.model_id → route(model_id) → 选 NPU</text>
  <text x="400" y="98" class="sub">策略: round_robin / pin_by_model / load_balanced (Init 阶段 d 设置 AssignmentStrategy)</text>

  <!-- vNic (淡灰) -->
  <rect class="box-fade" x="20" y="130" width="148" height="240" rx="4"/>
  <text x="94" y="150" class="label-fade">§15.1 vNic 通信</text>
  <rect class="box-fade" x="30" y="160" width="128" height="40" rx="3"/>
  <text x="94" y="178" class="label-fade" font-size="11">Infer RPC 入口</text>
  <text x="94" y="192" class="sub-fade" font-size="9">/dcard/aiinference/v1/Infer</text>
  <rect class="box-fade" x="30" y="210" width="128" height="40" rx="3"/>
  <text x="94" y="228" class="label-fade" font-size="11">反序列化 input_data</text>
  <text x="94" y="242" class="sub-fade" font-size="9">trace_id 透传</text>
  <text x="94" y="345" class="sub-fade" font-size="9">—— 入口层 ——</text>

  <!-- 多模型推理框架 (核心, 黄) -->
  <rect class="box-core" x="178" y="130" width="280" height="240" rx="4"/>
  <text x="318" y="150" class="label-core">§15.2 多模型推理框架 ⭐</text>
  <rect class="box" x="188" y="160" width="260" height="36" rx="3"/>
  <text x="318" y="178" class="label" font-size="11">模型调度器 (Scheduler)</text>
  <text x="318" y="190" class="sub" font-size="9">route(model_id) → card_id</text>
  <rect class="box" x="188" y="200" width="260" height="36" rx="3"/>
  <text x="318" y="218" class="label" font-size="11">model_routing_table</text>
  <text x="318" y="230" class="sub" font-size="9">内存哈希 O(1) 查询</text>
  <rect class="box" x="188" y="240" width="260" height="36" rx="3"/>
  <text x="318" y="258" class="label" font-size="11">LoadBalance 负载统计</text>
  <text x="318" y="270" class="sub" font-size="9">QPS + 队列长度权重</text>
  <rect class="box" x="188" y="280" width="260" height="36" rx="3"/>
  <text x="318" y="298" class="label" font-size="11">Worker 线程池</text>
  <text x="318" y="310" class="sub" font-size="9">NPU × 2 worker, 多模型并存</text>
  <text x="318" y="345" class="sub" font-weight="600">"1 物理 NPU = 多模型"</text>

  <!-- 健康监控 (淡灰) -->
  <rect class="box-fade" x="468" y="130" width="148" height="240" rx="4"/>
  <text x="542" y="150" class="label-fade">§15.3 健康监控</text>
  <rect class="box-fade" x="478" y="160" width="128" height="40" rx="3"/>
  <text x="542" y="178" class="label-fade" font-size="11">NPU 健康状态</text>
  <text x="542" y="192" class="sub-fade" font-size="9">调度时跳过 unhealthy</text>
  <rect class="box-fade" x="478" y="210" width="128" height="40" rx="3"/>
  <text x="542" y="228" class="label-fade" font-size="11">队列长度</text>
  <text x="542" y="242" class="sub-fade" font-size="9">资源监控上报调度器</text>
  <text x="542" y="345" class="sub-fade" font-size="9">—— 旁路输入 ——</text>

  <!-- AI 卡使能 (淡灰) -->
  <rect class="box-fade" x="626" y="130" width="154" height="240" rx="4"/>
  <text x="703" y="150" class="label-fade">§15.4 AI 卡使能</text>
  <rect class="box-fade" x="636" y="160" width="134" height="40" rx="3"/>
  <text x="703" y="178" class="label-fade" font-size="11">model_assignment</text>
  <text x="703" y="192" class="sub-fade" font-size="9">Init 阶段 d 持久化</text>
  <text x="703" y="345" class="sub-fade" font-size="9">—— 启动时构建 ——</text>

  <!-- Output -->
  <rect class="box" x="20" y="385" width="760" height="55" rx="3"/>
  <text x="400" y="405" class="label" font-size="12">输出: card_id + ACL 句柄 → aclmdlExecute → InferResponse { served_by_card_id="card-N", latency_us }</text>
  <text x="400" y="423" class="sub">频率: 高 QPS (推理流量); 调度器每请求查表 O(1); 持久化内存 model_assignment 不重启</text>

  <!-- Yellow callout for core -->
  <rect class="callout-core" x="178" y="110" width="280" height="14" rx="2" opacity="0.85"/>
  <text x="318" y="121" text-anchor="middle" fill="#5a4400" font-size="9" font-weight="700">CORE: §15.2 多模型推理框架.调度器</text>

  <!-- Arrows -->
  <line class="arrow" x1="94" y1="130" x2="318" y2="130"/>
  <line class="arrow" x1="468" y1="180" x2="458" y2="240" stroke="#bbb" stroke-dasharray="2,2"/>
  <line class="arrow" x1="626" y1="180" x2="458" y2="200" stroke="#bbb" stroke-dasharray="2,2"/>
  <line class="arrow" x1="318" y1="370" x2="400" y2="385"/>
</svg>