<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .box-core { fill: #fff3b0; stroke: #b89000; stroke-width: 2; }
    .box-fade { fill: #fafafa; stroke: #ccc; stroke-width: 1; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .label-core { fill: #5a4400; font-size: 13px; font-weight: 700; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .sub-fade { fill: #aaa; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-thin { stroke: #666; stroke-width: 1; fill: none; marker-end: url(#arr2); }
    .callout-core { fill: #fff3b0; stroke: #b89000; stroke-width: 1.5; }
    .mono { font-family: monospace; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>

  <text x="400" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">FP3: 模型调度 — 子模块图 (3 卡 3 池 + 负载均衡)</text>
  <text x="400" y="40" text-anchor="middle" fill="#666" font-size="11">模型注册表 (model_id → NPU 列表) · 调度器 round-robin / least-connections · 3 池子</text>

  <!-- Top: 用户请求 -->
  <rect class="box" x="20" y="52" width="760" height="40" rx="3"/>
  <text x="400" y="70" class="label" font-size="12">① 用户请求 (model_id=X)</text>
  <text x="400" y="85" class="sub">经 vNic :50051 进入多模型推理框架</text>

  <line class="arrow" x1="400" y1="92" x2="400" y2="106"/>

  <!-- 中部: 多模型推理框架 -->
  <rect class="box" x="20" y="106" width="760" height="200" rx="4"/>
  <text x="400" y="125" class="label">② 多模型推理框架</text>

  <!-- 模型注册表 -->
  <rect class="box-core" x="40" y="136" width="230" height="80" rx="3"/>
  <text x="155" y="155" class="label-core" font-size="12">模型注册表</text>
  <text x="155" y="172" text-anchor="middle" fill="#5a4400" font-size="9">model_id → 持有该模型的</text>
  <text x="155" y="184" text-anchor="middle" fill="#5a4400" font-size="9">NPU 列表</text>
  <text x="155" y="200" text-anchor="middle" fill="#5a4400" font-size="8" font-family="monospace">resnet50 → [npu0,npu1,npu2]</text>
  <text x="155" y="211" text-anchor="middle" fill="#5a4400" font-size="8" font-family="monospace">bert → [npu0,npu1,npu2]</text>

  <!-- 调度器 -->
  <rect class="box-core" x="290" y="136" width="230" height="80" rx="3"/>
  <text x="405" y="155" class="label-core" font-size="12">调度器</text>
  <text x="405" y="174" text-anchor="middle" fill="#5a4400" font-size="10">round-robin</text>
  <text x="405" y="190" text-anchor="middle" fill="#5a4400" font-size="10">least-connections</text>
  <text x="405" y="208" text-anchor="middle" fill="#5a4400" font-size="8">按队列深度 / QPS 选池</text>

  <!-- 关键标注 -->
  <rect class="box-fade" x="540" y="136" width="220" height="80" rx="3"/>
  <text x="650" y="154" class="label" font-size="11">关键约束</text>
  <text x="650" y="171" class="sub" font-size="9">1 物理 NPU = 1 线程池</text>
  <text x="650" y="186" class="sub" font-size="9">每池加载同样 3 模型</text>
  <text x="650" y="201" class="sub" font-size="9">model_id 路由 + 负载均衡</text>

  <line class="arrow-thin" x1="270" y1="176" x2="290" y2="176"/>

  <!-- 3 池子 -->
  <rect class="box" x="40" y="228" width="230" height="66" rx="3"/>
  <text x="155" y="246" class="label" font-size="12">池子 npu0</text>
  <text x="155" y="262" class="sub">1 套 3 模型 + 推理队列</text>
  <text x="155" y="278" class="sub-fade" font-size="9">线程池 worker × N</text>
  <text x="155" y="290" class="sub-fade" font-size="9">队列深度 / QPS 计数</text>

  <rect class="box" x="290" y="228" width="220" height="66" rx="3"/>
  <text x="400" y="246" class="label" font-size="12">池子 npu1</text>
  <text x="400" y="262" class="sub">1 套 3 模型 + 推理队列</text>
  <text x="400" y="278" class="sub-fade" font-size="9">线程池 worker × N</text>

  <rect class="box" x="530" y="228" width="230" height="66" rx="3"/>
  <text x="645" y="246" class="label" font-size="12">池子 npu2</text>
  <text x="645" y="262" class="sub">1 套 3 模型 + 推理队列</text>
  <text x="645" y="278" class="sub-fade" font-size="9">线程池 worker × N</text>

  <line class="arrow" x1="405" y1="216" x2="155" y2="228"/>
  <line class="arrow" x1="405" y1="216" x2="400" y2="228"/>
  <line class="arrow" x1="405" y1="216" x2="645" y2="228"/>

  <!-- 底部: 3 × NPU -->
  <rect class="box" x="20" y="318" width="760" height="130" rx="4"/>
  <text x="400" y="336" class="label" font-size="12">③ 物理层: 3 × NPU (每卡 模型1/2/3)</text>

  <rect class="box-fade" x="60" y="346" width="210" height="92" rx="3"/>
  <text x="165" y="364" class="sub" font-weight="600">NPU 0</text>
  <text x="165" y="382" class="sub-fade" font-size="9">模型1 resnet50</text>
  <text x="165" y="398" class="sub-fade" font-size="9">模型2 bert-base</text>
  <text x="165" y="414" class="sub-fade" font-size="9">模型3 llama-7b</text>
  <text x="165" y="430" class="sub-fade" font-size="8">deviceid 0</text>

  <rect class="box-fade" x="295" y="346" width="210" height="92" rx="3"/>
  <text x="400" y="364" class="sub" font-weight="600">NPU 1</text>
  <text x="400" y="382" class="sub-fade" font-size="9">模型1 resnet50</text>
  <text x="400" y="398" class="sub-fade" font-size="9">模型2 bert-base</text>
  <text x="400" y="414" class="sub-fade" font-size="9">模型3 llama-7b</text>
  <text x="400" y="430" class="sub-fade" font-size="8">deviceid 1</text>

  <rect class="box-fade" x="530" y="346" width="210" height="92" rx="3"/>
  <text x="635" y="364" class="sub" font-weight="600">NPU 2</text>
  <text x="635" y="382" class="sub-fade" font-size="9">模型1 resnet50</text>
  <text x="635" y="398" class="sub-fade" font-size="9">模型2 bert-base</text>
  <text x="635" y="414" class="sub-fade" font-size="9">模型3 llama-7b</text>
  <text x="635" y="430" class="sub-fade" font-size="8">deviceid 2</text>

  <line class="arrow" x1="155" y1="294" x2="165" y2="346"/>
  <line class="arrow" x1="400" y1="294" x2="400" y2="346"/>
  <line class="arrow" x1="645" y1="294" x2="635" y2="346"/>
</svg>
