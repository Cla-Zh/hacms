<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="sans-serif" font-size="13" fill="#222">
  <defs>
    <marker id="arrow-1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <marker id="arrow-1-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d7a2d"/>
    </marker>
  </defs>
  <rect width="900" height="540" fill="#fff"/>
  <text x="20" y="22" font-size="15" font-weight="700">活动图: 防勒索服务切换 AI 卡 (CPU_ONLY → HYBRID → AI_ONLY)</text>
  <text x="20" y="40" font-size="11" fill="#666">v3.2 新增 — §24.3 — 容器外 anti-ransom service + 容器内 AI 推理服务 协同切换</text>

  <rect x="370" y="60" width="160" height="34" rx="17" fill="#fff3b0" stroke="#333" stroke-width="1.5"/>
  <text x="450" y="82" text-anchor="middle" font-weight="700">启动 (Init)</text>

  <line x1="450" y1="94" x2="450" y2="110" stroke="#333" stroke-width="1.2" marker-end="url(#arrow-1)"/>

  <rect x="60" y="120" width="320" height="380" fill="#fafafa" stroke="#333" stroke-width="1"/>
  <text x="220" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#444">容器外 — anti-ransom service (CPU)</text>
  <line x1="220" y1="148" x2="220" y2="170" stroke="#333" stroke-width="1.2" marker-end="url(#arrow-1)"/>

  <rect x="100" y="180" width="240" height="36" rx="4" fill="#fff" stroke="#333" stroke-width="1.2"/>
  <text x="220" y="203" text-anchor="middle">① 接收存储 IO 特征流 (op latency / R/W ratio)</text>

  <line x1="220" y1="216" x2="220" y2="234" stroke="#333" stroke-width="1.2" marker-end="url(#arrow-1)"/>
  <rect x="100" y="244" width="240" height="36" rx="4" fill="#fff" stroke="#333" stroke-width="1.2"/>
  <text x="220" y="267" text-anchor="middle">② CPU 推理 (CNN/RNN 模型 on Xeon 6248)</text>

  <line x1="220" y1="280" x2="220" y2="298" stroke="#333" stroke-width="1.2" marker-end="url(#arrow-1)"/>
  <rect x="100" y="308" width="240" height="36" rx="4" fill="#fff" stroke="#333" stroke-width="1.2"/>
  <text x="220" y="331" text-anchor="middle">③ 输出判定 (Normal / Suspect / Ransom)</text>

  <line x1="220" y1="344" x2="220" y2="362" stroke="#333" stroke-width="1.2" marker-end="url(#arrow-1)"/>
  <polygon points="220,372 280,408 220,444 160,408" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="220" y="405" text-anchor="middle" font-size="12" font-weight="700">SwitchController</text>
  <text x="220" y="421" text-anchor="middle" font-size="10" fill="#666">订阅 /v1/health/watch</text>

  <rect x="520" y="120" width="320" height="380" fill="#fafafa" stroke="#333" stroke-width="1"/>
  <text x="680" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#444">容器内 — AI 推理服务 (NPU)</text>
  <line x1="680" y1="148" x2="680" y2="170" stroke="#333" stroke-width="1.2" marker-end="url(#arrow-1)"/>

  <rect x="560" y="180" width="240" height="36" rx="4" fill="#fff" stroke="#333" stroke-width="1.2"/>
  <text x="680" y="203" text-anchor="middle">④ 健康探测 (3 层: liveness / readiness / model-ready)</text>

  <line x1="680" y1="216" x2="680" y2="234" stroke="#333" stroke-width="1.2" marker-end="url(#arrow-1)"/>
  <rect x="560" y="244" width="240" height="36" rx="4" fill="#fff" stroke="#333" stroke-width="1.2"/>
  <text x="680" y="267" text-anchor="middle">⑤ 模型加载 (resnet50/bert/llama-7b 三模型)</text>

  <line x1="680" y1="280" x2="680" y2="298" stroke="#333" stroke-width="1.2" marker-end="url(#arrow-1)"/>
  <rect x="560" y="308" width="240" height="36" rx="4" fill="#fff3b0" stroke="#333" stroke-width="1.5"/>
  <text x="680" y="331" text-anchor="middle" font-weight="700">⑥ vNic URL 监听 (:50051 业务 + :50053 管理)</text>

  <line x1="680" y1="344" x2="680" y2="362" stroke="#2d7a2d" stroke-width="1.2" marker-end="url(#arrow-1-green)"/>
  <rect x="560" y="372" width="240" height="36" rx="4" fill="#e7f4e7" stroke="#2d7a2d" stroke-width="1.2"/>
  <text x="680" y="395" text-anchor="middle" fill="#2d7a2d">⑦ SERVING 状态 → 触发切换</text>

  <line x1="680" y1="408" x2="680" y2="426" stroke="#2d7a2d" stroke-width="1.2" marker-end="url(#arrow-1-green)"/>
  <rect x="560" y="436" width="240" height="36" rx="4" fill="#e7f4e7" stroke="#2d7a2d" stroke-width="1.2"/>
  <text x="680" y="459" text-anchor="middle" fill="#2d7a2d">⑧ 后续 IO 消息路由 → AI 推理 (CPU 关停)</text>

  <line x1="280" y1="408" x2="558" y2="385" stroke="#2d7a2d" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-1-green)"/>
  <text x="420" y="395" text-anchor="middle" font-size="11" fill="#2d7a2d" font-weight="700">SwitchToAI</text>

  <rect x="60" y="510" width="780" height="22" fill="#fafafa" stroke="#666" stroke-width="0.8"/>
  <text x="75" y="525" font-size="10" fill="#666">■ 黄色高亮 = 切换触发节点</text>
  <text x="230" y="525" font-size="10" fill="#666">■ 绿色 = AI 推理路径</text>
  <text x="380" y="525" font-size="10" fill="#666">■ 虚线 = SwitchController 触发</text>
  <text x="560" y="525" font-size="10" fill="#666">■ viewBox 900x540, font sans-serif 13/12/11/10</text>
</svg>
