<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-good { stroke: #1a5432; stroke-width: 2; fill: none; marker-end: url(#arr3); }
    .arrow-bad { stroke: #a02020; stroke-width: 1.5; fill: none; marker-end: url(#arr4); stroke-dasharray: 3,2; }
    .bar { fill: #fafafa; stroke: #ccc; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a5432"/>
    </marker>
    <marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a02020"/>
    </marker>
  </defs>

  <text x="450" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">FP6 时序: AI 推理服务健康检查 (Check + 多维探测)</text>
  <text x="450" y="40" text-anchor="middle" fill="#666" font-size="11">K8s liveness/readiness probe → Health.Check → NPU+ACL+资源 → ServingStatus</text>

  <!-- Lifelines -->
  <line x1="80" y1="65" x2="80" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="240" y1="65" x2="240" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="400" y1="65" x2="400" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="560" y1="65" x2="560" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="720" y1="65" x2="720" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="860" y1="65" x2="860" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>

  <rect class="box" x="20" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="80" y="73">K8s Probe</text>
  <text class="sub" x="80" y="86" font-size="9">kubelet</text>

  <rect class="box" x="180" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="240" y="73">Health gRPC</text>
  <text class="sub" x="240" y="86" font-size="9">:50052</text>

  <rect class="box" x="340" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="400" y="73">健康监控</text>
  <text class="sub" x="400" y="86" font-size="9">§15.3</text>

  <rect class="box" x="500" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="560" y="73">NPU 探测</text>
  <text class="sub" x="560" y="86" font-size="9">temp/power/util</text>

  <rect class="box" x="660" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="720" y="73">ACL/HCCL</text>
  <text class="sub" x="720" y="86" font-size="9">框架健康</text>

  <rect class="box" x="800" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="860" y="73">AI 卡使能</text>
  <text class="sub" x="860" y="86" font-size="9">注册状态</text>

  <text x="470" y="115" text-anchor="middle" fill="#1a5432" font-size="12" font-weight="600">—— 正常流程: SERVING ——</text>

  <line class="arrow-good" x1="80" y1="135" x2="235" y2="135"/>
  <text class="sub" x="158" y="128">1. Check(check_type=LIVENESS, timeout_ms=3000)</text>

  <line class="arrow" x1="240" y1="160" x2="395" y2="160"/>
  <text class="sub" x="318" y="153">2. Check handler → 多维探测并行</text>

  <line class="arrow" x1="400" y1="185" x2="555" y2="185"/>
  <text class="sub" x="478" y="178">3. 查 NPU 健康缓存 (1s 探测)</text>

  <line class="arrow-good" x1="560" y1="210" x2="405" y2="210"/>
  <text class="sub" x="483" y="203">4. ✓ 8 NPU healthy (temp<85°, power<300W)</text>

  <line class="arrow" x1="400" y1="235" x2="715" y2="235"/>
  <text class="sub" x="558" y="228">5. ACL/HCCL 探活</text>

  <line class="arrow-good" x1="720" y1="260" x2="405" y2="260"/>
  <text class="sub" x="563" y="253">6. ✓ CANN 8.0.RC2 OK</text>

  <line class="arrow" x1="400" y1="285" x2="855" y2="285"/>
  <text class="sub" x="628" y="278">7. 查 AI 卡使能注册表</text>

  <line class="arrow-good" x1="860" y1="310" x2="405" y2="310"/>
  <text class="sub" x="633" y="303">8. ✓ 8 cards registered</text>

  <line class="arrow-good" x1="400" y1="335" x2="245" y2="335"/>
  <text class="sub" x="323" y="328">9. HealthCheckResponse(SERVING, message="OK")</text>

  <line class="arrow-good" x1="240" y1="360" x2="85" y2="360"/>
  <text class="sub" x="163" y="353">10. ✓ probe 200 → pod 不重启</text>

  <text x="470" y="395" text-anchor="middle" fill="#a02020" font-size="12" font-weight="600">—— 异常流程: NOT_SERVING ——</text>

  <line class="arrow-bad" x1="560" y1="415" x2="405" y2="415"/>
  <text class="sub" x="483" y="408" fill="#a02020">11. ⚠ NPU 3 过热 (temp=92°)</text>

  <line class="arrow-bad" x1="400" y1="435" x2="245" y2="435"/>
  <text class="sub" x="323" y="428" fill="#a02020">12. NOT_SERVING, details=[card-3 thermal]</text>

  <line class="arrow-bad" x1="240" y1="460" x2="85" y2="460"/>
  <text class="sub" x="163" y="453" fill="#a02020">13. ⚠ probe 503 → pod 重启 / 摘流</text>

  <!-- Bottom notes -->
  <rect class="bar" x="20" y="455" width="860" height="0" rx="3"/>
  <text x="30" y="498" fill="#666" font-size="10">• K8s liveness/readiness probe 集成; 频率: liveness 10s / readiness 5s; 健康监控缓存避免每次探测</text>
  <text x="30" y="513" fill="#666" font-size="10">• 错误码: DCARD_INTERNAL_ERROR(5); NOT_SERVING 时 kubelet 重启 / readiness 失败摘流</text>
</svg>