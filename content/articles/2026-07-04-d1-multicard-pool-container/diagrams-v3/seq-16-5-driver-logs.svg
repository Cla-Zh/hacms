<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .box-fill { fill: #eef0f6; stroke: #3a4a6b; stroke-width: 1.5; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-dash { stroke: #666; stroke-width: 1.2; fill: none; marker-end: url(#arr2); stroke-dasharray: 3,2; }
    .bar { fill: #fafafa; stroke: #ccc; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>
  <text x="450" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">§16.5 驱动日志收集 (主动 + 触发式 2 类)</text>
  <text x="450" y="40" text-anchor="middle" fill="#666" font-size="11">§15.7 LogCollector 同源 · 2 类: 16.5.1 周期收集 + 16.5.2 异常触发</text>

  <line x1="80" y1="65" x2="80" y2="500" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="240" y1="65" x2="240" y2="500" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="400" y1="65" x2="400" y2="500" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="560" y1="65" x2="560" y2="500" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="720" y1="65" x2="720" y2="500" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>

  <rect class="box" x="20" y="50" width="120" height="40" rx="3"/><text class="label" x="80" y="73">LogCollector</text><text class="sub" x="80" y="86" font-size="9">§15.7</text>
  <rect class="box" x="180" y="50" width="120" height="40" rx="3"/><text class="label" x="240" y="73">canld</text><text class="sub" x="240" y="86" font-size="9">CANN daemon</text>
  <rect class="box" x="340" y="50" width="120" height="40" rx="3"/><text class="label" x="400" y="73">kernel log</text><text class="sub" x="400" y="86" font-size="9">/var/log/messages</text>
  <rect class="box" x="500" y="50" width="120" height="40" rx="3"/><text class="label" x="560" y="73">Storage S3</text><text class="sub" x="560" y="86" font-size="9">长期归档</text>
  <rect class="box" x="670" y="50" width="100" height="40" rx="3"/><text class="label" x="720" y="73">HealthService</text><text class="sub" x="720" y="86" font-size="9">:50052</text>

  <text x="450" y="115" text-anchor="middle" fill="#3a4a6b" font-size="12" font-weight="600">— §16.5.1 主动周期收集 (每 60s 增量) —</text>
  <line class="arrow" x1="80" y1="140" x2="235" y2="140"/><text class="sub" x="157" y="133">1. tail -F /var/log/canld/canld.log</text>
  <line class="arrow-dash" x1="240" y1="160" x2="85" y2="160"/><text class="sub" x="157" y="153" fill="#1a5432">2. since_last_offset=...</text>
  <line class="arrow" x1="80" y1="180" x2="395" y2="180"/><text class="sub" x="237" y="173">3. dmesg | grep -i npu</text>
  <line class="arrow-dash" x1="400" y1="200" x2="85" y2="200"/><text class="sub" x="237" y="193" fill="#1a5432">4. kernel NPU events</text>
  <line class="arrow" x1="80" y1="225" x2="555" y2="225"/><text class="sub" x="317" y="218">5. PUT /logs/driver-2026-07-05 (chunked)</text>
  <line class="arrow-dash" x1="560" y1="245" x2="85" y2="245"/><text class="sub" x="317" y="238" fill="#1a5432">6. 200 OK, etag=...</text>

  <text x="450" y="275" text-anchor="middle" fill="#3a4a6b" font-size="12" font-weight="600">— §16.5.2 异常触发收集 (告警/错误/超时) —</text>
  <line class="arrow" x1="240" y1="300" x2="715" y2="300"/><text class="sub" x="477" y="293">7. canld panic → kernel oops</text>
  <line class="arrow-dash" x1="720" y1="320" x2="85" y2="320"/><text class="sub" x="397" y="313" fill="#1a5432">8. ReportAlert(KERNEL_OOPS, level=CRITICAL)</text>
  <line class="arrow" x1="80" y1="345" x2="235" y2="345"/><text class="sub" x="157" y="338">9. trigger 紧急收集 (panic context)</text>
  <line class="arrow" x1="240" y1="365" x2="555" y2="365"/><text class="sub" x="397" y="358">10. POST /logs/driver-emergency (full core+log)</text>
  <line class="arrow-dash" x1="560" y1="385" x2="85" y2="385"/><text class="sub" x="317" y="378" fill="#1a5432">11. ACK + checksum verify</text>

  <line class="arrow-dash" x1="80" y1="415" x2="715" y2="415"/><text class="sub" x="397" y="408" fill="#1a5432">12. HealthService.Watch 推送 alert + 归档路径</text>

  <rect class="bar" x="20" y="500" width="860" height="40" rx="3"/>
  <text x="30" y="517" fill="#333" font-size="11" font-weight="600">§16.5 关键设计:</text>
  <text x="30" y="533" fill="#666" font-size="10">复用 §15.7 LogCollector 4 数据源 (canld / kernel / 部署 / 推理), 2 类触发 (周期 60s + 异常). 紧急日志独立归档 (s3://dcard-logs/emergency/), 7 天保留 + checksum 验证. 与 HealthService.Watch 联动推送告警.</text>
</svg>