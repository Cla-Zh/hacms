<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-good { stroke: #1a5432; stroke-width: 2; fill: none; marker-end: url(#arr3); }
    .arrow-bad { stroke: #a02020; stroke-width: 1.5; fill: none; marker-end: url(#arr4); stroke-dasharray: 3,2; }
    .bar { fill: #fafafa; stroke: #ccc; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a5432"/>
    </marker>
    <marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a02020"/>
    </marker>
  </defs>

  <text x="450" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">FP4 时序: AI 推理服务多卡管理 (注册 / 去注册 + AI 卡使能)</text>
  <text x="450" y="40" text-anchor="middle" fill="#666" font-size="11">Init 阶段 e 注册 + 热插拔触发去注册 + Deinit 释放 — device-plugin + ACL bind/unbind</text>

  <!-- Lifelines -->
  <line x1="80" y1="65" x2="80" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="230" y1="65" x2="230" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="390" y1="65" x2="390" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="550" y1="65" x2="550" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="720" y1="65" x2="720" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="860" y1="65" x2="860" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>

  <rect class="box" x="20" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="80" y="73">Init / 热插拔</text>
  <text class="sub" x="80" y="86" font-size="9">触发源</text>

  <rect class="box" x="170" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="230" y="73">AI 卡使能</text>
  <text class="sub" x="230" y="86" font-size="9">§15.4</text>

  <rect class="box" x="330" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="390" y="73">vNic 维护</text>
  <text class="sub" x="390" y="86" font-size="9">:50053 / Status</text>

  <rect class="box" x="490" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="550" y="73">ACL/CANN</text>
  <text class="sub" x="550" y="86" font-size="9">bind/unbind</text>

  <rect class="box" x="660" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="720" y="73">device-plugin</text>
  <text class="sub" x="720" y="86" font-size="9">K8s 设备资源</text>

  <rect class="box" x="800" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="860" y="73">持久化注册表</text>
  <text class="sub" x="860" y="86" font-size="9">内存 + WAL</text>

  <text x="470" y="115" text-anchor="middle" fill="#1a5432" font-size="12" font-weight="600">—— 注册流程 (Init 阶段 e) ——</text>

  <line class="arrow" x1="80" y1="135" x2="225" y2="135"/>
  <text class="sub" x="153" y="128">1. Init 阶段 e 触发 (auto_register=true)</text>

  <line class="arrow" x1="230" y1="160" x2="545" y2="160"/>
  <text class="sub" x="388" y="153">2. ACL bind(device_id, card_id="card-N")</text>

  <line class="arrow-good" x1="550" y1="185" x2="235" y2="185"/>
  <text class="sub" x="393" y="178">3. ✓ ACL handle 已分配</text>

  <line class="arrow-good" x1="230" y1="210" x2="715" y2="210"/>
  <text class="sub" x="473" y="203">4. RegisterNpu(card_id, vendor=ascend, model=910B)</text>

  <line class="arrow-good" x1="720" y1="235" x2="235" y2="235"/>
  <text class="sub" x="478" y="228">5. ✓ dcard.com/npu=8 added</text>

  <line class="arrow" x1="230" y1="260" x2="855" y2="260"/>
  <text class="sub" x="543" y="253">6. 持久化 registered_cards[] + ACL 句柄</text>

  <text x="470" y="290" text-anchor="middle" fill="#a02020" font-size="12" font-weight="600">—— 去注册流程 (热拔出 / Deinit) ——</text>

  <line class="arrow-bad" x1="80" y1="310" x2="225" y2="310"/>
  <text class="sub" x="153" y="303">7. 热拔出事件 / Deinit(force=true)</text>

  <line class="arrow-bad" x1="230" y1="335" x2="545" y2="335"/>
  <text class="sub" x="388" y="328">8. ACL unbind(device_id)</text>

  <line class="arrow-bad" x1="230" y1="360" x2="715" y2="360"/>
  <text class="sub" x="473" y="353">9. UnregisterNpu(card_id, reason)</text>

  <line class="arrow-bad" x1="720" y1="385" x2="235" y2="385"/>
  <text class="sub" x="478" y="378">10. ✓ dcard.com/npu -= 1</text>

  <line class="arrow" x1="230" y1="410" x2="385" y2="410"/>
  <text class="sub" x="308" y="403">11. Status(unregistered_cards=[card-N]) → 客户端</text>

  <line class="arrow-bad" x1="230" y1="435" x2="855" y2="435"/>
  <text class="sub" x="543" y="428" fill="#a02020">12. 持久化: 注销记录 + 释放 ACL 句柄</text>

  <!-- Bottom notes -->
  <rect class="bar" x="20" y="455" width="860" height="70" rx="3"/>
  <text x="30" y="475" fill="#333" font-size="11" font-weight="600">v3.1 多卡管理关键点</text>
  <text x="30" y="492" fill="#666" font-size="10">• Init 阶段 e 注册 8 NPU 到 device-plugin (dcard.com/npu); Status 暴露 unregistered_cards</text>
  <text x="30" y="507" fill="#666" font-size="10">• 热拔出由 FP7 状态感知触发; Deinit 在容器销毁时跑 (preStop hook)</text>
  <text x="30" y="520" fill="#666" font-size="10">• 与 AIDeploymentService.RegisterCard 对接 (拿到 deployment_token 给 AIInferenceService.Activate)</text>
</svg>