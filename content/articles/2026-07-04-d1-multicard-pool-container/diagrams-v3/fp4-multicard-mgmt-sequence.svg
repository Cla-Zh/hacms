<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .box-core { fill: #fff3b0; stroke: #b89000; stroke-width: 1.5; }
    .label { fill: #333; font-size: 12px; font-weight: 600; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-good { stroke: #1a5432; stroke-width: 2; fill: none; marker-end: url(#arr3); }
    .arrow-bad { stroke: #a02020; stroke-width: 1.5; fill: none; marker-end: url(#arr4); stroke-dasharray: 3,2; }
    .bar { fill: #fafafa; stroke: #ccc; }
    .mono { font-family: monospace; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a5432"/>
    </marker>
    <marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a02020"/>
    </marker>
  </defs>

  <text x="450" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">FP4 时序: 多卡管理 (qemu 热拔插 device_del / device_add)</text>
  <text x="450" y="40" text-anchor="middle" fill="#666" font-size="11">K8s Deinit → 撤销模型分配 → 注销 → qemu device_del → 释放 → state.xml → 反向 device_add</text>

  <!-- 5 lifelines: 100, 300, 500, 680, 830 -->
  <g stroke="#333" stroke-width="1" stroke-dasharray="4,2">
    <line x1="100" y1="95" x2="100" y2="470"/>
    <line x1="300" y1="95" x2="300" y2="470"/>
    <line x1="500" y1="95" x2="500" y2="470"/>
    <line x1="680" y1="95" x2="680" y2="470"/>
    <line x1="830" y1="95" x2="830" y2="470"/>
  </g>

  <rect class="box" x="40" y="55" width="120" height="42" rx="3"/>
  <text class="label" x="100" y="74">K8s / 运维</text>
  <text class="sub" x="100" y="88" font-size="9">调度控制器</text>

  <rect class="box-core" x="240" y="55" width="120" height="42" rx="3"/>
  <text class="label" x="300" y="70">AI 卡使能</text>
  <text class="sub" x="300" y="83" font-size="9">阶段 d / e</text>
  <text class="sub" x="300" y="93" font-size="8">state.xml 写</text>

  <rect class="box" x="440" y="55" width="120" height="42" rx="3"/>
  <text class="label" x="500" y="70">device-plugin</text>
  <text class="sub" x="500" y="83" font-size="9">huawei.com/</text>
  <text class="sub" x="500" y="93" font-size="8">ascend-pool</text>

  <rect class="box" x="620" y="55" width="120" height="42" rx="3"/>
  <text class="label" x="680" y="70">qemu-monitor</text>
  <text class="sub" x="680" y="83" font-size="9">QMP</text>
  <text class="sub" x="680" y="93" font-size="8">device_add/del</text>

  <rect class="box" x="770" y="55" width="120" height="42" rx="3"/>
  <text class="label" x="830" y="74">NPU 2</text>
  <text class="sub" x="830" y="88" font-size="9">物理 Ascend</text>

  <!-- Steps -->
  <line class="arrow" x1="100" y1="120" x2="295" y2="120"/>
  <text class="sub" x="197" y="114" text-anchor="middle">1. DeinitRequest (release_npu=true)</text>

  <line class="arrow" x1="300" y1="144" x2="310" y2="144"/>
  <rect class="box" x="298" y="138" width="24" height="12" rx="2"/>
  <text class="sub" x="300" y="133" text-anchor="middle">2. (d) 撤销 NPU 2 模型分配</text>

  <line class="arrow" x1="300" y1="170" x2="495" y2="170"/>
  <text class="sub" x="397" y="164" text-anchor="middle">3. (e) 注销 NPU 2 (从 device-plugin)</text>

  <line class="arrow" x1="300" y1="194" x2="675" y2="194"/>
  <text class="sub" x="490" y="188" text-anchor="middle">4. AI 卡使能 → qemu-monitor (device_del)</text>

  <line class="arrow" x1="680" y1="218" x2="825" y2="218"/>
  <text class="sub" x="752" y="212" text-anchor="middle">5. qemu 拔 NPU 2</text>

  <line class="arrow-bad" x1="830" y1="242" x2="685" y2="242"/>
  <text class="sub" x="757" y="236" text-anchor="middle" fill="#a02020">6. NPU 2 释放回设备池</text>

  <line class="arrow" x1="300" y1="266" x2="310" y2="266"/>
  <rect class="box" x="298" y="260" width="24" height="12" rx="2"/>
  <text class="sub" x="300" y="255" text-anchor="middle">7. 写 state.xml (NPU 2: FAILED/UNREGISTERED)</text>

  <line class="arrow-good" x1="300" y1="292" x2="105" y2="292"/>
  <text class="sub" x="202" y="286" text-anchor="middle">8. DeinitResponse (unregistered_cards=1)</text>

  <line class="arrow" x1="100" y1="316" x2="110" y2="316"/>
  <rect class="box" x="98" y="310" width="24" height="12" rx="2"/>
  <text class="sub" x="100" y="305" text-anchor="middle">9. K8s 调度其他 Pod</text>

  <text x="470" y="342" text-anchor="middle" fill="#1a5432" font-size="11" font-weight="600">—— (反向) 一段时间后, 新 NPU 加入 ——</text>

  <line class="arrow" x1="100" y1="366" x2="295" y2="366"/>
  <text class="sub" x="197" y="360" text-anchor="middle">10. K8s 调 Init (新 NPU 加入)</text>

  <line class="arrow" x1="300" y1="390" x2="675" y2="390"/>
  <text class="sub" x="490" y="384" text-anchor="middle">11. qemu-monitor (device_add) → 插入 NPU</text>

  <line class="arrow-good" x1="300" y1="414" x2="310" y2="414"/>
  <rect class="box" x="298" y="408" width="24" height="12" rx="2"/>
  <text class="sub" x="300" y="403" text-anchor="middle">12. AI 卡使能阶段 (a-g) 重新加载</text>

  <!-- Bottom notes -->
  <rect class="bar" x="20" y="445" width="860" height="75" rx="3"/>
  <text x="30" y="464" fill="#333" font-size="11" font-weight="600">v3.2 多卡管理关键点</text>
  <text x="30" y="481" fill="#666" font-size="10" font-family="monospace">• qemu-monitor (QMP): device_del 拔卡 / device_add 插卡, PCIe VFIO 热插拔核心</text>
  <text x="30" y="497" fill="#666" font-size="10">• 拔卡链: (d) 撤销模型分配 → (e) 注销 device-plugin → device_del → 写 state.xml (UNREGISTERED)</text>
  <text x="30" y="513" fill="#666" font-size="10">• 插卡链: K8s Init → device_add → AI 卡使能 (a-g) 全阶段重新加载, state.xml 恢复 READY</text>
</svg>
