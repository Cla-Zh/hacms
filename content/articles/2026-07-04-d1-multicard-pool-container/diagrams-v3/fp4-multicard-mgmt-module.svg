<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .box-core { fill: #fff3b0; stroke: #b89000; stroke-width: 2; }
    .box-fade { fill: #fafafa; stroke: #ccc; stroke-width: 1; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .label-core { fill: #5a4400; font-size: 13px; font-weight: 700; text-anchor: middle; }
    .label-fade { fill: #999; font-size: 13px; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .sub-fade { fill: #aaa; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-thin { stroke: #666; stroke-width: 1; fill: none; marker-end: url(#arr2); }
    .callout-core { fill: #fff3b0; stroke: #b89000; stroke-width: 1.5; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>

  <text x="400" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">FP4: AI 推理服务多卡管理 — 子模块图 (注册 / 去注册 + AI 卡使能)</text>
  <text x="400" y="40" text-anchor="middle" fill="#666" font-size="11">核心子模块: AI 卡使能 (黄) · 联动: AI 卡状态感知 + vNic 维护端口</text>

  <!-- Input -->
  <rect class="box" x="20" y="60" width="760" height="50" rx="3"/>
  <text x="400" y="80" class="label" font-size="12">触发: Init 阶段 e + 热插拔事件 (onAttach / onDetach) + Deinit</text>
  <text x="400" y="98" class="sub">操作: register_card / unregister_card → device-plugin + ACL bind/unbind</text>

  <!-- vNic (淡灰) -->
  <rect class="box-fade" x="20" y="130" width="148" height="240" rx="4"/>
  <text x="94" y="150" class="label-fade">§15.1 vNic 通信</text>
  <rect class="box-fade" x="30" y="160" width="128" height="40" rx="3"/>
  <text x="94" y="178" class="label-fade" font-size="11">维护 :50053</text>
  <text x="94" y="192" class="sub-fade" font-size="9">Register / Unregister 入口</text>
  <text x="94" y="345" class="sub-fade" font-size="9">—— 入口层 ——</text>

  <!-- 多模型推理框架 (淡灰) -->
  <rect class="box-fade" x="178" y="130" width="148" height="240" rx="4"/>
  <text x="252" y="150" class="label-fade">§15.2 多模型推理框架</text>
  <rect class="box-fade" x="188" y="160" width="128" height="40" rx="3"/>
  <text x="252" y="178" class="label-fade" font-size="11">model_routing_table</text>
  <text x="252" y="192" class="sub-fade" font-size="9">注册时增项 / 去注册时删项</text>
  <text x="252" y="345" class="sub-fade" font-size="9">—— 路由表同步 ——</text>

  <!-- 健康监控 (淡灰) -->
  <rect class="box-fade" x="336" y="130" width="148" height="240" rx="4"/>
  <text x="410" y="150" class="label-fade">§15.3 健康监控</text>
  <rect class="box-fade" x="346" y="160" width="128" height="40" rx="3"/>
  <text x="410" y="178" class="label-fade" font-size="11">新增 NPU 健康探测</text>
  <text x="410" y="192" class="sub-fade" font-size="9">注册时建 1s 探针</text>
  <text x="410" y="345" class="sub-fade" font-size="9">—— 健康状态联动 ——</text>

  <!-- AI 卡使能 (核心, 黄) -->
  <rect class="box-core" x="494" y="130" width="148" height="240" rx="4"/>
  <text x="568" y="150" class="label-core">§15.4 AI 卡使能 ⭐</text>
  <rect class="box" x="504" y="158" width="128" height="26" rx="3"/>
  <text x="568" y="175" class="label" font-size="10">RegisterNpu(device, card_id)</text>
  <rect class="box" x="504" y="186" width="128" height="26" rx="3"/>
  <text x="568" y="203" class="label" font-size="10">UnregisterNpu(device, reason)</text>
  <rect class="box" x="504" y="214" width="128" height="26" rx="3"/>
  <text x="568" y="231" class="label" font-size="10">device-plugin 通信</text>
  <rect class="box" x="504" y="242" width="128" height="26" rx="3"/>
  <text x="568" y="259" class="label" font-size="10">ACL bind / unbind</text>
  <rect class="box" x="504" y="270" width="128" height="26" rx="3"/>
  <text x="568" y="287" class="label" font-size="10">持久化注册表</text>
  <text x="568" y="335" class="sub" font-weight="600">"AI 卡生命周期核心"</text>
  <text x="568" y="350" class="sub" font-size="9">d 注册 + e 去注册</text>

  <!-- AI 卡状态感知 (淡灰) -->
  <rect class="box-fade" x="652" y="130" width="128" height="240" rx="4"/>
  <text x="716" y="150" class="label-fade">§15.5 状态感知</text>
  <rect class="box-fade" x="662" y="160" width="108" height="40" rx="3"/>
  <text x="716" y="178" class="label-fade" font-size="11">Qemu 热插拔</text>
  <text x="716" y="192" class="sub-fade" font-size="9">触发 onAttach/onDetach</text>
  <text x="716" y="345" class="sub-fade" font-size="9">—— 触发源 ——</text>

  <!-- Output -->
  <rect class="box" x="20" y="385" width="760" height="55" rx="3"/>
  <text x="400" y="405" class="label" font-size="12">输出: K8s 设备资源 + ACL 句柄表 + 告警 (CARD_REGISTER_FAIL / CARD_UNREGISTERED)</text>
  <text x="400" y="423" class="sub">频率: 启动一次 + 热插拔事件触发 (低频); 与 AIDeploymentService.RegisterCard 对接</text>

  <!-- Yellow callout -->
  <rect class="callout-core" x="494" y="110" width="148" height="14" rx="2" opacity="0.85"/>
  <text x="568" y="121" text-anchor="middle" fill="#5a4400" font-size="9" font-weight="700">CORE: §15.4 AI 卡使能</text>

  <!-- Arrows -->
  <line class="arrow" x1="568" y1="130" x2="568" y2="158"/>
  <line class="arrow" x1="716" y1="160" x2="622" y2="190" stroke="#bbb" stroke-dasharray="2,2"/>
  <line class="arrow" x1="252" y1="160" x2="504" y2="270" stroke="#bbb" stroke-dasharray="2,2"/>
  <line class="arrow" x1="410" y1="160" x2="504" y2="240" stroke="#bbb" stroke-dasharray="2,2"/>
  <line class="arrow" x1="94" y1="160" x2="504" y2="180" stroke="#bbb" stroke-dasharray="2,2"/>
  <line class="arrow" x1="568" y1="370" x2="400" y2="385"/>
</svg>