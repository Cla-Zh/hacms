<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .box-core { fill: #fff3b0; stroke: #b89000; stroke-width: 2; }
    .box-fade { fill: #fafafa; stroke: #ccc; stroke-width: 1; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .label-core { fill: #5a4400; font-size: 13px; font-weight: 700; text-anchor: middle; }
    .label-fade { fill: #999; font-size: 13px; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .sub-fade { fill: #aaa; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-thin { stroke: #666; stroke-width: 1; fill: none; marker-end: url(#arr2); }
    .callout-core { fill: #fff3b0; stroke: #b89000; stroke-width: 1.5; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>

  <text x="400" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">FP9: AI 卡激活虚拟机 + 驱动固件安装 — 子模块图 (§17.1 ActivateVM 5 阶段)</text>
  <text x="400" y="40" text-anchor="middle" fill="#666" font-size="11">核心子模块: AIDeploymentService 自身 (黄) · 5 阶段: PowerOn→驱动→固件→NPU可见→卡片注册</text>

  <!-- Input -->
  <rect class="box" x="20" y="60" width="760" height="50" rx="3"/>
  <text x="400" y="80" class="label" font-size="12">触发: K8s 部署控制器 → AIDeploymentService.ActivateVM(vm_id, vm_image, npu_pci_ids, driver_version, firmware_version)</text>
  <text x="400" y="98" class="sub">v3.1 取代 v3.0 cann-init.sh 启动 hook — gRPC 可编排, 可重试, 可观测</text>

  <!-- AIDeploymentService.AIVMOrchestrator (核心, 黄) -->
  <rect class="box-core" x="20" y="130" width="430" height="240" rx="4"/>
  <text x="235" y="150" class="label-core">§17 AIDeploymentService ⭐ (AIVMOrchestrator)</text>
  <rect class="box" x="30" y="160" width="410" height="32" rx="3"/>
  <text x="235" y="178" class="label" font-size="11">① PowerOn (libvirt domain.create)</text>
  <text x="235" y="188" class="sub" font-size="9">启动 Qemu 进程, PCIe 透传 NPU</text>
  <rect class="box" x="30" y="195" width="410" height="32" rx="3"/>
  <text x="235" y="213" class="label" font-size="11">② DriverInstall (modprobe ascend)</text>
  <text x="235" y="223" class="sub" font-size="9">校验 driver_version, 加载驱动模块</text>
  <rect class="box" x="30" y="230" width="410" height="32" rx="3"/>
  <text x="235" y="248" class="label" font-size="11">③ FirmwareVerify (dmesg + ascend-tool</text>
  <text x="235" y="258" class="sub" font-size="9">检查 firmware_version, 不匹配则告警</text>
  <rect class="box" x="30" y="265" width="410" height="32" rx="3"/>
  <text x="235" y="283" class="label" font-size="11">④ NPUScan (lspci / ascend-tool)</text>
  <text x="235" y="293" class="sub" font-size="9">确认 8 NPU 在 VM 内可见</text>
  <rect class="box" x="30" y="300" width="410" height="32" rx="3"/>
  <text x="235" y="318" class="label" font-size="11">⑤ RegisterCard → device-plugin</text>
  <text x="235" y="328" class="sub" font-size="9">返回 deployment_token 给 Activate</text>
  <text x="235" y="355" class="sub" font-weight="600">"5 阶段顺序执行, 任一失败 → ReportDeploymentAlert"</text>

  <!-- Qemu/libvirt (淡灰, 协作方) -->
  <rect class="box-fade" x="460" y="130" width="160" height="115" rx="4"/>
  <text x="540" y="150" class="label-fade">Qemu/libvirt</text>
  <rect class="box-fade" x="470" y="160" width="140" height="32" rx="3"/>
  <text x="540" y="178" class="label-fade" font-size="11">domain.create</text>
  <text x="540" y="188" class="sub-fade" font-size="9">Qemu 启动 + PCIe 透传</text>
  <rect class="box-fade" x="470" y="200" width="140" height="32" rx="3"/>
  <text x="540" y="218" class="label-fade" font-size="11">hot-plug 事件</text>
  <text x="540" y="228" class="sub-fade" font-size="9">驱动加载回调</text>

  <!-- 驱动 / 固件 (淡灰) -->
  <rect class="box-fade" x="460" y="255" width="160" height="115" rx="4"/>
  <text x="540" y="275" class="label-fade">驱动 + 固件</text>
  <rect class="box-fade" x="470" y="285" width="140" height="32" rx="3"/>
  <text x="540" y="303" class="label-fade" font-size="11">modprobe drv_*</text>
  <text x="540" y="313" class="sub-fade" font-size="9">ascend 910B / 310P 驱动</text>
  <rect class="box-fade" x="470" y="325" width="140" height="32" rx="3"/>
  <text x="540" y="343" class="label-fade" font-size="11">/lib/firmware/ascend</text>
  <text x="540" y="353" class="sub-fade" font-size="9">固件版本校验</text>

  <!-- Output -->
  <rect class="box" x="20" y="385" width="760" height="55" rx="3"/>
  <text x="400" y="405" class="label" font-size="12">输出: ActivateVMResponse { activated=true, activated_npu_ids=[0..7], qemu_pid, inference_port=50051, deployment_token }</text>
  <text x="400" y="423" class="sub">失败时: activated=false + failure_reason → 调 ReportDeploymentAlert (FP10); 客户端拿到 inference_port 调 AIInferenceService.Init</text>

  <!-- Yellow callout -->
  <rect class="callout-core" x="20" y="110" width="430" height="14" rx="2" opacity="0.85"/>
  <text x="235" y="121" text-anchor="middle" fill="#5a4400" font-size="9" font-weight="700">CORE: §17 AIDeploymentService.AIVMOrchestrator</text>

  <!-- Arrows -->
  <line class="arrow" x1="235" y1="130" x2="400" y2="110"/>
  <line class="arrow" x1="450" y1="180" x2="440" y2="200" stroke="#bbb" stroke-dasharray="2,2"/>
  <line class="arrow" x1="540" y1="245" x2="440" y2="220" stroke="#bbb" stroke-dasharray="2,2"/>
  <line class="arrow" x1="235" y1="370" x2="400" y2="385"/>
</svg>