<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .box-core { fill: #fff3b0; stroke: #b89000; stroke-width: 2; }
    .box-fade { fill: #fafafa; stroke: #ccc; stroke-width: 1; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .label-core { fill: #5a4400; font-size: 13px; font-weight: 700; text-anchor: middle; }
    .label-fade { fill: #999; font-size: 13px; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .sub-fade { fill: #aaa; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-thin { stroke: #666; stroke-width: 1; fill: none; marker-end: url(#arr2); }
    .callout-core { fill: #fff3b0; stroke: #b89000; stroke-width: 1.5; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>

  <text x="400" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">FP6: AI 推理服务健康检查 — 子模块图 (Check + 多维探测)</text>
  <text x="400" y="40" text-anchor="middle" fill="#666" font-size="11">核心子模块: 健康监控 (黄) · 触发: K8s liveness/readiness probe</text>

  <!-- Input -->
  <rect class="box" x="20" y="60" width="760" height="50" rx="3"/>
  <text x="400" y="80" class="label" font-size="12">触发: HealthService.Check(check_type) — K8s probe (liveness / readiness / startup)</text>
  <text x="400" y="98" class="sub">输入: CheckType { LIVENESS, READINESS, STARTUP } + timeout_ms</text>

  <!-- vNic (淡灰) -->
  <rect class="box-fade" x="20" y="130" width="148" height="240" rx="4"/>
  <text x="94" y="150" class="label-fade">§15.1 vNic 通信</text>
  <rect class="box-fade" x="30" y="160" width="128" height="40" rx="3"/>
  <text x="94" y="178" class="label-fade" font-size="11">Health gRPC :50052</text>
  <text x="94" y="192" class="sub-fade" font-size="9">Check RPC 入口</text>
  <text x="94" y="345" class="sub-fade" font-size="9">—— 入口层 ——</text>

  <!-- 多模型推理框架 (淡灰) -->
  <rect class="box-fade" x="178" y="130" width="148" height="240" rx="4"/>
  <text x="252" y="150" class="label-fade">§15.2 多模型推理框架</text>
  <rect class="box-fade" x="188" y="160" width="128" height="40" rx="3"/>
  <text x="252" y="178" class="label-fade" font-size="11">模型活跃状态</text>
  <text x="252" y="192" class="sub-fade" font-size="9">活跃模型数 / 队列深度</text>
  <text x="252" y="345" class="sub-fade" font-size="9">—— 状态输入 ——</text>

  <!-- 健康监控 (核心, 黄) -->
  <rect class="box-core" x="336" y="130" width="160" height="240" rx="4"/>
  <text x="416" y="150" class="label-core">§15.3 健康监控 ⭐</text>
  <rect class="box" x="346" y="158" width="140" height="28" rx="3"/>
  <text x="416" y="176" class="label" font-size="10">NPU 健康探测 (1s)</text>
  <rect class="box" x="346" y="188" width="140" height="28" rx="3"/>
  <text x="416" y="206" class="label" font-size="10">temp / power / util</text>
  <rect class="box" x="346" y="218" width="140" height="28" rx="3"/>
  <text x="416" y="236" class="label" font-size="10">CANN/HCCL 健康</text>
  <rect class="box" x="346" y="248" width="140" height="28" rx="3"/>
  <text x="416" y="266" class="label" font-size="10">资源使用 (显存/队列)</text>
  <rect class="box" x="346" y="278" width="140" height="28" rx="3"/>
  <text x="416" y="296" class="label" font-size="10">ServingStatus 汇总</text>
  <text x="416" y="335" class="sub" font-weight="600">"多维度健康评分"</text>

  <!-- AI 卡使能 (淡灰) -->
  <rect class="box-fade" x="506" y="130" width="148" height="240" rx="4"/>
  <text x="580" y="150" class="label-fade">§15.4 AI 卡使能</text>
  <rect class="box-fade" x="516" y="160" width="128" height="40" rx="3"/>
  <text x="580" y="178" class="label-fade" font-size="11">注册状态</text>
  <text x="580" y="192" class="sub-fade" font-size="9">device-plugin 健康</text>
  <text x="580" y="345" class="sub-fade" font-size="9">—— 状态输入 ——</text>

  <!-- AI 卡状态感知 (淡灰) -->
  <rect class="box-fade" x="664" y="130" width="116" height="240" rx="4"/>
  <text x="722" y="150" class="label-fade">§15.5 状态感知</text>
  <rect class="box-fade" x="674" y="160" width="96" height="40" rx="3"/>
  <text x="722" y="178" class="label-fade" font-size="11">NPU 数量</text>
  <text x="722" y="192" class="sub-fade" font-size="9">已注册 vs 在线</text>
  <text x="722" y="345" class="sub-fade" font-size="9">—— 状态输入 ——</text>

  <!-- Output -->
  <rect class="box" x="20" y="385" width="760" height="55" rx="3"/>
  <text x="400" y="405" class="label" font-size="12">输出: HealthCheckResponse { serving_status={SERVING/NOT_SERVING/UNKNOWN}, message, cann_health, details[] }</text>
  <text x="400" y="423" class="sub">频率: K8s probe 每 10s (liveness) / 每 5s (readiness); 与 K8s 探针集成</text>

  <!-- Yellow callout -->
  <rect class="callout-core" x="336" y="110" width="160" height="14" rx="2" opacity="0.85"/>
  <text x="416" y="121" text-anchor="middle" fill="#5a4400" font-size="9" font-weight="700">CORE: §15.3 健康监控</text>

  <!-- Arrows -->
  <line class="arrow" x1="94" y1="180" x2="346" y2="200"/>
  <line class="arrow" x1="252" y1="160" x2="356" y2="220" stroke="#bbb" stroke-dasharray="2,2"/>
  <line class="arrow" x1="580" y1="160" x2="446" y2="240" stroke="#bbb" stroke-dasharray="2,2"/>
  <line class="arrow" x1="722" y1="160" x2="476" y2="260" stroke="#bbb" stroke-dasharray="2,2"/>
  <line class="arrow" x1="416" y1="370" x2="400" y2="385"/>
</svg>