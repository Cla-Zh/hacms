<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .bar { fill: #fafafa; stroke: #ccc; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="400" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">故障检测时序图 (D1 · Ascend)</text>
  <text x="400" y="40" text-anchor="middle" fill="#666" font-size="11">v3.0 · 健康检查从 PCIe link 改为 HCCS link · 1s 探测 + 5s 隔离</text>

  <line x1="100" y1="60" x2="100" y2="395" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="320" y1="60" x2="320" y2="395" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="540" y1="60" x2="540" y2="395" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="720" y1="60" x2="720" y2="395" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>

  <rect class="box" x="40" y="50" width="120" height="35" rx="3"/>
  <text class="label" x="100" y="72">D-Card Mgr</text>

  <rect class="box" x="260" y="50" width="120" height="35" rx="3"/>
  <text class="label" x="320" y="72">HealthChecker</text>

  <rect class="box" x="480" y="50" width="120" height="35" rx="3"/>
  <text class="label" x="540" y="72">CANN HAL 8.0.RC2</text>

  <rect class="box" x="660" y="50" width="120" height="35" rx="3"/>
  <text class="label" x="720" y="72">K8s Plugin</text>

  <!-- T+0 -->
  <line class="arrow" x1="100" y1="110" x2="315" y2="110"/>
  <text class="sub" x="207" y="103">T+0s: tick 1s probe</text>

  <line class="arrow" x1="320" y1="135" x2="535" y2="135"/>
  <text class="sub" x="427" y="128">probe HCCS link (ring+mesh)</text>

  <line class="arrow" x1="540" y1="160" x2="325" y2="160" stroke-dasharray="2,2"/>
  <text class="sub" x="427" y="153">HCCS link DOWN (peer 心跳超时)</text>

  <line class="arrow" x1="320" y1="188" x2="105" y2="188" stroke-dasharray="2,2"/>
  <text class="sub" x="207" y="181">UNHEALTHY (1/3)</text>

  <!-- T+1s -->
  <line class="arrow" x1="100" y1="216" x2="315" y2="216"/>
  <text class="sub" x="207" y="209">T+1s: probe</text>

  <line class="arrow" x1="320" y1="241" x2="535" y2="241"/>
  <line class="arrow" x1="540" y1="266" x2="325" y2="266" stroke-dasharray="2,2"/>
  <text class="sub" x="427" y="259">HCCS link DOWN</text>

  <line class="arrow" x1="320" y1="291" x2="105" y2="291" stroke-dasharray="2,2"/>
  <text class="sub" x="207" y="284">UNHEALTHY (2/3)</text>

  <!-- T+2s -->
  <line class="arrow" x1="100" y1="318" x2="315" y2="318"/>
  <text class="sub" x="207" y="311">T+2s: probe (3次失败确认)</text>

  <line class="arrow" x1="100" y1="343" x2="715" y2="343"/>
  <text class="sub" x="400" y="336">deregister ascend-pool NPU slices from K8s</text>

  <line class="arrow" x1="720" y1="368" x2="105" y2="368" stroke-dasharray="2,2"/>
  <text class="sub" x="400" y="361">deregistered → FAILED state · 收回归收区</text>

  <rect class="bar" x="30" y="385" width="740" height="65" rx="3"/>
  <text x="40" y="403" fill="#333" font-size="13" font-weight="600">v3.0 故障检测设计 (Ascend)</text>
  <text x="40" y="420" fill="#666" font-size="11">• 健康探针: HealthChecker → CANN HAL 8.0.RC2 → HCCS peer 心跳 (替代 v1.0 PCIe link 探测)</text>
  <text x="40" y="435" fill="#666" font-size="11">• 1s 探测 + 3 次连续失败确认; D1 只隔离 + 注销, 不迁移 (D3 Hot-Swap Orchestrator 范围)</text>
</svg>
