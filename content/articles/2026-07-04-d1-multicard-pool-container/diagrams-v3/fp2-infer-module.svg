<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .box-core { fill: #fff3b0; stroke: #b89000; stroke-width: 2; }
    .box-fade { fill: #fafafa; stroke: #ccc; stroke-width: 1; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .label-core { fill: #5a4400; font-size: 13px; font-weight: 700; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .sub-fade { fill: #aaa; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-thin { stroke: #666; stroke-width: 1; fill: none; marker-end: url(#arr2); }
    .callout-core { fill: #fff3b0; stroke: #b89000; stroke-width: 1.5; }
    .mono { font-family: monospace; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>

  <text x="400" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">FP2: 推理接口 — 子模块图 (vNic URL + 3 卡 3 池)</text>
  <text x="400" y="40" text-anchor="middle" fill="#666" font-size="11">vNic 业务面 vnic://vnic0:50051 · 多模型推理框架 (3 线程池 + 调度器) · 3 × NPU</text>

  <!-- Top: 外部用户应用 -->
  <rect class="box" x="20" y="52" width="760" height="40" rx="3"/>
  <text x="400" y="70" class="label" font-size="12">① 外部用户应用 (推理客户端 / 业务容器)</text>
  <text x="400" y="85" class="sub">gRPC client, 发起 Infer(model_id, input)</text>

  <!-- vNic 通信 callout (yellow) -->
  <rect class="callout-core" x="20" y="102" width="760" height="46" rx="3"/>
  <text x="400" y="120" class="label-core" font-size="12">② vNic 通信 (虚拟网卡 gRPC)</text>
  <text x="220" y="138" text-anchor="middle" fill="#5a4400" font-size="11" font-family="monospace">vnic://vnic0:50051 (业务面)</text>
  <text x="580" y="138" text-anchor="middle" fill="#5a4400" font-size="11" font-family="monospace">vnic://vnic0:50053 (管理面)</text>

  <line class="arrow" x1="400" y1="92" x2="400" y2="102"/>

  <!-- 中部: 多模型推理框架 -->
  <rect class="box" x="20" y="160" width="760" height="180" rx="4"/>
  <text x="400" y="180" class="label">③ 多模型推理框架</text>

  <!-- 模型调度器 -->
  <rect class="box-core" x="40" y="192" width="220" height="60" rx="3"/>
  <text x="150" y="212" class="label-core" font-size="12">模型调度器</text>
  <text x="150" y="230" text-anchor="middle" fill="#5a4400" font-size="10">round-robin /</text>
  <text x="150" y="244" text-anchor="middle" fill="#5a4400" font-size="10">least-connections</text>

  <!-- 升降级模型 -->
  <rect class="box-fade" x="40" y="262" width="220" height="60" rx="3"/>
  <text x="150" y="282" class="label" font-size="12">升降级模型</text>
  <text x="150" y="300" class="sub">高负载降级 (llama-7b→bert)</text>
  <text x="150" y="314" class="sub">低负载升级回原模型</text>

  <!-- 3 线程池 -->
  <rect class="box" x="280" y="192" width="160" height="130" rx="3"/>
  <text x="360" y="210" class="label" font-size="12">线程池 0</text>
  <text x="360" y="226" class="sub">→ NPU 0 (1 池 1 卡)</text>
  <text x="360" y="242" class="sub-fade" font-size="9">resnet50 / bert / llama</text>
  <line x1="290" y1="252" x2="430" y2="252" stroke="#ddd"/>
  <text x="360" y="270" class="sub">aclmdlExecute worker</text>
  <text x="360" y="290" class="sub-fade" font-size="9">1 物理 NPU = 1 线程池</text>
  <text x="360" y="308" class="sub-fade" font-size="9">每卡 1 池 + 3 模型</text>

  <rect class="box" x="450" y="192" width="150" height="130" rx="3"/>
  <text x="525" y="210" class="label" font-size="12">线程池 1</text>
  <text x="525" y="226" class="sub">→ NPU 1</text>
  <text x="525" y="242" class="sub-fade" font-size="9">resnet50 / bert / llama</text>
  <line x1="460" y1="252" x2="590" y2="252" stroke="#ddd"/>
  <text x="525" y="272" class="sub">worker × N</text>

  <rect class="box" x="610" y="192" width="150" height="130" rx="3"/>
  <text x="685" y="210" class="label" font-size="12">线程池 2</text>
  <text x="685" y="226" class="sub">→ NPU 2</text>
  <text x="685" y="242" class="sub-fade" font-size="9">resnet50 / bert / llama</text>
  <line x1="620" y1="252" x2="750" y2="252" stroke="#ddd"/>
  <text x="685" y="272" class="sub">worker × N</text>

  <line class="arrow-thin" x1="260" y1="222" x2="280" y2="230"/>
  <line class="arrow-thin" x1="260" y1="222" x2="450" y2="230"/>
  <line class="arrow-thin" x1="260" y1="222" x2="610" y2="230"/>

  <line class="arrow" x1="400" y1="148" x2="400" y2="160"/>

  <!-- 底部: 3 × NPU -->
  <rect class="box" x="20" y="352" width="760" height="96" rx="4"/>
  <text x="400" y="370" class="label" font-size="12">④ 物理层: 3 × NPU (每卡 1 池 + 3 模型)</text>
  <rect class="box-fade" x="60" y="380" width="210" height="58" rx="3"/>
  <text x="165" y="398" class="sub" font-weight="600">NPU 0</text>
  <text x="165" y="414" class="sub-fade" font-size="9">resnet50 / bert-base / llama-7b</text>
  <text x="165" y="428" class="sub-fade" font-size="9">deviceid 0</text>
  <rect class="box-fade" x="295" y="380" width="210" height="58" rx="3"/>
  <text x="400" y="398" class="sub" font-weight="600">NPU 1</text>
  <text x="400" y="414" class="sub-fade" font-size="9">resnet50 / bert-base / llama-7b</text>
  <text x="400" y="428" class="sub-fade" font-size="9">deviceid 1</text>
  <rect class="box-fade" x="530" y="380" width="210" height="58" rx="3"/>
  <text x="635" y="398" class="sub" font-weight="600">NPU 2</text>
  <text x="635" y="414" class="sub-fade" font-size="9">resnet50 / bert-base / llama-7b</text>
  <text x="635" y="428" class="sub-fade" font-size="9">deviceid 2</text>

  <line class="arrow" x1="360" y1="322" x2="165" y2="380"/>
  <line class="arrow" x1="525" y1="322" x2="400" y2="380"/>
  <line class="arrow" x1="685" y1="322" x2="635" y2="380"/>
</svg>
