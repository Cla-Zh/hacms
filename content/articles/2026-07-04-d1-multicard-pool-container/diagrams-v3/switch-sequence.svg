<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="sans-serif" font-size="13" fill="#222">
  <defs>
    <marker id="arrow-2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <marker id="arrow-2-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d7a2d"/>
    </marker>
  </defs>
  <rect width="900" height="540" fill="#fff"/>
  <text x="20" y="22" font-size="15" font-weight="700">时序图: 防勒索服务切换 AI 卡 (5 阶段: 激活 / 探测 / 切换 / 路由 / 关停)</text>
  <text x="20" y="40" font-size="11" fill="#666">v3.2 新增 — §24.3 — 6 个 actor, Unix Domain Socket 内部通信</text>

  <rect x="50" y="60" width="80" height="30" fill="#fff" stroke="#333" stroke-width="1.2"/>
  <text x="90" y="80" text-anchor="middle" font-size="12" font-weight="700">dctl</text>
  <line x1="90" y1="90" x2="90" y2="510" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>

  <rect x="160" y="60" width="80" height="30" fill="#fff" stroke="#333" stroke-width="1.2"/>
  <text x="200" y="74" text-anchor="middle" font-size="11" font-weight="700">activate.sh</text>
  <text x="200" y="86" text-anchor="middle" font-size="9" fill="#666">(启动脚本)</text>
  <line x1="200" y1="90" x2="200" y2="510" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>

  <rect x="280" y="60" width="100" height="30" fill="#fff" stroke="#333" stroke-width="1.2"/>
  <text x="330" y="80" text-anchor="middle" font-size="12" font-weight="700">AI 推理服务</text>
  <line x1="330" y1="90" x2="330" y2="510" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>

  <rect x="420" y="60" width="100" height="30" fill="#fff" stroke="#333" stroke-width="1.2"/>
  <text x="470" y="80" text-anchor="middle" font-size="12" font-weight="700">SwitchCtrl</text>
  <line x1="470" y1="90" x2="470" y2="510" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>

  <rect x="560" y="60" width="100" height="30" fill="#fff" stroke="#333" stroke-width="1.2"/>
  <text x="610" y="74" text-anchor="middle" font-size="12" font-weight="700">anti-ransom</text>
  <text x="610" y="86" text-anchor="middle" font-size="9" fill="#666">(CPU 容器外)</text>
  <line x1="610" y1="90" x2="610" y2="510" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>

  <rect x="700" y="60" width="140" height="30" fill="#fff" stroke="#333" stroke-width="1.2"/>
  <text x="770" y="80" text-anchor="middle" font-size="12" font-weight="700">MessageRouter</text>
  <line x1="770" y1="90" x2="770" y2="510" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- 阶段 1: 激活 -->
  <rect x="40" y="105" width="810" height="60" fill="#fff8e1" stroke="#e0c97f" stroke-width="0.8"/>
  <text x="50" y="120" font-size="11" font-weight="700" fill="#a07020">阶段 1: 激活 AI 卡 (15s)</text>

  <line x1="92" y1="130" x2="198" y2="130" stroke="#333" stroke-width="1.2" marker-end="url(#arrow-2)"/>
  <text x="145" y="124" text-anchor="middle" font-size="10">① dctl activate</text>

  <line x1="202" y1="148" x2="328" y2="148" stroke="#333" stroke-width="1.2" marker-end="url(#arrow-2)"/>
  <text x="265" y="142" text-anchor="middle" font-size="10">② 加载驱动 + 分配 ACL 24GB</text>

  <!-- 阶段 2: 健康探测 -->
  <rect x="40" y="175" width="810" height="80" fill="#f0f4ff" stroke="#a0b0d0" stroke-width="0.8"/>
  <text x="50" y="190" font-size="11" font-weight="700" fill="#3a4a6b">阶段 2: 健康探测 (5s)</text>

  <line x1="332" y1="200" x2="328" y2="200" stroke="#333" stroke-width="1.2" marker-end="url(#arrow-2)"/>
  <text x="330" y="194" text-anchor="middle" font-size="9">self</text>

  <line x1="332" y1="215" x2="468" y2="215" stroke="#333" stroke-width="1.2" marker-end="url(#arrow-2)"/>
  <text x="400" y="209" text-anchor="middle" font-size="10">③ /v1/health/check</text>

  <line x1="470" y1="230" x2="332" y2="230" stroke="#2d7a2d" stroke-width="1.2" marker-end="url(#arrow-2-green)"/>
  <text x="400" y="224" text-anchor="middle" font-size="10" fill="#2d7a2d">④ SERVING (3 层全 PASS)</text>

  <line x1="470" y1="245" x2="608" y2="245" stroke="#333" stroke-width="1.2" marker-end="url(#arrow-2)"/>
  <text x="540" y="239" text-anchor="middle" font-size="10">⑤ 通知 anti-ransom</text>

  <!-- 阶段 3: 模型就绪 -->
  <rect x="40" y="265" width="810" height="60" fill="#e7f4e7" stroke="#80b080" stroke-width="0.8"/>
  <text x="50" y="280" font-size="11" font-weight="700" fill="#2d7a2d">阶段 3: 模型就绪 (3s, 异步)</text>

  <line x1="332" y1="295" x2="468" y2="295" stroke="#2d7a2d" stroke-width="1.2" marker-end="url(#arrow-2-green)"/>
  <text x="400" y="289" text-anchor="middle" font-size="10" fill="#2d7a2d">⑥ model-ready (resnet50/bert/llama-7b 全 loaded)</text>

  <line x1="470" y1="315" x2="608" y2="315" stroke="#2d7a2d" stroke-width="1.2" marker-end="url(#arrow-2-green)"/>
  <text x="540" y="309" text-anchor="middle" font-size="10" fill="#2d7a2d">⑦ anti-ransom ACK</text>

  <!-- 阶段 4: 切换决策 -->
  <rect x="40" y="335" width="810" height="60" fill="#fff3b0" stroke="#d0b040" stroke-width="0.8"/>
  <text x="50" y="350" font-size="11" font-weight="700" fill="#a07020">阶段 4: 切换决策 (1s)</text>

  <line x1="470" y1="365" x2="770" y2="365" stroke="#333" stroke-width="1.2" marker-end="url(#arrow-2)"/>
  <text x="620" y="359" text-anchor="middle" font-size="10">⑧ RouteUpdate (io_source = AI_INFERENCE)</text>

  <line x1="770" y1="385" x2="610" y2="385" stroke="#2d7a2d" stroke-width="1.2" marker-end="url(#arrow-2-green)"/>
  <text x="690" y="379" text-anchor="middle" font-size="10" fill="#2d7a2d">⑨ ACK (切换开始生效)</text>

  <!-- 阶段 5: 路由 + 关停 -->
  <rect x="40" y="405" width="810" height="80" fill="#e7f4e7" stroke="#2d7a2d" stroke-width="0.8"/>
  <text x="50" y="420" font-size="11" font-weight="700" fill="#2d7a2d">阶段 5: 路由生效 + CPU 关停 (2s)</text>

  <line x1="770" y1="435" x2="610" y2="435" stroke="#2d7a2d" stroke-width="1.2" marker-end="url(#arrow-2-green)"/>
  <text x="690" y="429" text-anchor="middle" font-size="10" fill="#2d7a2d">⑩ 后续 IO 消息 → AI 推理 (vnic://vnic0:50051)</text>

  <line x1="610" y1="455" x2="330" y2="455" stroke="#b03030" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrow-2)"/>
  <text x="470" y="449" text-anchor="middle" font-size="10" fill="#b03030">⑪ 转发 IO 特征到 vNic (PII 已脱敏)</text>

  <line x1="610" y1="475" x2="330" y2="475" stroke="#666" stroke-width="1" stroke-dasharray="2,2" marker-end="url(#arrow-2)"/>
  <text x="470" y="469" text-anchor="middle" font-size="10" fill="#666">⑫ CPU 推理进程 graceful shutdown</text>

  <rect x="40" y="495" width="810" height="20" fill="#fafafa" stroke="#666" stroke-width="0.6"/>
  <text x="50" y="510" font-size="10" fill="#666">总耗时 ~26s (15s 激活 + 5s 探测 + 3s 模型 + 1s 切换 + 2s 路由). 虚线箭头 = 状态/控制流, 实线箭头 = 数据/调用.</text>
</svg>
