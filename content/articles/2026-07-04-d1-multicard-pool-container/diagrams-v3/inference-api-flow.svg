<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" style="background: white; font-family: -apple-system, sans-serif;">
  <!-- D1 推理服务 HTTP API 调用链路图 -->
  <!-- 黑白灰 + 蓝强调 (#3a4a6b) -->

  <defs>
    <style>
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .subtitle { font-size: 12px; fill: #5a5a5a; }
      .label { font-size: 12px; font-weight: 600; fill: #1a1a1a; }
      .sub { font-size: 10px; fill: #5a5a5a; }
      .step { font-size: 11px; font-weight: 600; fill: #3a4a6b; }
      .desc { font-size: 10px; fill: #5a5a5a; }
      .arrow-text { font-size: 10px; fill: #1a1a1a; font-style: italic; }
      .box-blue { fill: #3a4a6b; stroke: #2c3a54; stroke-width: 1.5; }
      .box-white { fill: white; stroke: #3a4a6b; stroke-width: 1.5; }
      .box-gray { fill: #f0f0f0; stroke: #5a5a5a; stroke-width: 1; }
      .text-on-blue { fill: white; font-size: 11px; font-weight: 600; }
      .text-on-white { fill: #1a1a1a; font-size: 11px; }
    </style>
  </defs>

  <!-- 标题 -->
  <text x="450" y="30" text-anchor="middle" class="title">D1 AI 推理服务 HTTP API 调用链路 (v3.2)</text>
  <text x="450" y="50" text-anchor="middle" class="subtitle">从客户端到 3 × Ascend 910B NPU 端到端流程 — 走 vNic 业务面 (50051) + gRPC-Gateway</text>

  <!-- 第 1 层: 客户端 -->
  <rect x="50" y="80" width="180" height="70" rx="6" class="box-gray" />
  <text x="140" y="100" text-anchor="middle" class="step">1. 客户端</text>
  <text x="140" y="120" text-anchor="middle" class="label">curl / Python / Go / Java</text>
  <text x="140" y="138" text-anchor="middle" class="desc">HTTP/JSON + Bearer Token</text>

  <!-- 第 2 层: vNic 业务面 + envoy -->
  <rect x="290" y="80" width="200" height="70" rx="6" class="box-blue" />
  <text x="390" y="100" text-anchor="middle" class="text-on-blue">2. vNic 业务面 + envoy</text>
  <text x="390" y="118" text-anchor="middle" class="text-on-blue">vnic0:50051 (gRPC-Gateway)</text>
  <text x="390" y="135" text-anchor="middle" style="fill: #d6dce8; font-size: 10px;">JSON ↔ Protobuf 翻译 + Bearer 认证 + 限流</text>

  <!-- 第 3 层: AI 推理服务 6 子模块 -->
  <rect x="550" y="80" width="300" height="70" rx="6" class="box-white" />
  <text x="700" y="100" text-anchor="middle" class="step">3. AI 推理服务 (6 子模块)</text>
  <text x="700" y="120" text-anchor="middle" class="label">vNicServer + AIInference + CardMgr + Health + AIDeploy + LogCollector</text>
  <text x="700" y="138" text-anchor="middle" class="desc">gRPC :50050-:50056 内部通信</text>

  <!-- 第 4 层: ACL/CANN 中间件 -->
  <rect x="50" y="200" width="350" height="60" rx="6" class="box-gray" />
  <text x="225" y="220" text-anchor="middle" class="step">4. ACL / CANN 框架</text>
  <text x="225" y="240" text-anchor="middle" class="desc">内存分配 + 算子调度 + Tensor 搬运</text>

  <!-- 第 5 层: 3 张 NPU -->
  <rect x="50" y="300" width="800" height="120" rx="6" class="box-white" stroke-width="2" />
  <text x="450" y="325" text-anchor="middle" class="step">5. 3 × Ascend 910B NPU (3 池 3 模型, 最大 3 张)</text>

  <!-- NPU 0 -->
  <rect x="80" y="345" width="220" height="60" rx="4" class="box-blue" />
  <text x="190" y="365" text-anchor="middle" class="text-on-blue">NPU:0 (Ascend 910B #0)</text>
  <text x="190" y="383" text-anchor="middle" style="fill: white; font-size: 10px;">resnet50 + llama-7b</text>
  <text x="190" y="397" text-anchor="middle" style="fill: #d6dce8; font-size: 9px;">HBM 64GB / 算力 256 TFLOPS</text>

  <!-- NPU 1 -->
  <rect x="340" y="345" width="220" height="60" rx="4" class="box-blue" />
  <text x="450" y="365" text-anchor="middle" class="text-on-blue">NPU:1 (Ascend 910B #1)</text>
  <text x="450" y="383" text-anchor="middle" style="fill: white; font-size: 10px;">resnet50 + bert-base</text>
  <text x="450" y="397" text-anchor="middle" style="fill: #d6dce8; font-size: 9px;">HBM 64GB / 算力 256 TFLOPS</text>

  <!-- NPU 2 (inactive) -->
  <rect x="600" y="345" width="220" height="60" rx="4" fill="#f0f0f0" stroke="#9a9690" stroke-width="1" />
  <text x="710" y="365" text-anchor="middle" class="sub" style="font-weight: 600;">NPU:2 (inactive, 待命)</text>
  <text x="710" y="383" text-anchor="middle" class="desc">热插拔/扩缩容时启用</text>
  <text x="710" y="397" text-anchor="middle" class="desc">qemu-monitor 唤醒</text>

  <!-- 第 6 层: 持久化 (state.xml) -->
  <rect x="450" y="200" width="400" height="60" rx="6" class="box-gray" />
  <text x="650" y="220" text-anchor="middle" class="step">6. 持久化 (state.xml)</text>
  <text x="650" y="240" text-anchor="middle" class="desc">/var/lib/d1/state.xml — 模型加载/NPU 状态/XSD 校验</text>

  <!-- 箭头连接 (1→2) -->
  <line x1="230" y1="115" x2="285" y2="115" stroke="#3a4a6b" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="257" y="108" text-anchor="middle" class="arrow-text">HTTP/JSON</text>

  <!-- 箭头 (2→3) -->
  <line x1="490" y1="115" x2="545" y2="115" stroke="#3a4a6b" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="517" y="108" text-anchor="middle" class="arrow-text">gRPC</text>

  <!-- 箭头 (3→4, 多箭头) -->
  <line x1="600" y1="150" x2="350" y2="195" stroke="#3a4a6b" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <line x1="650" y1="150" x2="450" y2="195" stroke="#3a4a6b" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <line x1="700" y1="150" x2="550" y2="195" stroke="#3a4a6b" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <text x="500" y="175" text-anchor="middle" class="arrow-text">ACL 调用 (gRPC:50050-56)</text>

  <!-- 箭头 (4→5) -->
  <line x1="225" y1="260" x2="225" y2="295" stroke="#3a4a6b" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="245" y="280" class="arrow-text">ACL 算子 → NPU</text>

  <!-- 箭头 (5→6, 反馈) -->
  <line x1="710" y1="295" x2="710" y2="265" stroke="#9a9690" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowhead-gray)" />
  <text x="725" y="280" class="sub">状态写回 (XML 持久化)</text>

  <!-- 5 大 Endpoint 列表 (左下角) -->
  <rect x="50" y="445" width="800" height="80" rx="6" fill="#eef0f5" stroke="#3a4a6b" stroke-width="1" />
  <text x="450" y="465" text-anchor="middle" class="step">5 大 HTTP Endpoint (走 vnic0:50051 / :50053)</text>

  <!-- Endpoint 1 -->
  <text x="70" y="488" class="label">1. POST /v1/inference</text>
  <text x="70" y="503" class="desc">单次推理 (同步)</text>
  <!-- Endpoint 2 -->
  <text x="220" y="488" class="label">2. POST /v1/inference/stream</text>
  <text x="220" y="503" class="desc">流式推理 (SSE)</text>
  <!-- Endpoint 3 -->
  <text x="400" y="488" class="label">3. POST /v1/inference/batch</text>
  <text x="400" y="503" class="desc">批量推理 (≤32)</text>
  <!-- Endpoint 4 -->
  <text x="580" y="488" class="label">4. GET /v1/models</text>
  <text x="580" y="503" class="desc">模型列表</text>
  <!-- Endpoint 5 -->
  <text x="710" y="488" class="label">5. GET /v1/health</text>
  <text x="710" y="503" class="desc">健康 (管理面)</text>

  <!-- 箭头定义 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3a4a6b" />
    </marker>
    <marker id="arrowhead-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#9a9690" />
    </marker>
  </defs>
</svg>
