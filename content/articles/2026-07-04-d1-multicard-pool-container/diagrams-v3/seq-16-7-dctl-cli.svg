<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .box-fill { fill: #eef0f6; stroke: #3a4a6b; stroke-width: 1.5; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-dash { stroke: #666; stroke-width: 1.2; fill: none; marker-end: url(#arr2); stroke-dasharray: 3,2; }
    .bar { fill: #fafafa; stroke: #ccc; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>
  <text x="450" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">§16.7 AI 卡激活 CLI 命令 (dctl card deploy 全子命令)</text>
  <text x="450" y="40" text-anchor="middle" fill="#666" font-size="11">dctl → DeployService :50054 → Omtask → PreCheck + 防勒索 + 驱动 + 上报</text>

  <line x1="80" y1="65" x2="80" y2="480" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="220" y1="65" x2="220" y2="480" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="360" y1="65" x2="360" y2="480" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="500" y1="65" x2="500" y2="480" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="640" y1="65" x2="640" y2="480" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="800" y1="65" x2="800" y2="480" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>

  <rect class="box" x="20" y="50" width="120" height="40" rx="3"/><text class="label" x="80" y="73">操作员</text><text class="sub" x="80" y="86" font-size="9">SSH / Bastion</text>
  <rect class="box" x="170" y="50" width="100" height="40" rx="3"/><text class="label" x="220" y="73">dctl CLI</text><text class="sub" x="220" y="86" font-size="9">Go binary</text>
  <rect class="box" x="310" y="50" width="100" height="40" rx="3"/><text class="label" x="360" y="73">DeployService</text><text class="sub" x="360" y="86" font-size="9">:50054</text>
  <rect class="box" x="450" y="50" width="100" height="40" rx="3"/><text class="label" x="500" y="73">Omtask</text><text class="sub" x="500" y="86" font-size="9">任务编排</text>
  <rect class="box" x="590" y="50" width="100" height="40" rx="3"/><text class="label" x="640" y="73">PreCheckSvc</text><text class="sub" x="640" y="86" font-size="9">:50055</text>
  <rect class="box" x="750" y="50" width="100" height="40" rx="3"/><text class="label" x="800" y="73">AntiRansomSvc</text><text class="sub" x="800" y="86" font-size="9">:8443</text>

  <text x="450" y="115" text-anchor="middle" fill="#3a4a6b" font-size="12" font-weight="600">— CLI 触发 → DeployService → Omtask 拉起 —</text>
  <line class="arrow" x1="80" y1="140" x2="215" y2="140"/><text class="sub" x="147" y="133">1. dctl card deploy --pool=ascend-1 --count=3</text>
  <line class="arrow" x1="220" y1="160" x2="355" y2="160"/><text class="sub" x="287" y="153">2. RPC Deploy(vm-activate)</text>
  <line class="arrow" x1="360" y1="180" x2="495" y2="180"/><text class="sub" x="427" y="173">3. 委派 Omtask</text>

  <text x="450" y="210" text-anchor="middle" fill="#3a4a6b" font-size="12" font-weight="600">— Omtask 阶段 A-C (§16.1 + §16.2 + §16.3) —</text>
  <line class="arrow" x1="500" y1="235" x2="635" y2="235"/><text class="sub" x="567" y="228">4. RPC PreCheck</text>
  <line class="arrow-dash" x1="640" y1="255" x2="505" y2="255"/><text class="sub" x="567" y="248" fill="#1a5432">5. ok=true</text>
  <line class="arrow" x1="500" y1="280" x2="795" y2="280"/><text class="sub" x="647" y="273">6. REST POST /v1/cleanup/nas-san</text>
  <line class="arrow-dash" x1="800" y1="300" x2="505" y2="300"/><text class="sub" x="647" y="293" fill="#1a5432">7. done, SLA=0</text>

  <text x="450" y="330" text-anchor="middle" fill="#3a4a6b" font-size="12" font-weight="600">— Omtask 阶段 D-E (§16.4 驱动 + §16.5 日志) —</text>
  <line class="arrow" x1="500" y1="355" x2="355" y2="355"/><text class="sub" x="427" y="348">8. 触发 VM 拉起 (§16.4)</text>
  <line class="arrow" x1="500" y1="375" x2="85" y2="375"/><text class="sub" x="292" y="368" fill="#1a5432">9. async progress (Stream 推送)</text>
  <line class="arrow-dash" x1="80" y1="400" x2="215" y2="400"/><text class="sub" x="147" y="393" fill="#1a5432">10. dctl: phase=DRIVER_INSTALL done</text>
  <line class="arrow-dash" x1="220" y1="425" x2="85" y2="425"/><text class="sub" x="147" y="418" fill="#1a5432">11. dctl: done, card_uuid=...</text>

  <rect class="bar" x="20" y="480" width="860" height="50" rx="3"/>
  <text x="30" y="497" fill="#333" font-size="11" font-weight="600">§16.7 关键设计:</text>
  <text x="30" y="513" fill="#666" font-size="10">dctl 9 子命令: deploy / status / undeploy / upgrade / precheck / cleanup / logs / heartbeat / rollback. 同步入口 + 异步 Stream 推送进度, 阶段名 (A-E) 与 §16.1 对齐.</text>
  <text x="30" y="527" fill="#666" font-size="10">dctl 也支持 --dry-run 仅跑 PreCheck (§16.3), 避免真实执行. 全局 --json 输出便于脚本.</text>
</svg>