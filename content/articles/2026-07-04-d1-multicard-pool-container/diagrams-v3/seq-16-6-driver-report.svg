<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .box-fill { fill: #eef0f6; stroke: #3a4a6b; stroke-width: 1.5; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-dash { stroke: #666; stroke-width: 1.2; fill: none; marker-end: url(#arr2); stroke-dasharray: 3,2; }
    .bar { fill: #fafafa; stroke: #ccc; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>
  <text x="450" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">§16.6 升级部署时驱动上报 (状态 + 版本 + 心跳)</text>
  <text x="450" y="40" text-anchor="middle" fill="#666" font-size="11">驱动层 → 控制器 → DeployService → 升级管理器 (5 状态 + 3 心跳频率)</text>

  <line x1="80" y1="65" x2="80" y2="480" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="220" y1="65" x2="220" y2="480" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="360" y1="65" x2="360" y2="480" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="500" y1="65" x2="500" y2="480" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="640" y1="65" x2="640" y2="480" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="800" y1="65" x2="800" y2="480" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>

  <rect class="box" x="20" y="50" width="120" height="40" rx="3"/><text class="label" x="80" y="73">canld</text><text class="sub" x="80" y="86" font-size="9">驱动层</text>
  <rect class="box" x="170" y="50" width="100" height="40" rx="3"/><text class="label" x="220" y="73">驱动 SDK</text><text class="sub" x="220" y="86" font-size="9">libdavinci</text>
  <rect class="box" x="310" y="50" width="100" height="40" rx="3"/><text class="label" x="360" y="73">控制器 agent</text><text class="sub" x="360" y="86" font-size="9">local daemon</text>
  <rect class="box" x="450" y="50" width="100" height="40" rx="3"/><text class="label" x="500" y="73">DeployService</text><text class="sub" x="500" y="86" font-size="9">:50054</text>
  <rect class="box" x="590" y="50" width="100" height="40" rx="3"/><text class="label" x="640" y="73">升级管理器</text><text class="sub" x="640" y="86" font-size="9">UpgradeMgr</text>
  <rect class="box" x="750" y="50" width="100" height="40" rx="3"/><text class="label" x="800" y="73">etcd</text><text class="sub" x="800" y="86" font-size="9">状态持久化</text>

  <text x="450" y="115" text-anchor="middle" fill="#3a4a6b" font-size="12" font-weight="600">— 状态上报 5 类 (INIT/INSTALLING/READY/UPGRADING/ERROR) —</text>
  <line class="arrow" x1="80" y1="140" x2="215" y2="140"/><text class="sub" x="147" y="133">1. canld state=INSTALLING</text>
  <line class="arrow" x1="220" y1="160" x2="355" y2="160"/><text class="sub" x="287" y="153">2. notify driver-state-change</text>
  <line class="arrow" x1="360" y1="180" x2="495" y2="180"/><text class="sub" x="427" y="173">3. ReportDriverState(state, version)</text>
  <line class="arrow" x1="500" y1="200" x2="635" y2="200"/><text class="sub" x="567" y="193">4. 转发到 UpgradeMgr</text>
  <line class="arrow" x1="640" y1="220" x2="795" y2="220"/><text class="sub" x="717" y="213">5. etcd PUT /upgrade/state/...</text>
  <line class="arrow-dash" x1="800" y1="240" x2="645" y2="240"/><text class="sub" x="717" y="233" fill="#1a5432">6. 200 OK, rev=12345</text>

  <text x="450" y="270" text-anchor="middle" fill="#3a4a6b" font-size="12" font-weight="600">— 心跳上报 3 频率 (30s 正常 / 10s 升级 / 5s 错误) —</text>
  <line class="arrow-dash" x1="220" y1="295" x2="85" y2="295"/><text class="sub" x="147" y="288" fill="#1a5432">7. heartbeat @ 30s (正常)</text>
  <line class="arrow" x1="80" y1="320" x2="215" y2="320"/><text class="sub" x="147" y="313">8. heartbeat @ 10s (UPGRADING)</text>
  <line class="arrow" x1="220" y1="345" x2="495" y2="345"/><text class="sub" x="357" y="338">9. aggregate → controller</text>
  <line class="arrow" x1="500" y1="365" x2="635" y2="365"/><text class="sub" x="567" y="358">10. UpgradeMgr track</text>
  <line class="arrow" x1="80" y1="395" x2="215" y2="395"/><text class="sub" x="147" y="388">11. ERROR → @ 5s (含 stack)</text>
  <line class="arrow" x1="220" y1="420" x2="495" y2="420"/><text class="sub" x="357" y="413">12. 升级失败立刻上报</text>

  <rect class="bar" x="20" y="480" width="860" height="50" rx="3"/>
  <text x="30" y="497" fill="#333" font-size="11" font-weight="600">§16.6 关键设计:</text>
  <text x="30" y="513" fill="#666" font-size="10">3 频率心跳 (30/10/5s) 减流量, 状态变化立即触发. 上报路径: canld → 驱动 SDK → 控制器 agent → DeployService → UpgradeMgr → etcd.</text>
  <text x="30" y="527" fill="#666" font-size="10">升级期间任何心跳丢失 3 次 (15s) 触发 DRIVER_UNREACHABLE 告警, 升级管理器进入回滚流程.</text>
</svg>