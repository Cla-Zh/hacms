<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-good { stroke: #1a5432; stroke-width: 2; fill: none; marker-end: url(#arr3); }
    .arrow-bad { stroke: #a02020; stroke-width: 1.5; fill: none; marker-end: url(#arr4); stroke-dasharray: 3,2; }
    .bar { fill: #fafafa; stroke: #ccc; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a5432"/>
    </marker>
    <marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a02020"/>
    </marker>
  </defs>

  <text x="450" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">FP9 时序: AI 卡激活虚拟机 + 驱动固件安装 (5 阶段)</text>
  <text x="450" y="40" text-anchor="middle" fill="#666" font-size="11">AIDeploymentService.ActivateVM: PowerOn → 驱动 → 固件 → NPU 可见 → 卡片注册</text>

  <!-- Lifelines -->
  <line x1="80" y1="65" x2="80" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="240" y1="65" x2="240" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="400" y1="65" x2="400" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="550" y1="65" x2="550" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="720" y1="65" x2="720" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="860" y1="65" x2="860" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>

  <rect class="box" x="20" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="80" y="73">K8s 部署控制器</text>
  <text class="sub" x="80" y="86" font-size="9">部署编排</text>

  <rect class="box" x="180" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="240" y="73">AIDeploymentSvc</text>
  <text class="sub" x="240" y="86" font-size="9">:50054</text>

  <rect class="box" x="340" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="400" y="73">Qemu/libvirt</text>
  <text class="sub" x="400" y="86" font-size="9">domain + PCIe</text>

  <rect class="box" x="490" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="550" y="73">驱动 + 固件</text>
  <text class="sub" x="550" y="86" font-size="9">ascend 910B</text>

  <rect class="box" x="660" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="720" y="73">device-plugin</text>
  <text class="sub" x="720" y="86" font-size="9">K8s</text>

  <rect class="box" x="780" y="50" width="120" height="40" rx="3"/>
  <text class="label" x="860" y="73">AI 推理服务</text>
  <text class="sub" x="860" y="86" font-size="9">:50051 Init</text>

  <text x="470" y="115" text-anchor="middle" fill="#1a5432" font-size="12" font-weight="600">—— 5 阶段顺序 (任一失败 → ReportDeploymentAlert FP10) ——</text>

  <line class="arrow-good" x1="80" y1="135" x2="235" y2="135"/>
  <text class="sub" x="158" y="128">1. ActivateVM(vm_id, vm_image, npu_pci_ids=[0..7], driver="23.0.rc1", firmware="1.78.22")</text>

  <line class="arrow-good" x1="240" y1="160" x2="395" y2="160"/>
  <text class="sub" x="318" y="153">2. ① PowerOn: libvirt domain.create + PCIe 透传 3 NPU</text>

  <line class="arrow-good" x1="400" y1="185" x2="245" y2="185"/>
  <text class="sub" x="323" y="178">3. ✓ qemu_pid=12345, domain running</text>

  <line class="arrow-good" x1="240" y1="210" x2="545" y2="210"/>
  <text class="sub" x="393" y="203">4. ② DriverInstall: modprobe drv_ascend910b</text>

  <line class="arrow-good" x1="550" y1="235" x2="245" y2="235"/>
  <text class="sub" x="398" y="228">5. ✓ driver_version=23.0.rc1 校验通过</text>

  <line class="arrow-good" x1="240" y1="260" x2="545" y2="260"/>
  <text class="sub" x="393" y="253">6. ③ FirmwareVerify: ascend-tool info</text>

  <line class="arrow-good" x1="550" y1="285" x2="245" y2="285"/>
  <text class="sub" x="398" y="278">7. ✓ firmware_version=1.78.22 匹配</text>

  <line class="arrow-good" x1="240" y1="310" x2="395" y2="310"/>
  <text class="sub" x="318" y="303">8. ④ NPUScan: lspci + ascend-tool</text>

  <line class="arrow-good" x1="400" y1="335" x2="245" y2="335"/>
  <text class="sub" x="323" y="328">9. ✓ 3 NPU 可见 (PCIe addresses)</text>

  <line class="arrow-good" x1="240" y1="360" x2="715" y2="360"/>
  <text class="sub" x="478" y="353">10. ⑤ RegisterCard × 8 → device-plugin</text>

  <line class="arrow-good" x1="720" y1="385" x2="245" y2="385"/>
  <text class="sub" x="483" y="378">11. ✓ deployment_token, dcard.com/npu=8</text>

  <line class="arrow-good" x1="240" y1="410" x2="85" y2="410"/>
  <text class="sub" x="163" y="403">12. ActivateVMResponse(activated=true, qemu_pid, inference_port=50051, deployment_token)</text>

  <line class="arrow-good" x1="80" y1="435" x2="855" y2="435"/>
  <text class="sub" x="468" y="428">13. K8s 用 deployment_token + inference_port 调 AIInferenceService.Init (FP1)</text>

  <line class="arrow-bad" x1="240" y1="460" x2="85" y2="460"/>
  <text class="sub" x="163" y="453" fill="#a02020">14. 失败 → activated=false + failure_reason → ReportDeploymentAlert (FP10) → DCARD_VM_ACTIVATION_FAILED(11)</text>

  <!-- Bottom notes -->
  <rect class="bar" x="20" y="455" width="860" height="0" rx="3"/>
  <text x="30" y="498" fill="#666" font-size="10">• v3.1 取代 v3.0 cann-init.sh: gRPC 可编排, 可重试, 可观测; 任一阶段失败上抛告警</text>
  <text x="30" y="513" fill="#666" font-size="10">• 错误码: DCARD_VM_ACTIVATION_FAILED(11) / DCARD_INSUFFICIENT_RESOURCES(4) / DCARD_INTERNAL_ERROR(5)</text>
</svg>