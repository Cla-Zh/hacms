<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .box-core { fill: #fff3b0; stroke: #b89000; stroke-width: 2; }
    .box-fade { fill: #fafafa; stroke: #ccc; stroke-width: 1; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .label-core { fill: #5a4400; font-size: 13px; font-weight: 700; text-anchor: middle; }
    .label-fade { fill: #999; font-size: 13px; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .sub-fade { fill: #aaa; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-thin { stroke: #666; stroke-width: 1; fill: none; marker-end: url(#arr2); }
    .callout-core { fill: #fff3b0; stroke: #b89000; stroke-width: 1.5; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>

  <text x="400" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">FP7: AI 推理服务状态感知 — 子模块图 (Watch 流式 + 热插拔事件)</text>
  <text x="400" y="40" text-anchor="middle" fill="#666" font-size="11">核心子模块: AI 卡状态感知 (黄) · 触发: Qemu 热插拔 + Watch stream</text>

  <!-- Input -->
  <rect class="box" x="20" y="60" width="760" height="50" rx="3"/>
  <text x="400" y="80" class="label" font-size="12">触发: Qemu/libvirt hot-plug 事件 + HealthService.Watch (流式订阅)</text>
  <text x="400" y="98" class="sub">输入: libvirt 事件回调 → 解析 device_id / card_id → 推送 Watch 流</text>

  <!-- vNic (淡灰) -->
  <rect class="box-fade" x="20" y="130" width="148" height="240" rx="4"/>
  <text x="94" y="150" class="label-fade">§15.1 vNic 通信</text>
  <rect class="box-fade" x="30" y="160" width="128" height="40" rx="3"/>
  <text x="94" y="178" class="label-fade" font-size="11">Watch 流入口</text>
  <text x="94" y="192" class="sub-fade" font-size="9">Health :50052/Watch</text>
  <text x="94" y="345" class="sub-fade" font-size="9">—— 出口层 ——</text>

  <!-- 多模型推理框架 (淡灰) -->
  <rect class="box-fade" x="178" y="130" width="148" height="240" rx="4"/>
  <text x="252" y="150" class="label-fade">§15.2 多模型推理框架</text>
  <rect class="box-fade" x="188" y="160" width="128" height="40" rx="3"/>
  <text x="252" y="178" class="label-fade" font-size="11">model_routing_table</text>
  <text x="252" y="192" class="sub-fade" font-size="9">热拔出时剔除 card_id</text>
  <text x="252" y="345" class="sub-fade" font-size="9">—— 路由联动 ——</text>

  <!-- 健康监控 (淡灰) -->
  <rect class="box-fade" x="336" y="130" width="160" height="240" rx="4"/>
  <text x="416" y="150" class="label-fade">§15.3 健康监控</text>
  <rect class="box-fade" x="346" y="160" width="140" height="40" rx="3"/>
  <text x="416" y="178" class="label-fade" font-size="11">Watch 推送器</text>
  <text x="416" y="192" class="sub-fade" font-size="9">stream HealthWatchResponse</text>
  <text x="416" y="345" class="sub-fade" font-size="9">—— 流出口 ——</text>

  <!-- AI 卡使能 (淡灰) -->
  <rect class="box-fade" x="506" y="130" width="148" height="240" rx="4"/>
  <text x="580" y="150" class="label-fade">§15.4 AI 卡使能</text>
  <rect class="box-fade" x="516" y="160" width="128" height="40" rx="3"/>
  <text x="580" y="178" class="label-fade" font-size="11">Register/Unregister</text>
  <text x="580" y="192" class="sub-fade" font-size="9">被状态感知触发</text>
  <text x="580" y="345" class="sub-fade" font-size="9">—— 下游动作 ——</text>

  <!-- AI 卡状态感知 (核心, 黄) -->
  <rect class="box-core" x="664" y="130" width="116" height="240" rx="4"/>
  <text x="722" y="150" class="label-core">§15.5 状态感知 ⭐</text>
  <rect class="box" x="674" y="160" width="96" height="34" rx="3"/>
  <text x="722" y="176" class="label" font-size="10">libvirt 事件订阅</text>
  <text x="722" y="188" class="sub" font-size="9">DEVICE_ATTACHED</text>
  <rect class="box" x="674" y="200" width="96" height="34" rx="3"/>
  <text x="722" y="216" class="label" font-size="10">onAttach(deviceId)</text>
  <text x="722" y="228" class="sub" font-size="9">onDetach(deviceId)</text>
  <rect class="box" x="674" y="240" width="96" height="34" rx="3"/>
  <text x="722" y="256" class="label" font-size="10">HotplugEvent</text>
  <text x="722" y="268" class="sub" font-size="9">{ADDED, REMOVED}</text>
  <rect class="box" x="674" y="280" width="96" height="34" rx="3"/>
  <text x="722" y="296" class="label" font-size="10">CardHealth 更新</text>
  <text x="722" y="308" class="sub" font-size="9">状态字段同步</text>
  <text x="722" y="345" class="sub" font-weight="600">Qemu → 推理 全链路</text>

  <!-- Output -->
  <rect class="box" x="20" y="385" width="760" height="55" rx="3"/>
  <text x="400" y="405" class="label" font-size="12">输出: HealthWatchResponse (流式) { HotplugEvent | CardHealth | ModelHealth | event_time }</text>
  <text x="400" y="423" class="sub">频率: 事件驱动 (热插拔时高频); 客户端 (dctl watch / Prometheus) 长连接</text>

  <!-- Yellow callout -->
  <rect class="callout-core" x="664" y="110" width="116" height="14" rx="2" opacity="0.85"/>
  <text x="722" y="121" text-anchor="middle" fill="#5a4400" font-size="9" font-weight="700">CORE: §15.5</text>

  <!-- Arrows -->
  <line class="arrow" x1="722" y1="370" x2="580" y2="200" stroke="#bbb" stroke-dasharray="2,2"/>
  <line class="arrow" x1="580" y1="180" x2="426" y2="220" stroke="#bbb" stroke-dasharray="2,2"/>
  <line class="arrow" x1="416" y1="160" x2="104" y2="180" stroke="#bbb" stroke-dasharray="2,2"/>
  <line class="arrow" x1="722" y1="370" x2="400" y2="385"/>
</svg>