<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .box-fill { fill: #eef0f6; stroke: #3a4a6b; stroke-width: 1.5; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-dash { stroke: #666; stroke-width: 1.2; fill: none; marker-end: url(#arr2); stroke-dasharray: 3,2; }
    .bar { fill: #fafafa; stroke: #ccc; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>
  <text x="450" y="22" text-anchor="middle" fill="#333" font-size="16" font-weight="600">§16.1 拉起 Omtask 升级流程 (5 阶段 A→B→C→D→E)</text>
  <text x="450" y="40" text-anchor="middle" fill="#666" font-size="11">Omtask 在 VM 外部 · 调起防勒索/切档位/拉容器/驱动/推理服务 5 阶段</text>

  <line x1="80" y1="65" x2="80" y2="540" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="200" y1="65" x2="200" y2="540" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="340" y1="65" x2="340" y2="540" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="480" y1="65" x2="480" y2="540" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="620" y1="65" x2="620" y2="540" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="780" y1="65" x2="780" y2="540" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>

  <rect class="box" x="20" y="50" width="120" height="40" rx="3"/><text class="label" x="80" y="73">dctl / K8s</text><text class="sub" x="80" y="86" font-size="9">触发方</text>
  <rect class="box" x="150" y="50" width="100" height="40" rx="3"/><text class="label" x="200" y="73">Omtask</text><text class="sub" x="200" y="86" font-size="9">VM 外 任务管理</text>
  <rect class="box" x="290" y="50" width="100" height="40" rx="3"/><text class="label" x="340" y="73">控制器</text><text class="sub" x="340" y="86" font-size="9">0/1/2 dual-ctrl</text>
  <rect class="box" x="430" y="50" width="100" height="40" rx="3"/><text class="label" x="480" y="73">防勒索容器</text><text class="sub" x="480" y="86" font-size="9">NAS + SAN</text>
  <rect class="box" x="570" y="50" width="100" height="40" rx="3"/><text class="label" x="620" y="73">推理 VM</text><text class="sub" x="620" y="86" font-size="9">Ascend 910B</text>
  <rect class="box" x="730" y="50" width="100" height="40" rx="3"/><text class="label" x="780" y="73">AI 推理服务</text><text class="sub" x="780" y="86" font-size="9">InferenceService</text>

  <text x="450" y="115" text-anchor="middle" fill="#3a4a6b" font-size="12" font-weight="600">— Phase A 检查所有控制器 AI 卡状态 —</text>
  <line class="arrow" x1="200" y1="140" x2="335" y2="140"/><text class="sub" x="267" y="133">1. query ctrl[0/1] power</text>
  <line class="arrow-dash" x1="340" y1="160" x2="205" y2="160"/><text class="sub" x="267" y="153" fill="#1a5432">2. ctrl[0/1] powered=on, NPU count=3</text>
  <line class="arrow" x1="200" y1="180" x2="335" y2="180"/><text class="sub" x="267" y="173">3. list cards by ctrl → 6 NPU</text>

  <text x="450" y="205" text-anchor="middle" fill="#3a4a6b" font-size="12" font-weight="600">— Phase B 拉起防勒索清理容器 (§16.2) —</text>
  <line class="arrow" x1="200" y1="230" x2="475" y2="230"/><text class="sub" x="337" y="223">4. start anti-ransomware-cleanup container</text>
  <line class="arrow-dash" x1="480" y1="250" x2="205" y2="250"/><text class="sub" x="337" y="243" fill="#1a5432">5. cleanup script done (NAS/SAN/SLA all deleted)</text>

  <text x="450" y="275" text-anchor="middle" fill="#3a4a6b" font-size="12" font-weight="600">— Phase C 切档位 → 2档 8C16G + 删 POD —</text>
  <line class="arrow" x1="200" y1="300" x2="335" y2="300"/><text class="sub" x="267" y="293">6. shift-gear container, tier=2 (8C16G)</text>
  <line class="arrow" x1="340" y1="320" x2="615" y2="320"/><text class="sub" x="477" y="313">7. delete all PODs (kubectl drain)</text>
  <line class="arrow-dash" x1="620" y1="340" x2="345" y2="340"/><text class="sub" x="477" y="333" fill="#1a5432">8. PODs all terminated</text>

  <text x="450" y="365" text-anchor="middle" fill="#3a4a6b" font-size="12" font-weight="600">— Phase D 拉起防勒索容器 + 推理 VM —</text>
  <line class="arrow" x1="200" y1="390" x2="475" y2="390"/><text class="sub" x="337" y="383">9. start anti-ransomware-svc container (长期运行)</text>
  <line class="arrow" x1="200" y1="410" x2="615" y2="410"/><text class="sub" x="407" y="403">10. qemu launch VM (vNic virtio-net)</text>

  <text x="450" y="435" text-anchor="middle" fill="#3a4a6b" font-size="12" font-weight="600">— Phase E VM 启动 → 自动装驱动/固件 → 拉起推理服务 —</text>
  <line class="arrow" x1="620" y1="460" x2="775" y2="460"/><text class="sub" x="697" y="453">11. install driver/firmware (eulerOS hook)</text>
  <line class="arrow-dash" x1="780" y1="480" x2="625" y2="480"/><text class="sub" x="697" y="473" fill="#1a5432">12. InferenceService v3.2 ready (gRPC :50051)</text>

  <rect class="bar" x="20" y="550" width="860" height="40" rx="3"/>
  <text x="30" y="567" fill="#333" font-size="11" font-weight="600">§16.1 关键设计:</text>
  <text x="30" y="583" fill="#666" font-size="10">Omtask 在 VM 外控制编排, 阶段 A-E 任一失败立即停止 + 报告 ReportAlert 4 类 (DRIVER_INSTALL_FAIL/VM_BOOT_FAILED/NPU_INVISIBLE/Ransomware_Cleanup_Fail). 阶段 C 切档位是关键 — 必须 2档 8C16G 才能装 1×Ascend 910B.</text>
</svg>