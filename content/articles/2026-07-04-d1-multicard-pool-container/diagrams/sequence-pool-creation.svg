<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .bar { fill: #fafafa; stroke: #ccc; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="400" y="25" text-anchor="middle" fill="#333" font-size="16" font-weight="600">Pool 创建时序图</text>
  <text x="400" y="42" text-anchor="middle" fill="#666" font-size="11">dctl → D-Card Mgr → PCIe HAL → K8s Plugin</text>

  <!-- Lifelines -->
  <line x1="120" y1="60" x2="120" y2="400" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="300" y1="60" x2="300" y2="400" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="500" y1="60" x2="500" y2="400" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="680" y1="60" x2="680" y2="400" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>

  <rect class="box" x="60" y="50" width="120" height="35" rx="3"/>
  <text class="label" x="120" y="72">User / dctl</text>

  <rect class="box" x="240" y="50" width="120" height="35" rx="3"/>
  <text class="label" x="300" y="72">D-Card Mgr</text>

  <rect class="box" x="440" y="50" width="120" height="35" rx="3"/>
  <text class="label" x="500" y="72">PCIe HAL</text>

  <rect class="box" x="620" y="50" width="120" height="35" rx="3"/>
  <text class="label" x="680" y="72">K8s Plugin</text>

  <!-- Arrows -->
  <line class="arrow" x1="120" y1="120" x2="295" y2="120"/>
  <text class="sub" x="207" y="113">1. create pool --cards=8 --mode=mig</text>

  <line class="arrow" x1="305" y1="155" x2="495" y2="155"/>
  <text class="sub" x="400" y="148">2. alloc 8 GPUs (PCIe 锁)</text>

  <line class="arrow" x1="500" y1="180" x2="310" y2="180" stroke-dasharray="2,2"/>
  <text class="sub" x="400" y="173">3. 8 GPU 句柄 + SR-IOV VF</text>

  <line class="arrow" x1="305" y1="215" x2="500" y2="215"/>
  <text class="sub" x="400" y="208">4. map MIG 7-slice × 8</text>

  <line class="arrow" x1="500" y1="240" x2="310" y2="240" stroke-dasharray="2,2"/>
  <text class="sub" x="400" y="233">5. 56 MIG 设备就绪</text>

  <line class="arrow" x1="305" y1="275" x2="675" y2="275"/>
  <text class="sub" x="490" y="268">6. register pool (vendor=NVIDIA, pool=dcard-pool-1)</text>

  <line class="arrow" x1="680" y1="305" x2="310" y2="305" stroke-dasharray="2,2"/>
  <text class="sub" x="490" y="298">7. registered OK</text>

  <line class="arrow" x1="300" y1="335" x2="125" y2="335" stroke-dasharray="2,2"/>
  <text class="sub" x="207" y="328">8. ready (8 物理 / 56 MIG)</text>

  <!-- Notes -->
  <rect class="bar" x="40" y="365" width="720" height="80" rx="3"/>
  <text x="50" y="385" fill="#333" font-size="12" font-weight="600">关键点</text>
  <text x="50" y="403" fill="#666" font-size="11">• D1 简化: Pool 1 物理 = 1 MIG 切片 (避免性能差异), 8 物理 = 8 切片细粒度</text>
  <text x="50" y="418" fill="#666" font-size="11">• PCIe HAL 锁: Pool 创建期间独占 PCIe, 防止资源争用 (D2 调度优化)</text>
  <text x="50" y="433" fill="#666" font-size="11">• K8s Plugin vendor 字段: D1 关键创新, 让 K8s 看到 vendor (NVIDIA / AMD / 华为)</text>
</svg>
