<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .bar { fill: #fafafa; stroke: #ccc; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="400" y="25" text-anchor="middle" fill="#333" font-size="16" font-weight="600">故障检测时序图</text>
  <text x="400" y="42" text-anchor="middle" fill="#666" font-size="11">D-Card Mgr 1s 探测 + 5s 隔离</text>

  <line x1="100" y1="60" x2="100" y2="400" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="320" y1="60" x2="320" y2="400" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="540" y1="60" x2="540" y2="400" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="720" y1="60" x2="720" y2="400" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>

  <rect class="box" x="40" y="50" width="120" height="35" rx="3"/>
  <text class="label" x="100" y="72">D-Card Mgr</text>

  <rect class="box" x="260" y="50" width="120" height="35" rx="3"/>
  <text class="label" x="320" y="72">HealthChecker</text>

  <rect class="box" x="480" y="50" width="120" height="35" rx="3"/>
  <text class="label" x="540" y="72">PCIe HAL</text>

  <rect class="box" x="660" y="50" width="120" height="35" rx="3"/>
  <text class="label" x="720" y="72">K8s Plugin</text>

  <!-- T+0 -->
  <line class="arrow" x1="100" y1="110" x2="315" y2="110"/>
  <text class="sub" x="207" y="103">T+0s: tick 1s probe</text>

  <line class="arrow" x1="320" y1="135" x2="535" y2="135"/>
  <text class="sub" x="427" y="128">probe PCIe link</text>

  <line class="arrow" x1="540" y1="160" x2="325" y2="160" stroke-dasharray="2,2"/>
  <text class="sub" x="427" y="153">link DOWN</text>

  <line class="arrow" x1="320" y1="190" x2="105" y2="190" stroke-dasharray="2,2"/>
  <text class="sub" x="207" y="183">UNHEALTHY (1/3)</text>

  <!-- T+1s -->
  <line class="arrow" x1="100" y1="220" x2="315" y2="220"/>
  <text class="sub" x="207" y="213">T+1s: probe</text>

  <line class="arrow" x1="320" y1="245" x2="535" y2="245"/>
  <line class="arrow" x1="540" y1="270" x2="325" y2="270" stroke-dasharray="2,2"/>
  <text class="sub" x="427" y="263">link DOWN</text>

  <line class="arrow" x1="320" y1="295" x2="105" y2="295" stroke-dasharray="2,2"/>
  <text class="sub" x="207" y="288">UNHEALTHY (2/3)</text>

  <!-- T+2s -->
  <line class="arrow" x1="100" y1="320" x2="315" y2="320"/>
  <text class="sub" x="207" y="313">T+2s: probe (3次失败)</text>

  <line class="arrow" x1="100" y1="345" x2="715" y2="345"/>
  <text class="sub" x="400" y="338">deregister MIG slices from K8s</text>

  <line class="arrow" x1="720" y1="365" x2="105" y2="365" stroke-dasharray="2,2"/>
  <text class="sub" x="400" y="358">deregistered → FAILED state</text>

  <rect class="bar" x="40" y="385" width="720" height="60" rx="3"/>
  <text x="50" y="403" fill="#333" font-size="12" font-weight="600">D1 故障检测设计</text>
  <text x="50" y="420" fill="#666" font-size="11">• 1s 探测间隔 + 3 次连续失败才确认 (防抖, 避免偶发抖动)</text>
  <text x="50" y="435" fill="#666" font-size="11">• D1 只做隔离 + 注销, 不做迁移 (D3 Hot-Swap Orchestrator 范围)</text>
</svg>
