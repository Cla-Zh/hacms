<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .sub { fill: #666; font-size: 10px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .bar { fill: #fafafa; stroke: #ccc; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="400" y="25" text-anchor="middle" fill="#333" font-size="16" font-weight="600">容器启动时序图</text>
  <text x="400" y="42" text-anchor="middle" fill="#666" font-size="11">kubelet → K8s Plugin → Runtime Shim → D-Card Mgr</text>

  <line x1="100" y1="60" x2="100" y2="400" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="300" y1="60" x2="300" y2="400" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="500" y1="60" x2="500" y2="400" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="700" y1="60" x2="700" y2="400" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>

  <rect class="box" x="40" y="50" width="120" height="35" rx="3"/>
  <text class="label" x="100" y="72">kubelet</text>

  <rect class="box" x="240" y="50" width="120" height="35" rx="3"/>
  <text class="label" x="300" y="72">K8s Plugin</text>

  <rect class="box" x="440" y="50" width="120" height="35" rx="3"/>
  <text class="label" x="500" y="72">Runtime Shim</text>

  <rect class="box" x="640" y="50" width="120" height="35" rx="3"/>
  <text class="label" x="700" y="72">D-Card Mgr</text>

  <line class="arrow" x1="100" y1="115" x2="295" y2="115"/>
  <text class="sub" x="197" y="108">1. allocate(nvidia.com/dcard-pool=1)</text>

  <line class="arrow" x1="300" y1="145" x2="695" y2="145"/>
  <text class="sub" x="497" y="138">2. bind pool (MIG slice ID)</text>

  <line class="arrow" x1="700" y1="170" x2="305" y2="170" stroke-dasharray="2,2"/>
  <text class="sub" x="497" y="163">3. slice handle + topology</text>

  <line class="arrow" x1="305" y1="200" x2="105" y2="200" stroke-dasharray="2,2"/>
  <text class="sub" x="197" y="193">4. alloc response</text>

  <line class="arrow" x1="100" y1="230" x2="495" y2="230"/>
  <text class="sub" x="297" y="223">5. create container</text>

  <line class="arrow" x1="500" y1="260" x2="695" y2="260"/>
  <text class="sub" x="597" y="253">6. map /dev/dcard*</text>

  <line class="arrow" x1="700" y1="285" x2="505" y2="285" stroke-dasharray="2,2"/>
  <text class="sub" x="597" y="278">7. device path + env</text>

  <line class="arrow" x1="500" y1="315" x2="105" y2="315" stroke-dasharray="2,2"/>
  <text class="sub" x="297" y="308">8. ready to start</text>

  <line class="arrow" x1="100" y1="345" x2="495" y2="345"/>
  <text class="sub" x="297" y="338">9. start container (runc)</text>

  <rect class="bar" x="40" y="370" width="720" height="80" rx="3"/>
  <text x="50" y="388" fill="#333" font-size="12" font-weight="600">关键路径</text>
  <text x="50" y="405" fill="#666" font-size="11">• K8s Plugin Allocate RPC: 资源请求 → 绑 MIG slice → 返回 device path</text>
  <text x="50" y="420" fill="#666" font-size="11">• Runtime Shim 拦截 runc create, 注入 /dev/dcard* + 环境变量 (DCARD_VENDOR/NVIDIA)</text>
  <text x="50" y="435" fill="#666" font-size="11">• 容器秒级启动: D1 简化路径, 不做 cgroup v2 GPU 隔离 (D2 完善)</text>
</svg>
