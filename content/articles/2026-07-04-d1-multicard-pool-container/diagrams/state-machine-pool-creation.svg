<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="sans-serif">
  <style>
    .state { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .state-label { fill: #333; font-size: 12px; font-weight: 600; text-anchor: middle; }
    .edge { fill: #333; font-size: 10px; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .start { fill: #333; }
    .fail { stroke: #a00; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="400" y="25" text-anchor="middle" fill="#333" font-size="16" font-weight="600">Pool 创建流程状态机</text>
  <text x="400" y="42" text-anchor="middle" fill="#666" font-size="11">D1 dctl create pool 全流程</text>

  <circle class="start" cx="80" cy="200" r="6"/>

  <rect class="state" x="120" y="180" width="100" height="40" rx="4"/>
  <text class="state-label" x="170" y="205">INIT</text>

  <rect class="state" x="260" y="120" width="100" height="40" rx="4"/>
  <text class="state-label" x="310" y="145">ALLOCATING</text>

  <rect class="state" x="400" y="120" width="100" height="40" rx="4"/>
  <text class="state-label" x="450" y="145">MAPPING</text>

  <rect class="state" x="540" y="120" width="100" height="40" rx="4"/>
  <text class="state-label" x="590" y="145">REGISTERING</text>

  <rect class="state" x="680" y="120" width="100" height="40" rx="4"/>
  <text class="state-label" x="730" y="145">READY</text>

  <rect class="state" x="260" y="240" width="100" height="40" rx="4"/>
  <text class="state-label" x="310" y="265">FAILED</text>

  <rect class="state" x="680" y="240" width="100" height="40" rx="4"/>
  <text class="state-label" x="730" y="265">DESTROYING</text>

  <!-- Edges -->
  <line class="arrow" x1="86" y1="200" x2="115" y2="200"/>
  <line class="arrow" x1="220" y1="200" x2="255" y2="145"/>
  <text class="edge" x="222" y="170">配置 OK</text>
  <line class="arrow" x1="360" y1="140" x2="395" y2="140"/>
  <line class="arrow" x1="500" y1="140" x2="535" y2="140"/>
  <line class="arrow" x1="640" y1="140" x2="675" y2="140"/>
  <line class="arrow" x1="170" y1="220" x2="255" y2="260"/>
  <text class="edge" x="175" y="245" class="fail">配置错</text>
  <line class="arrow" x1="310" y1="160" x2="310" y2="235"/>
  <text class="edge" x="318" y="200" class="fail">资源不足</text>
  <line class="arrow" x1="450" y1="160" x2="380" y2="240" stroke-dasharray="2,2"/>
  <text class="edge" x="395" y="205" class="fail">映射失败</text>
  <line class="arrow" x1="590" y1="160" x2="380" y2="245" stroke-dasharray="2,2"/>
  <text class="edge" x="468" y="205" class="fail">K8s 拒</text>
  <line class="arrow" x1="730" y1="160" x2="730" y2="235"/>
  <text class="edge" x="738" y="200">dctl destroy</text>
  <line class="arrow" x1="780" y1="260" x2="800" y2="260"/>

  <!-- Legend -->
  <rect x="40" y="330" width="720" height="110" fill="#fafafa" stroke="#ccc"/>
  <text x="50" y="350" fill="#333" font-size="12" font-weight="600">说明</text>
  <text x="50" y="368" fill="#666" font-size="11">• INIT: Pool 配置校验 (卡型 / 切片模式 / 资源声明)</text>
  <text x="50" y="383" fill="#666" font-size="11">• ALLOCATING: 分配物理卡 (PCIe HAL 加锁)</text>
  <text x="50" y="398" fill="#666" font-size="11">• MAPPING: 映射资源 (MIG / vGPU / SR-IOV 切片)</text>
  <text x="50" y="413" fill="#666" font-size="11">• REGISTERING: 注册到 K8s Device Plugin (暴露 vendor / pool 字段)</text>
  <text x="50" y="428" fill="#666" font-size="11">• READY: Pool 可用, 容器可调度</text>
</svg>
