<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="sans-serif">
  <style>
    .state { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .state-label { fill: #333; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .edge { fill: #333; font-size: 11px; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .start { fill: #333; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="400" y="25" text-anchor="middle" fill="#333" font-size="16" font-weight="600">D-Card 生命周期状态机</text>
  <text x="400" y="42" text-anchor="middle" fill="#666" font-size="11">D1 PCIe HAL 健康检查状态流转</text>

  <!-- Start -->
  <circle class="start" cx="100" cy="100" r="6"/>

  <!-- States -->
  <rect class="state" x="160" y="80" width="120" height="40" rx="20"/>
  <text class="state-label" x="220" y="105">DISCOVERED</text>

  <rect class="state" x="340" y="80" width="120" height="40" rx="20"/>
  <text class="state-label" x="400" y="105">ACTIVE</text>

  <rect class="state" x="340" y="180" width="120" height="40" rx="20"/>
  <text class="state-label" x="400" y="205">DEGRADED</text>

  <rect class="state" x="340" y="280" width="120" height="40" rx="20"/>
  <text class="state-label" x="400" y="305">FAILED</text>

  <rect class="state" x="160" y="180" width="120" height="40" rx="20"/>
  <text class="state-label" x="220" y="205">UNKNOWN</text>

  <rect class="state" x="520" y="280" width="120" height="40" rx="20"/>
  <text class="state-label" x="580" y="305">[*] (回收)</text>

  <!-- Edges -->
  <line class="arrow" x1="106" y1="100" x2="155" y2="100"/>
  <text class="edge" x="125" y="93">boot</text>

  <line class="arrow" x1="280" y1="100" x2="335" y2="100"/>
  <text class="edge" x="290" y="93">健康通过</text>

  <line class="arrow" x1="400" y1="120" x2="400" y2="175"/>
  <text class="edge" x="408" y="148">告警</text>

  <line class="arrow" x1="400" y1="220" x2="400" y2="275"/>
  <text class="edge" x="408" y="248">失败</text>

  <line class="arrow" x1="280" y1="200" x2="335" y2="200"/>
  <text class="edge" x="285" y="193">未知</text>

  <line class="arrow" x1="460" y1="300" x2="515" y2="300"/>
  <text class="edge" x="468" y="293">隔离</text>

  <line class="arrow" x1="340" y1="100" x2="285" y2="200" stroke-dasharray="3,2"/>
  <text class="edge" x="280" y="148">3次失败</text>

  <line class="arrow" x1="340" y1="200" x2="285" y2="100" stroke-dasharray="3,2"/>
  <text class="edge" x="282" y="148">恢复</text>

  <line class="arrow" x1="280" y1="100" x2="155" y2="200" stroke-dasharray="3,2"/>
  <text class="edge" x="155" y="148">重启</text>

  <!-- Legend -->
  <rect x="40" y="380" width="720" height="60" fill="#fafafa" stroke="#ccc"/>
  <text x="50" y="400" fill="#333" font-size="12" font-weight="600">说明</text>
  <text x="50" y="418" fill="#666" font-size="11">• 实线: 健康检查通过的状态流转 (D-Card Mgr 1s 探测)</text>
  <text x="50" y="433" fill="#666" font-size="11">• 虚线: 防抖机制 (3 次连续失败才确认 / 恢复条件), 防止偶发抖动</text>
</svg>
