<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="sans-serif">
  <style>
    .state { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .state-label { fill: #333; font-size: 12px; font-weight: 600; text-anchor: middle; }
    .edge { fill: #333; font-size: 10px; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .start { fill: #333; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="400" y="25" text-anchor="middle" fill="#333" font-size="16" font-weight="600">容器启动流程状态机</text>
  <text x="400" y="42" text-anchor="middle" fill="#666" font-size="11">K8s Pod → 容器运行 (D1 路径)</text>

  <circle class="start" cx="60" cy="200" r="6"/>

  <rect class="state" x="100" y="180" width="100" height="40" rx="4"/>
  <text class="state-label" x="150" y="205">POD_CREATED</text>

  <rect class="state" x="240" y="180" width="100" height="40" rx="4"/>
  <text class="state-label" x="290" y="205">SCHEDULED</text>

  <rect class="state" x="380" y="180" width="110" height="40" rx="4"/>
  <text class="state-label" x="435" y="205">ADMITTING</text>

  <rect class="state" x="530" y="180" width="100" height="40" rx="4"/>
  <text class="state-label" x="580" y="205">INJECTING</text>

  <rect class="state" x="670" y="180" width="100" height="40" rx="4"/>
  <text class="state-label" x="720" y="205">RUNNING</text>

  <rect class="state" x="240" y="280" width="100" height="40" rx="4"/>
  <text class="state-label" x="290" y="305">FAILED</text>

  <rect class="state" x="530" y="280" width="100" height="40" rx="4"/>
  <text class="state-label" x="580" y="305">TERMINATING</text>

  <line class="arrow" x1="66" y1="200" x2="95" y2="200"/>
  <line class="arrow" x1="200" y1="200" x2="235" y2="200"/>
  <line class="arrow" x1="340" y1="200" x2="375" y2="200"/>
  <line class="arrow" x1="490" y1="200" x2="525" y2="200"/>
  <line class="arrow" x1="630" y1="200" x2="665" y2="200"/>

  <line class="arrow" x1="290" y1="220" x2="290" y2="275"/>
  <text class="edge" x="298" y="250">资源不足</text>

  <line class="arrow" x1="580" y1="220" x2="580" y2="275"/>
  <text class="edge" x="588" y="250">Pod 销毁</text>

  <line class="arrow" x1="630" y1="295" x2="555" y2="295" stroke-dasharray="2,2"/>
  <text class="edge" x="568" y="288">强制结束</text>

  <!-- Legend -->
  <rect x="40" y="350" width="720" height="100" fill="#fafafa" stroke="#ccc"/>
  <text x="50" y="370" fill="#333" font-size="12" font-weight="600">说明</text>
  <text x="50" y="388" fill="#666" font-size="11">• POD_CREATED: K8s API 收到 Pod spec (含 resources.limits['nvidia.com/dcard-pool])</text>
  <text x="50" y="403" fill="#666" font-size="11">• SCHEDULED: kube-scheduler 绑定节点 (D-Card Mgr 同步暴露资源)</text>
  <text x="50" y="418" fill="#666" font-size="11">• ADMITTING: kubelet 请求 D-Card 资源 (Device Plugin Allocate RPC)</text>
  <text x="50" y="433" fill="#666" font-size="11">• INJECTING: Runtime Shim 注入 /dev/dcard* 设备 + 环境变量</text>
</svg>
