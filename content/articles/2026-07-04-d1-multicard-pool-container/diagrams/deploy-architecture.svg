<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="sans-serif">
  <style>
    .box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .label { fill: #333; font-size: 14px; font-weight: 600; }
    .sub { fill: #666; font-size: 11px; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    .layer { fill: #f5f5f5; stroke: #999; stroke-width: 1; stroke-dasharray: 4,2; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="25" text-anchor="middle" class="label" font-size="16">D-Series D1 部署架构 (K8s Node)</text>
  <text x="400" y="42" text-anchor="middle" class="sub">5 子系统 + 8 卡 A100 PCIe 拓扑</text>

  <!-- Layer 3: K8s Integration -->
  <rect class="layer" x="40" y="60" width="720" height="100" rx="4"/>
  <text x="50" y="78" class="sub">Layer 3: K8s Integration</text>
  <rect class="box" x="80" y="90" width="280" height="55" rx="3"/>
  <text x="220" y="112" text-anchor="middle" class="label">K8s Device Plugin</text>
  <text x="220" y="130" text-anchor="middle" class="sub">vendor / pool / topology</text>
  <rect class="box" x="440" y="90" width="280" height="55" rx="3"/>
  <text x="580" y="112" text-anchor="middle" class="label">Container Runtime Shim</text>
  <text x="580" y="130" text-anchor="middle" class="sub">runc 改造 + /dev/dcard*</text>

  <!-- Layer 2: Pool Abstraction -->
  <rect class="layer" x="40" y="175" width="720" height="65" rx="4"/>
  <text x="50" y="193" class="sub">Layer 2: Pool Abstraction (D1 简化)</text>
  <rect class="box" x="260" y="205" width="280" height="30" rx="3"/>
  <text x="400" y="225" text-anchor="middle" class="label">dctl CLI (运维)</text>

  <!-- Layer 1: Hardware Abstraction -->
  <rect class="layer" x="40" y="255" width="720" height="100" rx="4"/>
  <text x="50" y="273" class="sub">Layer 1: Hardware Abstraction</text>
  <rect class="box" x="80" y="285" width="280" height="55" rx="3"/>
  <text x="220" y="307" text-anchor="middle" class="label">D-Card Manager</text>
  <text x="220" y="325" text-anchor="middle" class="sub">健康检查 / 池创建 / 故障隔离</text>
  <rect class="box" x="440" y="285" width="280" height="55" rx="3"/>
  <text x="580" y="307" text-anchor="middle" class="label">PCIe HAL</text>
  <text x="580" y="325" text-anchor="middle" class="sub">VFIO / IOMMU / SR-IOV</text>

  <!-- Physical GPUs (bottom) -->
  <rect class="box" x="40" y="375" width="720" height="65" rx="3" fill="#fafafa"/>
  <text x="400" y="395" text-anchor="middle" class="label">物理 GPU (PCIe Slots 0-7, 8x A100)</text>
  <g class="sub">
    <text x="100" y="420">Slot 0</text><text x="160" y="420">Slot 1</text>
    <text x="220" y="420">Slot 2</text><text x="280" y="420">Slot 3</text>
    <text x="340" y="420">Slot 4</text><text x="400" y="420">Slot 5</text>
    <text x="460" y="420">Slot 6</text><text x="520" y="420">Slot 7</text>
  </g>
  <text x="400" y="435" text-anchor="middle" class="sub">1 逻辑 D-Card = 8 物理 A100 (MIG 7 切片/物理)</text>

  <!-- Arrows between layers -->
  <line class="arrow" x1="400" y1="240" x2="400" y2="275"/>
  <line class="arrow" x1="220" y1="340" x2="220" y2="370"/>
  <line class="arrow" x1="580" y1="340" x2="580" y2="370"/>
  <line class="arrow" x1="580" y1="285" x2="580" y2="160" stroke-dasharray="3,2"/>
  <line class="arrow" x1="220" y1="145" x2="220" y2="160" stroke-dasharray="3,2"/>
</svg>
