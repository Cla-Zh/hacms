<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" preserveAspectRatio="xMidYMid meet">
  <!-- Ch2 Comparison Matrix: 8 hardware types -->
  <rect x="0" y="0" width="800" height="460" fill="white"/>

  <text x="400" y="28" font-family="sans-serif" font-size="16" font-weight="700" fill="#1a1a1a" text-anchor="middle">8 类硬件对比矩阵 (容量 / 带宽 / 延迟 / $/GB)</text>
  <text x="400" y="46" font-family="sans-serif" font-size="11" fill="#5a5a5a" text-anchor="middle">第二章 §2.8 收口表格 — 数据来源: 厂商官网 + 论文基准</text>

  <!-- Table header -->
  <rect x="40" y="70" width="720" height="30" rx="4" fill="#3a4a6b"/>
  <text x="80" y="90" font-family="sans-serif" font-size="11" fill="#fff" font-weight="700">类别</text>
  <text x="200" y="90" font-family="sans-serif" font-size="11" fill="#fff" font-weight="700">代表产品</text>
  <text x="340" y="90" font-family="sans-serif" font-size="11" fill="#fff" font-weight="700">带宽</text>
  <text x="440" y="90" font-family="sans-serif" font-size="11" fill="#fff" font-weight="700">延迟</text>
  <text x="520" y="90" font-family="sans-serif" font-size="11" fill="#fff" font-weight="700">$/GB</text>
  <text x="620" y="90" font-family="sans-serif" font-size="11" fill="#fff" font-weight="700">用例</text>

  <!-- Row 1: DRAM -->
  <rect x="40" y="100" width="720" height="34" rx="3" fill="#f9f8f6" stroke="#ddd" stroke-width="1"/>
  <text x="80" y="121" font-family="sans-serif" font-size="11" fill="#1a1a1a" font-weight="700">DRAM</text>
  <text x="200" y="121" font-family="sans-serif" font-size="10" fill="#5a5a5a">DDR5 MRDIMM 256GB</text>
  <text x="340" y="121" font-family="sans-serif" font-size="10" fill="#1a1a1a">800 GB/s</text>
  <text x="440" y="121" font-family="sans-serif" font-size="10" fill="#1a1a1a">100 ns</text>
  <text x="520" y="121" font-family="sans-serif" font-size="10" fill="#3a4a6b" font-weight="700">~$25</text>
  <text x="620" y="121" font-family="sans-serif" font-size="10" fill="#5a5a5a">热数据 / 工作集</text>

  <!-- Row 2: HBM -->
  <rect x="40" y="134" width="720" height="34" rx="3" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="80" y="155" font-family="sans-serif" font-size="11" fill="#1a1a1a" font-weight="700">HBM</text>
  <text x="200" y="155" font-family="sans-serif" font-size="10" fill="#5a5a5a">HBM3E 12-Hi 36GB</text>
  <text x="340" y="155" font-family="sans-serif" font-size="10" fill="#1a1a1a">1.2 TB/s</text>
  <text x="440" y="155" font-family="sans-serif" font-size="10" fill="#1a1a1a">200 ns</text>
  <text x="520" y="155" font-family="sans-serif" font-size="10" fill="#3a4a6b" font-weight="700">~$50</text>
  <text x="620" y="155" font-family="sans-serif" font-size="10" fill="#5a5a5a">AI 训练权重</text>

  <!-- Row 3: CXL Memory -->
  <rect x="40" y="168" width="720" height="34" rx="3" fill="#f9f8f6" stroke="#ddd" stroke-width="1"/>
  <text x="80" y="189" font-family="sans-serif" font-size="11" fill="#1a1a1a" font-weight="700">CXL Memory</text>
  <text x="200" y="189" font-family="sans-serif" font-size="10" fill="#5a5a5a">三星 CXL-MM 128GB</text>
  <text x="340" y="189" font-family="sans-serif" font-size="10" fill="#1a1a1a">64 GB/s</text>
  <text x="440" y="189" font-family="sans-serif" font-size="10" fill="#1a1a1a">300-500 ns</text>
  <text x="520" y="189" font-family="sans-serif" font-size="10" fill="#3a4a6b" font-weight="700">~$8</text>
  <text x="620" y="189" font-family="sans-serif" font-size="10" fill="#5a5a5a">内存扩展 / 池化</text>

  <!-- Row 4: PMem (CXL) -->
  <rect x="40" y="202" width="720" height="34" rx="3" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="80" y="223" font-family="sans-serif" font-size="11" fill="#1a1a1a" font-weight="700">PMem (CXL)</text>
  <text x="200" y="223" font-family="sans-serif" font-size="10" fill="#5a5a5a">Micron CZ122 256GB</text>
  <text x="340" y="223" font-family="sans-serif" font-size="10" fill="#1a1a1a">32 GB/s</text>
  <text x="440" y="223" font-family="sans-serif" font-size="10" fill="#1a1a1a">300-500 ns</text>
  <text x="520" y="223" font-family="sans-serif" font-size="10" fill="#3a4a6b" font-weight="700">~$8</text>
  <text x="620" y="223" font-family="sans-serif" font-size="10" fill="#5a5a5a">大内存 KV / 元数据</text>

  <!-- Row 5: SCM -->
  <rect x="40" y="236" width="720" height="34" rx="3" fill="#f9f8f6" stroke="#ddd" stroke-width="1"/>
  <text x="80" y="257" font-family="sans-serif" font-size="11" fill="#1a1a1a" font-weight="700">SCM</text>
  <text x="200" y="257" font-family="sans-serif" font-size="10" fill="#5a5a5a">铠侠 XL-FLASH 16GB</text>
  <text x="340" y="257" font-family="sans-serif" font-size="10" fill="#1a1a1a">8 GB/s</text>
  <text x="440" y="257" font-family="sans-serif" font-size="10" fill="#1a1a1a">4-10 μs</text>
  <text x="520" y="257" font-family="sans-serif" font-size="10" fill="#3a4a6b" font-weight="700">~$2</text>
  <text x="620" y="257" font-family="sans-serif" font-size="10" fill="#5a5a5a">元数据 / WAL</text>

  <!-- Row 6: QLC SSD -->
  <rect x="40" y="270" width="720" height="34" rx="3" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="80" y="291" font-family="sans-serif" font-size="11" fill="#1a1a1a" font-weight="700">QLC SSD</text>
  <text x="200" y="291" font-family="sans-serif" font-size="10" fill="#5a5a5a">铠侠 LC9 122TB</text>
  <text x="340" y="291" font-family="sans-serif" font-size="10" fill="#1a1a1a">14 GB/s</text>
  <text x="440" y="291" font-family="sans-serif" font-size="10" fill="#1a1a1a">80-150 μs</text>
  <text x="520" y="291" font-family="sans-serif" font-size="10" fill="#3a4a6b" font-weight="700">~$0.07</text>
  <text x="620" y="291" font-family="sans-serif" font-size="10" fill="#5a5a5a">温数据 / AI 数据湖</text>

  <!-- Row 7: SmartSSD -->
  <rect x="40" y="304" width="720" height="34" rx="3" fill="#f9f8f6" stroke="#ddd" stroke-width="1"/>
  <text x="80" y="325" font-family="sans-serif" font-size="11" fill="#1a1a1a" font-weight="700">SmartSSD</text>
  <text x="200" y="325" font-family="sans-serif" font-size="10" fill="#5a5a5a">ScaleFlux CSD 3320</text>
  <text x="340" y="325" font-family="sans-serif" font-size="10" fill="#1a1a1a">14 GB/s + 16核</text>
  <text x="440" y="325" font-family="sans-serif" font-size="10" fill="#1a1a1a">80-150 μs</text>
  <text x="520" y="325" font-family="sans-serif" font-size="10" fill="#3a4a6b" font-weight="700">~$0.12</text>
  <text x="620" y="325" font-family="sans-serif" font-size="10" fill="#5a5a5a">DB 下推 / RAG</text>

  <!-- Row 8: HDD -->
  <rect x="40" y="338" width="720" height="34" rx="3" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="80" y="359" font-family="sans-serif" font-size="11" fill="#1a1a1a" font-weight="700">HDD (HAMR)</text>
  <text x="200" y="359" font-family="sans-serif" font-size="10" fill="#5a5a5a">Seagate Mozaic 3+ 32TB</text>
  <text x="340" y="359" font-family="sans-serif" font-size="10" fill="#1a1a1a">500 MB/s</text>
  <text x="440" y="359" font-family="sans-serif" font-size="10" fill="#1a1a1a">5-10 ms</text>
  <text x="520" y="359" font-family="sans-serif" font-size="10" fill="#3a4a6b" font-weight="700">~$0.022</text>
  <text x="620" y="359" font-family="sans-serif" font-size="10" fill="#5a5a5a">冷数据归档</text>

  <!-- Pyramid callout -->
  <rect x="40" y="390" width="720" height="50" rx="4" fill="#eef0f5" stroke="#3a4a6b" stroke-width="1"/>
  <text x="400" y="411" font-family="sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="700">金字塔结构 — 数据按延迟/$ 分层流动</text>
  <text x="400" y="430" font-family="sans-serif" font-size="10" fill="#5a5a5a" text-anchor="middle">塔尖 (DRAM/HBM) → 塔中 (CXL/PMem) → 塔底 (QLC/HDD)</text>
</svg>