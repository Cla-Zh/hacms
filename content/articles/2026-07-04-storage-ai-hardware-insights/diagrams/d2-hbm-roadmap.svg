<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" preserveAspectRatio="xMidYMid meet">
  <!-- D2 HBM Roadmap: HBM2/HBM2E/HBM3/HBM3E/HBM4 (2024-2028), capacity/bandwidth/efficiency 3 axes -->
  <rect x="0" y="0" width="900" height="540" fill="white"/>

  <!-- Title -->
  <text x="450" y="28" font-family="sans-serif" font-size="16" font-weight="700" fill="#1a1a1a" text-anchor="middle">HBM 路线图 (2024-2028) — HBM2 → HBM2E → HBM3 → HBM3E → HBM4</text>
  <text x="450" y="46" font-family="sans-serif" font-size="11" fill="#5a5a5a" text-anchor="middle">容量 / 带宽 / 能效 三轴演进 — 三大供应商 (SK hynix / Samsung / Micron) 同步量产</text>

  <!-- Year header -->
  <text x="80" y="84" font-family="sans-serif" font-size="11" fill="#5a5a5a" text-anchor="middle">2024</text>
  <text x="220" y="84" font-family="sans-serif" font-size="11" fill="#5a5a5a" text-anchor="middle">2025</text>
  <text x="360" y="84" font-family="sans-serif" font-size="11" fill="#5a5a5a" text-anchor="middle">2026</text>
  <text x="500" y="84" font-family="sans-serif" font-size="11" fill="#5a5a5a" text-anchor="middle">2027</text>
  <text x="640" y="84" font-family="sans-serif" font-size="11" fill="#5a5a5a" text-anchor="middle">2028</text>
  <text x="780" y="84" font-family="sans-serif" font-size="11" fill="#3a4a6b" text-anchor="middle" font-weight="700">2029+</text>
  <line x1="40" y1="90" x2="860" y2="90" stroke="#555" stroke-width="1.5"/>

  <!-- Lane 1: Capacity (GB per stack) -->
  <text x="20" y="115" font-family="sans-serif" font-size="12" fill="#3a4a6b" font-weight="700">容量 (GB/stack)</text>

  <rect x="60" y="100" width="100" height="34" rx="4" fill="#f0f0f0" stroke="#aaa" stroke-width="1"/>
  <text x="110" y="118" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a" text-anchor="middle">24 GB</text>
  <text x="110" y="130" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">HBM3 (8-Hi)</text>

  <rect x="180" y="100" width="100" height="34" rx="4" fill="#ddd" stroke="#aaa" stroke-width="1"/>
  <text x="230" y="118" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a" text-anchor="middle">36 GB</text>
  <text x="230" y="130" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">HBM3E (8-Hi)</text>

  <rect x="320" y="100" width="100" height="34" rx="4" fill="#ddd" stroke="#aaa" stroke-width="1"/>
  <text x="370" y="118" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a" text-anchor="middle">48 GB</text>
  <text x="370" y="130" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">HBM3E (12-Hi)</text>

  <rect x="460" y="100" width="100" height="34" rx="4" fill="#aaa" stroke="#aaa" stroke-width="1"/>
  <text x="510" y="118" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">48-60 GB</text>
  <text x="510" y="130" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">HBM4 (12-Hi)</text>

  <rect x="600" y="100" width="100" height="34" rx="4" fill="#aaa" stroke="#aaa" stroke-width="1"/>
  <text x="650" y="118" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">64-80 GB</text>
  <text x="650" y="130" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">HBM4E (16-Hi)</text>

  <rect x="740" y="100" width="100" height="34" rx="4" fill="#3a4a6b" stroke="#3a4a6b" stroke-width="1"/>
  <text x="790" y="118" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">96-128 GB</text>
  <text x="790" y="130" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">HBM5 (16-Hi)</text>

  <!-- Lane 2: Bandwidth (GB/s per stack) -->
  <text x="20" y="195" font-family="sans-serif" font-size="12" fill="#3a4a6b" font-weight="700">带宽 (GB/s)</text>

  <rect x="60" y="180" width="100" height="34" rx="4" fill="#f0f0f0" stroke="#aaa" stroke-width="1"/>
  <text x="110" y="198" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a" text-anchor="middle">819</text>
  <text x="110" y="210" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">HBM3</text>

  <rect x="180" y="180" width="100" height="34" rx="4" fill="#ddd" stroke="#aaa" stroke-width="1"/>
  <text x="230" y="198" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a" text-anchor="middle">1024</text>
  <text x="230" y="210" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">HBM3E 主流</text>

  <rect x="320" y="180" width="100" height="34" rx="4" fill="#ddd" stroke="#aaa" stroke-width="1"/>
  <text x="370" y="198" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a" text-anchor="middle">1200</text>
  <text x="370" y="210" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">HBM3E 12-Hi</text>

  <rect x="460" y="180" width="100" height="34" rx="4" fill="#aaa" stroke="#aaa" stroke-width="1"/>
  <text x="510" y="198" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">1500+</text>
  <text x="510" y="210" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">HBM4 起步</text>

  <rect x="600" y="180" width="100" height="34" rx="4" fill="#aaa" stroke="#aaa" stroke-width="1"/>
  <text x="650" y="198" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">2000+</text>
  <text x="650" y="210" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">HBM4E 12.8 Gb/s</text>

  <rect x="740" y="180" width="100" height="34" rx="4" fill="#3a4a6b" stroke="#3a4a6b" stroke-width="1"/>
  <text x="790" y="198" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">3000+</text>
  <text x="790" y="210" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">HBM5 16 Gb/s</text>

  <!-- Lane 3: Efficiency (pJ/bit) -->
  <text x="20" y="275" font-family="sans-serif" font-size="12" fill="#3a4a6b" font-weight="700">能效 (pJ/bit)</text>

  <rect x="60" y="260" width="100" height="34" rx="4" fill="#f0f0f0" stroke="#aaa" stroke-width="1"/>
  <text x="110" y="278" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a" text-anchor="middle">~5.0</text>
  <text x="110" y="290" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">HBM3</text>

  <rect x="180" y="260" width="100" height="34" rx="4" fill="#ddd" stroke="#aaa" stroke-width="1"/>
  <text x="230" y="278" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a" text-anchor="middle">~3.5</text>
  <text x="230" y="290" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">HBM3E</text>

  <rect x="320" y="260" width="100" height="34" rx="4" fill="#ddd" stroke="#aaa" stroke-width="1"/>
  <text x="370" y="278" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a" text-anchor="middle">~2.8</text>
  <text x="370" y="290" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">HBM3E 12-Hi</text>

  <rect x="460" y="260" width="100" height="34" rx="4" fill="#aaa" stroke="#aaa" stroke-width="1"/>
  <text x="510" y="278" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">~2.0</text>
  <text x="510" y="290" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">HBM4 (base)</text>

  <rect x="600" y="260" width="100" height="34" rx="4" fill="#aaa" stroke="#aaa" stroke-width="1"/>
  <text x="650" y="278" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">~1.5</text>
  <text x="650" y="290" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">HBM4E 优化</text>

  <rect x="740" y="260" width="100" height="34" rx="4" fill="#3a4a6b" stroke="#3a4a6b" stroke-width="1"/>
  <text x="790" y="278" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">~1.0</text>
  <text x="790" y="290" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">HBM5 目标</text>

  <!-- Lane 4: NVIDIA / AMD adoption -->
  <text x="20" y="340" font-family="sans-serif" font-size="12" fill="#3a4a6b" font-weight="700">GPU 平台</text>

  <rect x="60" y="325" width="100" height="34" rx="4" fill="#f0f0f0" stroke="#aaa" stroke-width="1"/>
  <text x="110" y="343" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a" text-anchor="middle">H200</text>
  <text x="110" y="355" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">141 GB</text>

  <rect x="180" y="325" width="100" height="34" rx="4" fill="#ddd" stroke="#aaa" stroke-width="1"/>
  <text x="230" y="343" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a" text-anchor="middle">B200/GB200</text>
  <text x="230" y="355" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">192 GB</text>

  <rect x="320" y="325" width="100" height="34" rx="4" fill="#ddd" stroke="#aaa" stroke-width="1"/>
  <text x="370" y="343" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a" text-anchor="middle">GB300</text>
  <text x="370" y="355" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">288 GB</text>

  <rect x="460" y="325" width="100" height="34" rx="4" fill="#aaa" stroke="#aaa" stroke-width="1"/>
  <text x="510" y="343" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Rubin</text>
  <text x="510" y="355" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">HBM4</text>

  <rect x="600" y="325" width="100" height="34" rx="4" fill="#aaa" stroke="#aaa" stroke-width="1"/>
  <text x="650" y="343" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">MI400</text>
  <text x="650" y="355" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">256 GB</text>

  <rect x="740" y="325" width="100" height="34" rx="4" fill="#3a4a6b" stroke="#3a4a6b" stroke-width="1"/>
  <text x="790" y="343" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">MI500 / Rubin</text>
  <text x="790" y="355" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">HBM5</text>

  <!-- Supplier footer -->
  <text x="20" y="395" font-family="sans-serif" font-size="12" fill="#3a4a6b" font-weight="700">供应商动态</text>

  <rect x="60" y="405" width="240" height="48" rx="4" fill="#f9f8f6" stroke="#ddd" stroke-width="1"/>
  <text x="76" y="423" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a">SK hynix</text>
  <text x="76" y="438" font-family="sans-serif" font-size="10" fill="#5a5a5a">HBM3E 主流供 / HBM4 2026 Q3 试产</text>
  <text x="76" y="450" font-family="sans-serif" font-size="9" fill="#5a5a5a" font-style="italic">HBM 占全球 DRAM 营收 ~30% (2025)</text>

  <rect x="320" y="405" width="240" height="48" rx="4" fill="#f9f8f6" stroke="#ddd" stroke-width="1"/>
  <text x="336" y="423" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a">Samsung</text>
  <text x="336" y="438" font-family="sans-serif" font-size="10" fill="#5a5a5a">HBM3E 2025.6 通过 NVIDIA 认证</text>
  <text x="336" y="450" font-family="sans-serif" font-size="9" fill="#5a5a5a" font-style="italic">HBM4 12-Hi 2026 量产</text>

  <rect x="580" y="405" width="240" height="48" rx="4" fill="#f9f8f6" stroke="#ddd" stroke-width="1"/>
  <text x="596" y="423" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a">Micron</text>
  <text x="596" y="438" font-family="sans-serif" font-size="10" fill="#5a5a5a">HBM3E 2025.7 量产 / 跳过 HBM4 验证?</text>
  <text x="596" y="450" font-family="sans-serif" font-size="9" fill="#5a5a5a" font-style="italic">DRAM 龙头排名第三</text>

  <!-- Bottom callout -->
  <rect x="40" y="470" width="820" height="56" rx="4" fill="#eef0f5" stroke="#3a4a6b" stroke-width="1"/>
  <text x="450" y="492" font-family="sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="700">HBM 5 年容量 4x (24GB → 96GB) / 带宽 4x (819 → 3000+ GB/s) / 能效 5x (5.0 → 1.0 pJ/bit)</text>
  <text x="450" y="508" font-family="sans-serif" font-size="10" fill="#5a5a5a" text-anchor="middle">HBM 仍是 AI 算力 I/O 墙核心瓶颈 — 推理 KV cache 容量需求加速 HBM3E → HBM4 平台迁移</text>
  <text x="450" y="522" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle" font-style="italic">Source: SK hynix IR 2025 · Samsung Newsroom 2025.6 · Micron IR · preset.json</text>
</svg>
