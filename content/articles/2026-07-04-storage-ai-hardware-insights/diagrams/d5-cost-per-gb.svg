<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" preserveAspectRatio="xMidYMid meet">
  <!-- D5 Cost per GB across 8 hardware classes -->
  <rect x="0" y="0" width="900" height="540" fill="white"/>

  <text x="450" y="28" font-family="sans-serif" font-size="16" font-weight="700" fill="#1a1a1a" text-anchor="middle">8 类硬件 $/GB 成本曲线 (USD/GB, 2024-2026 区间)</text>
  <text x="450" y="46" font-family="sans-serif" font-size="11" fill="#5a5a5a" text-anchor="middle">每 GB 容量价格 (纵轴对数) — DRAM ~50000x Tape — 容量与性能比决定 AI 工作负载落点</text>

  <!-- Bar chart container -->
  <!-- Y axis (logarithmic scale, $0.001 - $100) -->
  <line x1="90" y1="90" x2="90" y2="450" stroke="#555" stroke-width="1"/>
  <line x1="90" y1="450" x2="860" y2="450" stroke="#555" stroke-width="1"/>

  <!-- Y gridlines (log scale) -->
  <line x1="90" y1="450" x2="860" y2="450" stroke="#aaa" stroke-width="0.5"/>
  <line x1="90" y1="400" x2="860" y2="400" stroke="#ddd" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="90" y1="350" x2="860" y2="350" stroke="#ddd" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="90" y1="300" x2="860" y2="300" stroke="#ddd" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="90" y1="250" x2="860" y2="250" stroke="#ddd" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="90" y1="200" x2="860" y2="200" stroke="#ddd" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="90" y1="150" x2="860" y2="150" stroke="#ddd" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="90" y1="100" x2="860" y2="100" stroke="#ddd" stroke-width="0.5" stroke-dasharray="3 3"/>

  <!-- Y-axis labels -->
  <text x="85" y="453" font-family="sans-serif" font-size="10" fill="#5a5a5a" text-anchor="end">$0.01</text>
  <text x="85" y="403" font-family="sans-serif" font-size="10" fill="#5a5a5a" text-anchor="end">$0.1</text>
  <text x="85" y="353" font-family="sans-serif" font-size="10" fill="#5a5a5a" text-anchor="end">$1</text>
  <text x="85" y="303" font-family="sans-serif" font-size="10" fill="#5a5a5a" text-anchor="end">$10</text>
  <text x="85" y="253" font-family="sans-serif" font-size="10" fill="#5a5a5a" text-anchor="end">$100</text>
  <text x="85" y="203" font-family="sans-serif" font-size="10" fill="#5a5a5a" text-anchor="end">$1k</text>
  <text x="85" y="153" font-family="sans-serif" font-size="10" fill="#5a5a5a" text-anchor="end">$10k</text>
  <text x="85" y="103" font-family="sans-serif" font-size="10" fill="#5a5a5a" text-anchor="end">$100k</text>

  <!-- 8 bars (logarithmic height mapping) -->
  <!-- Tape: ~$0.01/GB -> log(0.01)= -2 -> y=450 -->
  <rect x="120" y="448" width="60" height="60" rx="3" fill="#aaa" stroke="#555" stroke-width="0.5"/>
  <text x="150" y="480" font-family="sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="700">Tape</text>
  <text x="150" y="492" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">$0.01</text>

  <!-- HDD: ~$0.03/GB -> log(0.03)=-1.5 -> y=418 -->
  <rect x="200" y="416" width="60" height="32" rx="3" fill="#aaa" stroke="#555" stroke-width="0.5"/>
  <text x="230" y="480" font-family="sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="700">HDD</text>
  <text x="230" y="492" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">$0.03</text>

  <!-- TLC SSD: ~$0.10/GB -->
  <rect x="280" y="395" width="60" height="53" rx="3" fill="#ddd" stroke="#555" stroke-width="0.5"/>
  <text x="310" y="480" font-family="sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="700">TLC SSD</text>
  <text x="310" y="492" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">$0.10</text>

  <!-- QLC SSD: ~$0.06/GB -->
  <rect x="360" y="403" width="60" height="45" rx="3" fill="#ddd" stroke="#555" stroke-width="0.5"/>
  <text x="390" y="480" font-family="sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="700">QLC SSD</text>
  <text x="390" y="492" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">$0.06</text>

  <!-- SCM (XL-FLASH): ~$2/GB -->
  <rect x="440" y="338" width="60" height="110" rx="3" fill="#aaa" stroke="#555" stroke-width="0.5"/>
  <text x="470" y="480" font-family="sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="700">SCM (XL-FLASH)</text>
  <text x="470" y="492" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">$2</text>

  <!-- CXL Memory Module: ~$5/GB -->
  <rect x="520" y="320" width="60" height="128" rx="3" fill="#aaa" stroke="#555" stroke-width="0.5"/>
  <text x="550" y="480" font-family="sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="700">CXL</text>
  <text x="550" y="492" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">$5</text>

  <!-- Optane Pmem (legacy pricing): ~$15/GB -->
  <rect x="600" y="298" width="60" height="150" rx="3" fill="#555" stroke="#555" stroke-width="0.5"/>
  <text x="630" y="478" font-family="sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="700">Optane</text>
  <text x="630" y="490" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">$15</text>

  <!-- DRAM (DDR5): ~$25/GB -->
  <rect x="680" y="288" width="60" height="160" rx="3" fill="#aaa" stroke="#555" stroke-width="0.5"/>
  <text x="710" y="478" font-family="sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="700">DDR5 DRAM</text>
  <text x="710" y="490" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">$25</text>

  <!-- HBM3E: ~$300/GB (specialty) -->
  <rect x="760" y="218" width="60" height="230" rx="3" fill="#3a4a6b" stroke="#3a4a6b" stroke-width="0.5"/>
  <text x="790" y="478" font-family="sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="700">HBM3E</text>
  <text x="790" y="490" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">$300</text>

  <!-- Bar value labels above bars (markers near top) -->
  <text x="150" y="446" font-family="sans-serif" font-size="8" fill="#5a5a5a" text-anchor="middle">LTO-9</text>
  <text x="230" y="413" font-family="sans-serif" font-size="8" fill="#5a5a5a" text-anchor="middle">HAMR</text>

  <!-- Cost gap annotation -->
  <rect x="100" y="100" width="780" height="38" rx="4" fill="#eef0f5" stroke="#3a4a6b" stroke-width="1"/>
  <text x="490" y="118" font-family="sans-serif" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="700">成本鸿沟 — DRAM/HBM 4-5 个数量级高于 NAND/Tape — AI 落地核心约束</text>
  <text x="490" y="131" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">KV cache 卸载 + 分层存储 (HBM → CXL → QLC → HDD) 是 2026-2028 关键技术路径</text>

  <!-- Right side: 3-tier summary -->
  <text x="120" y="510" font-family="sans-serif" font-size="10" font-weight="700" fill="#1a1a1a">■ 热数据 ($25-$300/GB) — HBM/DDR5/Optane/CXL</text>
  <text x="120" y="525" font-family="sans-serif" font-size="10" font-weight="700" fill="#5a5a5a">■ 温数据 ($0.06-$2/GB) — SCM/QLC/TLC SSD</text>
  <text x="540" y="510" font-family="sans-serif" font-size="10" font-weight="700" fill="#5a5a5a">■ 冷数据 ($0.01-$0.03/GB) — HDD/Tape</text>
  <text x="540" y="525" font-family="sans-serif" font-size="10" font-weight="700" fill="#5a5a5a">■ 区间跨度: 5 个数量级 (Tape → HBM = 30000x)</text>
</svg>
