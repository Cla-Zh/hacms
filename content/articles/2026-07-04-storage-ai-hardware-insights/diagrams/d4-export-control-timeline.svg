<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" preserveAspectRatio="xMidYMid meet">
  <!-- D4 BIS Export Control Timeline: 4 rounds (2022.10 / 2023.10 / 2024.12 / 2025.01) -->
  <rect x="0" y="0" width="900" height="540" fill="white"/>

  <text x="450" y="28" font-family="sans-serif" font-size="16" font-weight="700" fill="#1a1a1a" text-anchor="middle">BIS 出口管制 4 轮时间线 (2022.10 - 2025.01) — 受影响 SKU + 国产替代窗口</text>
  <text x="450" y="46" font-family="sans-serif" font-size="11" fill="#5a5a5a" text-anchor="middle">美国工业与安全局 (BIS) 对中国 AI 卡 + 先进存储的 4 次升级 + 中国特供版推陈出新</text>

  <!-- Main timeline axis -->
  <line x1="60" y1="280" x2="860" y2="280" stroke="#555" stroke-width="1.5"/>

  <!-- Year markers -->
  <text x="180" y="270" font-family="sans-serif" font-size="11" fill="#5a5a5a" text-anchor="middle" font-weight="700">2022.10</text>
  <line x1="180" y1="276" x2="180" y2="284" stroke="#555" stroke-width="1"/>
  <text x="180" y="298" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">第一轮</text>

  <text x="375" y="270" font-family="sans-serif" font-size="11" fill="#5a5a5a" text-anchor="middle" font-weight="700">2023.10</text>
  <line x1="375" y1="276" x2="375" y2="284" stroke="#555" stroke-width="1"/>
  <text x="375" y="298" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">第二轮</text>

  <text x="570" y="270" font-family="sans-serif" font-size="11" fill="#5a5a5a" text-anchor="middle" font-weight="700">2024.12</text>
  <line x1="570" y1="276" x2="570" y2="284" stroke="#555" stroke-width="1"/>
  <text x="570" y="298" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">第三轮</text>

  <text x="765" y="270" font-family="sans-serif" font-size="11" fill="#3a4a6b" text-anchor="middle" font-weight="700">2025.01</text>
  <line x1="765" y1="276" x2="765" y2="284" stroke="#3a4a6b" stroke-width="2"/>
  <text x="765" y="298" font-family="sans-serif" font-size="9" fill="#3a4a6b" text-anchor="middle" font-weight="700">第四轮</text>

  <!-- Round 1: 2022.10 -->
  <rect x="80" y="100" width="200" height="160" rx="6" fill="#f9f8f6" stroke="#aaa" stroke-width="1"/>
  <text x="100" y="120" font-family="sans-serif" font-size="12" font-weight="700" fill="#1a1a1a">第一轮 · 2022.10</text>
  <text x="100" y="140" font-family="sans-serif" font-size="10" font-weight="700" fill="#3a4a6b">禁运 + 实体清单</text>
  <text x="100" y="158" font-family="sans-serif" font-size="9" fill="#1a1a1a">■ A100 / H100 (NVIDIA)</text>
  <text x="100" y="170" font-family="sans-serif" font-size="9" fill="#1a1a1a">■ 长江存储 YMTC 实体清单</text>
  <text x="100" y="182" font-family="sans-serif" font-size="9" fill="#1a1a1a">■ 14nm 以下逻辑芯片设备</text>
  <text x="100" y="194" font-family="sans-serif" font-size="9" fill="#1a1a1a">■ 内存设备</text>

  <text x="100" y="215" font-family="sans-serif" font-size="10" font-weight="700" fill="#555">NVIDIA 应变</text>
  <text x="100" y="228" font-family="sans-serif" font-size="9" fill="#5a5a5a">A800 / H800 降配版 (对华特供)</text>
  <text x="100" y="240" font-family="sans-serif" font-size="9" fill="#5a5a5a">互联带宽 400→600→800 阶梯</text>
  <text x="100" y="252" font-family="sans-serif" font-size="9" fill="#5a5a5a" font-style="italic">国产紧急上量窗口</text>

  <!-- Round 2: 2023.10 -->
  <rect x="275" y="100" width="200" height="160" rx="6" fill="#f9f8f6" stroke="#aaa" stroke-width="1"/>
  <text x="295" y="120" font-family="sans-serif" font-size="12" font-weight="700" fill="#1a1a1a">第二轮 · 2023.10</text>
  <text x="295" y="140" font-family="sans-serif" font-size="10" font-weight="700" fill="#3a4a6b">性能阈值 + 互联阈值</text>
  <text x="295" y="158" font-family="sans-serif" font-size="9" fill="#1a1a1a">■ A800 / H800 也禁运</text>
  <text x="295" y="170" font-family="sans-serif" font-size="9" fill="#1a1a1a">■ FP16 ≥ 300 TFLOPS</text>
  <text x="295" y="182" font-family="sans-serif" font-size="9" fill="#1a1a1a">■ 互联 ≥ 600 GB/s</text>
  <text x="295" y="194" font-family="sans-serif" font-size="9" fill="#1a1a1a">■ 性能二选一即禁</text>

  <text x="295" y="215" font-family="sans-serif" font-size="10" font-weight="700" fill="#555">NVIDIA 应变</text>
  <text x="295" y="228" font-family="sans-serif" font-size="9" fill="#5a5a5a">H20 / L20 / L2 中国特供版</text>
  <text x="295" y="240" font-family="sans-serif" font-size="9" fill="#5a5a5a">H20: 96GB / 4.0TB/s / 296 TFLOPS</text>
  <text x="295" y="252" font-family="sans-serif" font-size="9" fill="#5a5a5a" font-style="italic">国产替代窗口正式打开</text>

  <!-- Round 3: 2024.12 -->
  <rect x="470" y="100" width="200" height="160" rx="6" fill="#f9f8f6" stroke="#aaa" stroke-width="1"/>
  <text x="490" y="120" font-family="sans-serif" font-size="12" font-weight="700" fill="#1a1a1a">第三轮 · 2024.12</text>
  <text x="490" y="140" font-family="sans-serif" font-size="10" font-weight="700" fill="#3a4a6b">全球许可证 + 实体清单扩张</text>
  <text x="490" y="158" font-family="sans-serif" font-size="9" fill="#1a1a1a">■ H20 / L20 也禁运</text>
  <text x="490" y="170" font-family="sans-serif" font-size="9" fill="#1a1a1a">■ 全球 AI 卡许可证要求</text>
  <text x="490" y="182" font-family="sans-serif" font-size="9" fill="#1a1a1a">■ 长存 + 寒武纪 + 壁仞</text>
  <text x="490" y="194" font-family="sans-serif" font-size="9" fill="#1a1a1a">  140+ 中国实体扩展</text>

  <text x="490" y="215" font-family="sans-serif" font-size="10" font-weight="700" fill="#555">NVIDIA 应变</text>
  <text x="490" y="228" font-family="sans-serif" font-size="9" fill="#5a5a5a">B30A 新特供版 (64GB HBM3e)</text>
  <text x="490" y="240" font-family="sans-serif" font-size="9" fill="#5a5a5a">B30A ~40% H100 算力</text>
  <text x="490" y="252" font-family="sans-serif" font-size="9" fill="#5a5a5a" font-style="italic">国产 AI 卡订单暴增</text>

  <!-- Round 4: 2025.01 -->
  <rect x="665" y="100" width="220" height="160" rx="6" fill="#eef0f5" stroke="#3a4a6b" stroke-width="1"/>
  <text x="685" y="120" font-family="sans-serif" font-size="12" font-weight="700" fill="#1a1a1a">第四轮 · 2025.01</text>
  <text x="685" y="140" font-family="sans-serif" font-size="10" font-weight="700" fill="#3a4a6b">AI 扩散 (AI Diffusion) 三层分级</text>
  <text x="685" y="158" font-family="sans-serif" font-size="9" fill="#1a1a1a">■ Tier 1 (盟友) 自由采购</text>
  <text x="685" y="170" font-family="sans-serif" font-size="9" fill="#1a1a1a">■ Tier 2 (中东/亚太) 限额</text>
  <text x="685" y="182" font-family="sans-serif" font-size="9" fill="#1a1a1a">■ Tier 3 (中国/俄/伊朗) 全面禁运</text>
  <text x="685" y="194" font-family="sans-serif" font-size="9" fill="#1a1a1a">■ HBM 配额上限</text>

  <text x="685" y="215" font-family="sans-serif" font-size="10" font-weight="700" fill="#555">国内响应</text>
  <text x="685" y="228" font-family="sans-serif" font-size="9" fill="#5a5a5a">昇腾 910C / 寒武纪 590 / 海光 DCU</text>
  <text x="685" y="240" font-family="sans-serif" font-size="9" fill="#5a5a5a">国产替代 50-60% 进入关键阶段</text>
  <text x="685" y="252" font-family="sans-serif" font-size="9" fill="#5a5a5a" font-style="italic">双向出海 (中东/亚太)</text>

  <!-- Bottom: 中国 AI 卡国产替代曲线 -->
  <text x="450" y="335" font-family="sans-serif" font-size="13" font-weight="700" fill="#3a4a6b" text-anchor="middle">中国 AI 卡 国产替代率曲线 (2024-2028)</text>

  <!-- Curve axis -->
  <line x1="80" y1="465" x2="860" y2="465" stroke="#555" stroke-width="1"/>
  <text x="120" y="478" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">2024</text>
  <text x="280" y="478" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">2025</text>
  <text x="440" y="478" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">2026</text>
  <text x="600" y="478" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">2027</text>
  <text x="760" y="478" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">2028</text>

  <!-- Y-axis -->
  <line x1="80" y1="365" x2="80" y2="465" stroke="#555" stroke-width="1"/>
  <text x="70" y="370" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="end">70%</text>
  <text x="70" y="395" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="end">50%</text>
  <text x="70" y="420" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="end">30%</text>
  <text x="70" y="450" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="end">10%</text>

  <!-- Curve data points -->
  <!-- 2024: 10% -->
  <circle cx="120" cy="450" r="5" fill="#aaa" stroke="#555"/>
  <!-- 2025: 25% -->
  <circle cx="280" cy="425" r="5" fill="#aaa" stroke="#555"/>
  <!-- 2026: 45% -->
  <circle cx="440" cy="398" r="6" fill="#3a4a6b" stroke="#3a4a6b"/>
  <!-- 2027: 60% -->
  <circle cx="600" cy="381" r="6" fill="#3a4a6b" stroke="#3a4a6b"/>
  <!-- 2028: 70% -->
  <circle cx="760" cy="370" r="6" fill="#3a4a6b" stroke="#3a4a6b"/>

  <!-- Connecting curve -->
  <line x1="120" y1="450" x2="280" y2="425" stroke="#555" stroke-width="2"/>
  <line x1="280" y1="425" x2="440" y2="398" stroke="#3a4a6b" stroke-width="2"/>
  <line x1="440" y1="398" x2="600" y2="381" stroke="#3a4a6b" stroke-width="2"/>
  <line x1="600" y1="381" x2="760" y2="370" stroke="#3a4a6b" stroke-width="2"/>

  <!-- Data labels -->
  <text x="120" y="442" font-family="sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="700">10%</text>
  <text x="280" y="417" font-family="sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="700">25%</text>
  <text x="440" y="390" font-family="sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="700">45%</text>
  <text x="600" y="373" font-family="sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="700">60%</text>
  <text x="760" y="362" font-family="sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="700">70%</text>

  <text x="450" y="500" font-family="sans-serif" font-size="10" fill="#5a5a5a" text-anchor="middle" font-style="italic">2026-2028 黄金窗口 — 国产 TCO 已优于 H20 30%; 软件生态 (MindSpore / CANN) 仍是决定性变量</text>
  <text x="450" y="520" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle" font-style="italic">Source: BIS 出口管制规则 · tech-analysis-ch3-part1.md · 中国半导体行业协会</text>
</svg>
