<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" preserveAspectRatio="xMidYMid meet">
  <!-- Ch2 CXL Memory Pooling Architecture -->
  <rect x="0" y="0" width="800" height="460" fill="white"/>

  <text x="400" y="28" font-family="sans-serif" font-size="16" font-weight="700" fill="#1a1a1a" text-anchor="middle">CXL 2.0 内存池化架构 — 多 host + switch + CXL Type-3 设备池</text>
  <text x="400" y="46" font-family="sans-serif" font-size="11" fill="#5a5a5a" text-anchor="middle">第二章 §2.3 — 容量扩展 5-10x · 延迟 +30% (KV cache 卸载可接受)</text>

  <!-- Host 1 -->
  <rect x="60" y="80" width="140" height="100" rx="6" fill="white" stroke="#555" stroke-width="2"/>
  <text x="130" y="105" font-family="sans-serif" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="700">Host 1</text>
  <rect x="75" y="115" width="110" height="22" rx="3" fill="#f0f0f0" stroke="#aaa"/>
  <text x="130" y="131" font-family="sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle">CPU + DRAM 768GB</text>
  <rect x="75" y="142" width="110" height="22" rx="3" fill="#eef0f5" stroke="#3a4a6b" stroke-width="1"/>
  <text x="130" y="158" font-family="sans-serif" font-size="9" fill="#3a4a6b" text-anchor="middle">PCIe Gen5 x16</text>

  <!-- Host 2 -->
  <rect x="60" y="200" width="140" height="100" rx="6" fill="white" stroke="#555" stroke-width="2"/>
  <text x="130" y="225" font-family="sans-serif" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="700">Host 2</text>
  <rect x="75" y="235" width="110" height="22" rx="3" fill="#f0f0f0" stroke="#aaa"/>
  <text x="130" y="251" font-family="sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle">CPU + DRAM 768GB</text>
  <rect x="75" y="262" width="110" height="22" rx="3" fill="#eef0f5" stroke="#3a4a6b" stroke-width="1"/>
  <text x="130" y="278" font-family="sans-serif" font-size="9" fill="#3a4a6b" text-anchor="middle">PCIe Gen5 x16</text>

  <!-- Host 3 -->
  <rect x="60" y="320" width="140" height="100" rx="6" fill="white" stroke="#555" stroke-width="2"/>
  <text x="130" y="345" font-family="sans-serif" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="700">Host 3</text>
  <rect x="75" y="355" width="110" height="22" rx="3" fill="#f0f0f0" stroke="#aaa"/>
  <text x="130" y="371" font-family="sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle">CPU + DRAM 768GB</text>
  <rect x="75" y="382" width="110" height="22" rx="3" fill="#eef0f5" stroke="#3a4a6b" stroke-width="1"/>
  <text x="130" y="398" font-family="sans-serif" font-size="9" fill="#3a4a6b" text-anchor="middle">PCIe Gen5 x16</text>

  <!-- Connection lines to switch -->
  <line x1="200" y1="130" x2="290" y2="240" stroke="#555" stroke-width="1.5"/>
  <line x1="200" y1="250" x2="290" y2="240" stroke="#555" stroke-width="1.5"/>
  <line x1="200" y1="370" x2="290" y2="240" stroke="#555" stroke-width="1.5"/>

  <!-- CXL Switch (center) -->
  <rect x="290" y="200" width="160" height="80" rx="6" fill="#3a4a6b" stroke="#3a4a6b" stroke-width="2"/>
  <text x="370" y="225" font-family="sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">CXL 2.0 Switch</text>
  <text x="370" y="245" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">64 GT/s PCIe Gen5 x8</text>
  <text x="370" y="260" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">多 host 内存池化</text>
  <text x="370" y="275" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle" font-style="italic">fabric manager</text>

  <!-- Connection to CXL Type-3 devices -->
  <line x1="450" y1="220" x2="540" y2="130" stroke="#555" stroke-width="1.5"/>
  <line x1="450" y1="240" x2="540" y2="240" stroke="#555" stroke-width="1.5"/>
  <line x1="450" y1="260" x2="540" y2="350" stroke="#555" stroke-width="1.5"/>

  <!-- CXL Type-3 Device 1 (Samsung) -->
  <rect x="540" y="100" width="200" height="60" rx="6" fill="#f0f0f0" stroke="#3a4a6b" stroke-width="2"/>
  <text x="640" y="122" font-family="sans-serif" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="700">Samsung CXL-MM</text>
  <text x="640" y="140" font-family="sans-serif" font-size="10" fill="#5a5a5a" text-anchor="middle">96GB / 128GB</text>
  <text x="640" y="155" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">CXL 1.1 · 64 GT/s</text>

  <!-- CXL Type-3 Device 2 (SK hynix) -->
  <rect x="540" y="210" width="200" height="60" rx="6" fill="#f0f0f0" stroke="#3a4a6b" stroke-width="2"/>
  <text x="640" y="232" font-family="sans-serif" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="700">SK hynix CXL 2.0</text>
  <text x="640" y="250" font-family="sans-serif" font-size="10" fill="#5a5a5a" text-anchor="middle">96GB / 256GB</text>
  <text x="640" y="265" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">CXL 2.0 · 2025 Q1 量产</text>

  <!-- CXL Type-3 Device 3 (Micron) -->
  <rect x="540" y="320" width="200" height="60" rx="6" fill="#f0f0f0" stroke="#3a4a6b" stroke-width="2"/>
  <text x="640" y="342" font-family="sans-serif" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="700">Micron CZ120</text>
  <text x="640" y="360" font-family="sans-serif" font-size="10" fill="#5a5a5a" text-anchor="middle">128GB / 256GB</text>
  <text x="640" y="375" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle">CXL 2.0 · 2025 量产</text>

  <!-- Pool indicator -->
  <rect x="540" y="395" width="200" height="40" rx="4" fill="#3a4a6b" stroke="#3a4a6b"/>
  <text x="640" y="412" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">总池容量 16-64 TB</text>
  <text x="640" y="427" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">延迟 ~300ns · 单 GB $8</text>

  <!-- Bottom caption -->
  <text x="400" y="455" font-family="sans-serif" font-size="10" fill="#5a5a5a" text-anchor="middle" font-style="italic">Source: Samsung Newsroom · Micron IR · CXL Consortium · Tiered Memory CXL EuroSys 2024</text>
</svg>