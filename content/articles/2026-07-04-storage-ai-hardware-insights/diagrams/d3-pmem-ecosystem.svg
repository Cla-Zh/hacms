<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" preserveAspectRatio="xMidYMid meet">
  <!-- D3 PMem Ecosystem Post-Optane: CXL + YMTC + GigaDevice + Samsung + SK hynix -->
  <rect x="0" y="0" width="900" height="540" fill="white"/>

  <text x="450" y="28" font-family="sans-serif" font-size="16" font-weight="700" fill="#1a1a1a" text-anchor="middle">Optane 退市后 PMem 全景 — CXL Memory + 长江存储 + 兆易 + Samsung + SK hynix</text>
  <text x="450" y="46" font-family="sans-serif" font-size="11" fill="#5a5a5a" text-anchor="middle">2022.7 Intel 关闭 Optane 业务 — 大内存池化需求转向 CXL/QLC/3DXP 替代</text>

  <!-- Timeline marker -->
  <line x1="40" y1="80" x2="860" y2="80" stroke="#555" stroke-width="1.5"/>
  <text x="180" y="74" font-family="sans-serif" font-size="10" fill="#5a5a5a" text-anchor="middle">2022.7 Optane 退市</text>
  <line x1="180" y1="76" x2="180" y2="84" stroke="#555" stroke-width="1"/>
  <text x="370" y="74" font-family="sans-serif" font-size="10" fill="#5a5a5a" text-anchor="middle">2024 CXL 1.1 起步</text>
  <line x1="370" y1="76" x2="370" y2="84" stroke="#555" stroke-width="1"/>
  <text x="560" y="74" font-family="sans-serif" font-size="10" fill="#5a5a5a" text-anchor="middle">2026 CXL 2.0/3.0</text>
  <line x1="560" y1="76" x2="560" y2="84" stroke="#555" stroke-width="1"/>
  <text x="780" y="74" font-family="sans-serif" font-size="11" fill="#3a4a6b" text-anchor="middle" font-weight="700">2028+ CXL Fabric</text>
  <line x1="780" y1="74" x2="780" y2="86" stroke="#3a4a6b" stroke-width="2"/>

  <!-- Column 1: International -->
  <text x="150" y="110" font-family="sans-serif" font-size="13" fill="#3a4a6b" font-weight="700" text-anchor="middle">国际厂商</text>
  <rect x="40" y="118" width="220" height="280" rx="6" fill="#f9f8f6" stroke="#ddd"/>

  <!-- Samsung -->
  <rect x="55" y="135" width="190" height="60" rx="4" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="65" y="152" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a">Samsung (韩国)</text>
  <text x="65" y="167" font-family="sans-serif" font-size="9" fill="#5a5a5a">CXL Memory Module 96/128GB</text>
  <text x="65" y="179" font-family="sans-serif" font-size="9" fill="#5a5a5a">CXL 2.0 2025 量产 / Pmem 1.0 规范</text>
  <text x="65" y="190" font-family="sans-serif" font-size="8" fill="#5a5a5a" font-style="italic">含 HBM3E 141GB (H200)</text>

  <!-- SK hynix -->
  <rect x="55" y="205" width="190" height="60" rx="4" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="65" y="222" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a">SK hynix (韩国)</text>
  <text x="65" y="237" font-family="sans-serif" font-size="9" fill="#5a5a5a">HBM 霸主 / CXL DRAM 128GB 试片</text>
  <text x="65" y="249" font-family="sans-serif" font-size="9" fill="#5a5a5a">AiM (Accelerator-in-Memory) 异构</text>
  <text x="65" y="260" font-family="sans-serif" font-size="8" fill="#5a5a5a" font-style="italic">CZ120 (96GB CXL DRAM) 2025 样本</text>

  <!-- Micron -->
  <rect x="55" y="275" width="190" height="60" rx="4" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="65" y="292" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a">Micron (美国)</text>
  <text x="65" y="307" font-family="sans-serif" font-size="9" fill="#5a5a5a">CZ120 CXL Module 量产 2025</text>
  <text x="65" y="319" font-family="sans-serif" font-size="9" fill="#5a5a5a">HBM3E / HBM4 双线推进</text>
  <text x="65" y="330" font-family="sans-serif" font-size="8" fill="#5a5a5a" font-style="italic">2024 营收 USD 30.7B</text>

  <!-- Pure CXL/Memverge -->
  <rect x="55" y="345" width="190" height="44" rx="4" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="65" y="362" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a">Memverge (美国)</text>
  <text x="65" y="375" font-family="sans-serif" font-size="9" fill="#5a5a5a">DaP 5.0 + Big Memory Cloud 软件</text>
  <text x="65" y="385" font-family="sans-serif" font-size="8" fill="#5a5a5a" font-style="italic">融资 USD 130M+ (估值 ~USD 1B)</text>

  <!-- Column 2: China local -->
  <text x="430" y="110" font-family="sans-serif" font-size="13" fill="#3a4a6b" font-weight="700" text-anchor="middle">国产厂商</text>
  <rect x="320" y="118" width="220" height="280" rx="6" fill="#f9f8f6" stroke="#ddd"/>

  <rect x="335" y="135" width="190" height="60" rx="4" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="345" y="152" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a">长江存储 YMTC</text>
  <text x="345" y="167" font-family="sans-serif" font-size="9" fill="#5a5a5a">3D NAND 232 层 + QLC eSSD</text>
  <text x="345" y="179" font-family="sans-serif" font-size="9" fill="#5a5a5a">PCIe 5.0 QLC 30.72TB/61.44TB</text>
  <text x="345" y="190" font-family="sans-serif" font-size="8" fill="#5a5a5a" font-style="italic">替代 PMem 容量层方案</text>

  <rect x="335" y="205" width="190" height="60" rx="4" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="345" y="222" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a">兆易创新 GigaDevice</text>
  <text x="345" y="237" font-family="sans-serif" font-size="9" fill="#5a5a5a">NOR Flash 全球第三 / MCU 国内第二</text>
  <text x="345" y="249" font-family="sans-serif" font-size="9" fill="#5a5a5a">DRAM 自研 (合肥长鑫合作) 2024</text>
  <text x="345" y="260" font-family="sans-serif" font-size="8" fill="#5a5a5a" font-style="italic">2024 营收 CNY 73.5 亿 (+27%)</text>

  <rect x="335" y="275" width="190" height="60" rx="4" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="345" y="292" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a">忆芯科技 STAR</text>
  <text x="345" y="307" font-family="sans-serif" font-size="9" fill="#5a5a5a">STAR 1500 Gen5 SSD 主控 2026 Q3</text>
  <text x="345" y="319" font-family="sans-serif" font-size="9" fill="#5a5a5a">PCIe 5.0 国产主控最大批量</text>
  <text x="345" y="330" font-family="sans-serif" font-size="8" fill="#5a5a5a" font-style="italic">估 CNY 30 亿 / B 轮数亿</text>

  <rect x="335" y="345" width="190" height="44" rx="4" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="345" y="362" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a">忆联 / 浪潮 PSOAR</text>
  <text x="345" y="375" font-family="sans-serif" font-size="9" fill="#5a5a5a">企业级 SSD 模组 + 液冷 AI 整机柜</text>
  <text x="345" y="385" font-family="sans-serif" font-size="8" fill="#5a5a5a" font-style="italic">浪潮智算 2024 ~CNY 350 亿</text>

  <!-- Column 3: Layer/CXL positioning -->
  <text x="710" y="110" font-family="sans-serif" font-size="13" fill="#3a4a6b" font-weight="700" text-anchor="middle">三层替代矩阵</text>
  <rect x="600" y="118" width="220" height="280" rx="6" fill="#f9f8f6" stroke="#ddd"/>

  <rect x="615" y="135" width="190" height="60" rx="4" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="625" y="152" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a">介质层 — NAND/3DXP</text>
  <text x="625" y="167" font-family="sans-serif" font-size="9" fill="#5a5a5a">QLC SSD 替代 Optane 容量场景</text>
  <text x="625" y="179" font-family="sans-serif" font-size="9" fill="#5a5a5a">SCM (XL-FLASH) 替代延迟场景</text>
  <text x="625" y="190" font-family="sans-serif" font-size="8" fill="#5a5a5a" font-style="italic">NAND 厂商主导 — Kioxia / 长存</text>

  <rect x="615" y="205" width="190" height="60" rx="4" fill="#eef0f5" stroke="#3a4a6b" stroke-width="1"/>
  <text x="625" y="222" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a">接口层 — CXL 1.1 → 3.0</text>
  <text x="625" y="237" font-family="sans-serif" font-size="9" fill="#5a5a5a">SK hynix CZ120 / Samsung 128GB</text>
  <text x="625" y="249" font-family="sans-serif" font-size="9" fill="#5a5a5a">CXL 3.0 Fabric 2026 Q3 spec</text>
  <text x="625" y="260" font-family="sans-serif" font-size="8" fill="#3a4a6b" font-style="italic">核心替代路径</text>

  <rect x="615" y="275" width="190" height="60" rx="4" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="625" y="292" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a">软件层 — DaP / Big Memory</text>
  <text x="625" y="307" font-family="sans-serif" font-size="9" fill="#5a5a5a">Memverge DaP 5.0 / Big Memory Cloud</text>
  <text x="625" y="319" font-family="sans-serif" font-size="9" fill="#5a5a5a">透明池化 Optane/CXL/DRAM</text>
  <text x="625" y="330" font-family="sans-serif" font-size="8" fill="#5a5a5a" font-style="italic">应用无需改造</text>

  <rect x="615" y="345" width="190" height="44" rx="4" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="625" y="362" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a">生态层 — 国产优先</text>
  <text x="625" y="375" font-family="sans-serif" font-size="9" fill="#5a5a5a">信创目录 2025 含 CXL 存储</text>
  <text x="625" y="385" font-family="sans-serif" font-size="8" fill="#5a5a5a" font-style="italic">金融/政务 Pmem 替代窗口</text>

  <!-- Bottom callout -->
  <rect x="40" y="410" width="820" height="116" rx="4" fill="#eef0f5" stroke="#3a4a6b" stroke-width="1"/>
  <text x="450" y="432" font-family="sans-serif" font-size="12" font-weight="700" fill="#1a1a1a" text-anchor="middle">三层替代格局 — 介质 NVM (QLC/3DXP) + 接口 CXL + 软件 DaP — Optane 退出留下 USD 1.5B 市场空间</text>
  <text x="60" y="455" font-family="sans-serif" font-size="10" fill="#1a1a1a">■ QLC SSD 替代容量层 (长存 232L/QLC)</text>
  <text x="60" y="470" font-family="sans-serif" font-size="10" fill="#1a1a1a">■ CXL DRAM 替代字节寻址层 (SK hynix CZ120)</text>
  <text x="60" y="485" font-family="sans-serif" font-size="10" fill="#1a1a1a">■ Memverge DaP 5.0 透明池化软件</text>
  <text x="470" y="455" font-family="sans-serif" font-size="10" fill="#1a1a1a">■ 长江存储 NAND 232L 国产化率 >70%</text>
  <text x="470" y="470" font-family="sans-serif" font-size="10" fill="#1a1a1a">■ 长鑫存储 DRAM (兆易合作) 国产替代</text>
  <text x="470" y="485" font-family="sans-serif" font-size="10" fill="#1a1a1a">■ 2028 后 CXL 3.0 Fabric 多主机池化</text>
  <text x="450" y="510" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle" font-style="italic">Source: SK hynix IR · Samsung Newsroom · Micron IR · Memverge News · 兆易创新公告</text>
</svg>
