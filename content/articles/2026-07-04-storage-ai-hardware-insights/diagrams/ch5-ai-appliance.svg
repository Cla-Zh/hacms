<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" preserveAspectRatio="xMidYMid meet">
  <!-- Ch5 AI Appliance Architecture -->
  <rect x="0" y="0" width="800" height="460" fill="white"/>

  <text x="400" y="28" font-family="sans-serif" font-size="16" font-weight="700" fill="#1a1a1a" text-anchor="middle">AI 一体机架构 — GPU/DPU/CXL/NVMe 四层协同</text>
  <text x="400" y="46" font-family="sans-serif" font-size="11" fill="#5a5a5a" text-anchor="middle">第五章 §5.1 — NVIDIA DGX SuperPOD / 华为 Atlas 900 / 浪潮 PSOAR 共同架构</text>

  <!-- L1 GPU Layer (top) -->
  <text x="20" y="90" font-family="sans-serif" font-size="12" fill="#3a4a6b" font-weight="700">L1 · GPU/NPU 算力层</text>
  <rect x="140" y="65" width="120" height="50" rx="6" fill="#3a4a6b" stroke="#3a4a6b"/>
  <text x="200" y="87" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">H200 / B200</text>
  <text x="200" y="103" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">HBM3E 141/192GB</text>

  <rect x="280" y="65" width="120" height="50" rx="6" fill="#3a4a6b" stroke="#3a4a6b"/>
  <text x="340" y="87" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">昇腾 910C</text>
  <text x="340" y="103" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">128GB HBM</text>

  <rect x="420" y="65" width="120" height="50" rx="6" fill="#555" stroke="#555"/>
  <text x="480" y="87" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle">AMD MI325X</text>
  <text x="480" y="103" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">256GB HBM3E</text>

  <rect x="560" y="65" width="120" height="50" rx="6" fill="#555" stroke="#555"/>
  <text x="620" y="87" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle">寒武纪 590</text>
  <text x="620" y="103" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">64GB HBM2e</text>

  <!-- Arrow L1 to L2 -->
  <line x1="400" y1="115" x2="400" y2="135" stroke="#3a4a6b" stroke-width="2"/>
  <text x="408" y="128" font-family="sans-serif" font-size="9" fill="#3a4a6b">GPUDirect Storage 1.4</text>

  <!-- L2 DPU Layer -->
  <text x="20" y="160" font-family="sans-serif" font-size="12" fill="#3a4a6b" font-weight="700">L2 · DPU 控制层</text>
  <rect x="200" y="140" width="120" height="40" rx="6" fill="#3a4a6b" stroke="#3a4a6b"/>
  <text x="260" y="160" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">BlueField-3</text>
  <text x="260" y="173" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">400GbE + 16GB DDR</text>

  <rect x="340" y="140" width="120" height="40" rx="6" fill="#555" stroke="#555"/>
  <text x="400" y="160" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle">Pensando</text>
  <text x="400" y="173" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">Pollara 400</text>

  <rect x="480" y="140" width="120" height="40" rx="6" fill="white" stroke="#3a4a6b" stroke-width="2"/>
  <text x="540" y="160" font-family="sans-serif" font-size="11" fill="#3a4a6b" text-anchor="middle" font-weight="700">中科驭数 K2</text>
  <text x="540" y="173" font-family="sans-serif" font-size="9" fill="#3a4a6b" text-anchor="middle">100GbE 国产</text>

  <!-- Arrow L2 to L3 -->
  <line x1="400" y1="180" x2="400" y2="200" stroke="#555" stroke-width="2"/>
  <text x="408" y="193" font-family="sans-serif" font-size="9" fill="#5a5a5a">NVMe-oF target</text>

  <!-- L3 CXL/PMem Layer -->
  <text x="20" y="225" font-family="sans-serif" font-size="12" fill="#3a4a6b" font-weight="700">L3 · CXL/PMem 内存层</text>
  <rect x="200" y="205" width="120" height="40" rx="6" fill="#3a4a6b" stroke="#3a4a6b"/>
  <text x="260" y="225" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">Samsung CXL-MM</text>
  <text x="260" y="238" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">96/128GB</text>

  <rect x="340" y="205" width="120" height="40" rx="6" fill="#3a4a6b" stroke="#3a4a6b"/>
  <text x="400" y="225" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">Micron CZ120</text>
  <text x="400" y="238" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">128/256GB</text>

  <rect x="480" y="205" width="120" height="40" rx="6" fill="#555" stroke="#555"/>
  <text x="540" y="225" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle">Memverge DaP</text>
  <text x="540" y="238" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">大内存池化</text>

  <!-- Arrow L3 to L4 -->
  <line x1="400" y1="245" x2="400" y2="265" stroke="#555" stroke-width="2"/>
  <text x="408" y="258" font-family="sans-serif" font-size="9" fill="#5a5a5a">NVMe Gen5</text>

  <!-- L4 NVMe SSD Layer (bottom) -->
  <text x="20" y="290" font-family="sans-serif" font-size="12" fill="#3a4a6b" font-weight="700">L4 · NVMe SSD 数据层</text>
  <rect x="140" y="270" width="120" height="40" rx="6" fill="#3a4a6b" stroke="#3a4a6b"/>
  <text x="200" y="290" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">Kioxia LC9</text>
  <text x="200" y="303" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">122TB QLC Gen5</text>

  <rect x="280" y="270" width="120" height="40" rx="6" fill="#3a4a6b" stroke="#3a4a6b"/>
  <text x="340" y="290" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">Samsung PM1743</text>
  <text x="340" y="303" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">122TB QLC Gen5</text>

  <rect x="420" y="270" width="120" height="40" rx="6" fill="#3a4a6b" stroke="#3a4a6b"/>
  <text x="480" y="290" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">长江存储 X3</text>
  <text x="480" y="303" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">232 层 QLC</text>

  <rect x="560" y="270" width="120" height="40" rx="6" fill="#555" stroke="#555"/>
  <text x="620" y="290" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle">ScaleFlux CSD</text>
  <text x="620" y="303" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">16核 ARM + QLC</text>

  <!-- Bottom callout -->
  <rect x="100" y="335" width="600" height="50" rx="4" fill="#eef0f5" stroke="#3a4a6b" stroke-width="1"/>
  <text x="400" y="355" font-family="sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="700">四层协同 — AI 一体机从 paper 到 GA</text>
  <text x="400" y="373" font-family="sans-serif" font-size="10" fill="#5a5a5a" text-anchor="middle">L1 GPU + L2 DPU + L3 CXL/PMem + L4 NVMe 必须组合部署</text>

  <text x="400" y="430" font-family="sans-serif" font-size="10" fill="#5a5a5a" text-anchor="middle" font-style="italic">Source: NVIDIA DGX SuperPOD · 华为 Atlas 900 · 浪潮 PSOAR · preset.json</text>
</svg>