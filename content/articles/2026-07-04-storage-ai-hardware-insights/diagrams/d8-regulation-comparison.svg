<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" preserveAspectRatio="xMidYMid meet">
  <!-- D8 Regulation comparison GDPR / 数据安全法 / EU AI Act / BIS -->
  <rect x="0" y="0" width="900" height="540" fill="white"/>

  <text x="450" y="28" font-family="sans-serif" font-size="16" font-weight="700" fill="#1a1a1a" text-anchor="middle">4 大法规对比 — GDPR / 中国《数据安全法》/ EU AI Act / 美国 BIS</text>
  <text x="450" y="46" font-family="sans-serif" font-size="11" fill="#5a5a5a" text-anchor="middle">数据隐私 / 数据主权 / AI 安全 / 出口管制 — 4 套法规对存储 + AI 硬件采购的合规要求</text>

  <!-- Header row -->
  <rect x="40" y="70" width="820" height="32" rx="4" fill="#f9f8f6" stroke="#ddd" stroke-width="1"/>
  <text x="160" y="90" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a" text-anchor="middle">法规维度</text>
  <text x="340" y="90" font-family="sans-serif" font-size="11" font-weight="700" fill="#3a4a6b" text-anchor="middle">GDPR (欧盟, 2018)</text>
  <text x="510" y="90" font-family="sans-serif" font-size="11" font-weight="700" fill="#3a4a6b" text-anchor="middle">数据安全法 (中国, 2021)</text>
  <text x="680" y="90" font-family="sans-serif" font-size="11" font-weight="700" fill="#3a4a6b" text-anchor="middle">EU AI Act (2024)</text>

  <!-- Row 1: 适用对象 -->
  <rect x="40" y="110" width="20" height="32" fill="white"/>
  <rect x="40" y="110" width="820" height="32" rx="4" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="160" y="130" font-family="sans-serif" font-size="10" font-weight="700" fill="#1a1a1a" text-anchor="middle">适用对象</text>
  <text x="270" y="130" font-family="sans-serif" font-size="10" fill="#1a1a1a">在欧盟处理欧盟居民数据的</text>
  <text x="395" y="130" font-family="sans-serif" font-size="10" font-weight="700" fill="#3a4a6b" text-anchor="middle">全球企业</text>
  <text x="510" y="130" font-family="sans-serif" font-size="10" fill="#1a1a1a">在中国境内开展数据活动的</text>
  <text x="610" y="130" font-family="sans-serif" font-size="10" font-weight="700" fill="#3a4a6b" text-anchor="middle">组织 + 个人</text>
  <text x="680" y="130" font-family="sans-serif" font-size="10" fill="#1a1a1a">在欧盟部署 AI 系统的</text>
  <text x="765" y="130" font-family="sans-serif" font-size="10" font-weight="700" fill="#3a4a6b" text-anchor="middle">提供方 + 使用方</text>

  <!-- Row 2: 核心要求 -->
  <rect x="40" y="148" width="820" height="32" rx="4" fill="#f9f8f6" stroke="#ddd" stroke-width="1"/>
  <text x="160" y="168" font-family="sans-serif" font-size="10" font-weight="700" fill="#1a1a1a" text-anchor="middle">核心要求</text>
  <text x="270" y="168" font-family="sans-serif" font-size="10" fill="#1a1a1a">知情同意 / 数据最小化</text>
  <text x="395" y="168" font-family="sans-serif" font-size="10" font-weight="700" fill="#1a1a1a" text-anchor="middle">+ 跨境传输</text>
  <text x="510" y="168" font-family="sans-serif" font-size="10" fill="#1a1a1a">数据分类分级 / 跨境评估</text>
  <text x="610" y="168" font-family="sans-serif" font-size="10" font-weight="700" fill="#1a1a1a" text-anchor="middle">+ 数据出境安全评估</text>
  <text x="680" y="168" font-family="sans-serif" font-size="10" fill="#1a1a1a">风险分级 (4 档)</text>
  <text x="765" y="168" font-family="sans-serif" font-size="10" font-weight="700" fill="#1a1a1a" text-anchor="middle">+ 高风险 AI 注册</text>

  <!-- Row 3: 对存储/AI 影响 -->
  <rect x="40" y="186" width="820" height="32" rx="4" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="160" y="206" font-family="sans-serif" font-size="10" font-weight="700" fill="#1a1a1a" text-anchor="middle">存储 / AI 影响</text>
  <text x="270" y="206" font-family="sans-serif" font-size="10" fill="#1a1a1a">训练数据必须可删除</text>
  <text x="395" y="206" font-family="sans-serif" font-size="10" font-weight="700" fill="#3a4a6b" text-anchor="middle">硬盘级擦除</text>
  <text x="510" y="206" font-family="sans-serif" font-size="10" fill="#1a1a1a">重要数据本地化</text>
  <text x="610" y="206" font-family="sans-serif" font-size="10" font-weight="700" fill="#3a4a6b" text-anchor="middle">国内存储主备</text>
  <text x="680" y="206" font-family="sans-serif" font-size="10" fill="#1a1a1a">高风险 AI 需可审计</text>
  <text x="765" y="206" font-family="sans-serif" font-size="10" font-weight="700" fill="#3a4a6b" text-anchor="middle">+ 模型可追溯</text>

  <!-- Row 4: 罚则 -->
  <rect x="40" y="224" width="820" height="32" rx="4" fill="#f9f8f6" stroke="#ddd" stroke-width="1"/>
  <text x="160" y="244" font-family="sans-serif" font-size="10" font-weight="700" fill="#1a1a1a" text-anchor="middle">最大罚则</text>
  <text x="270" y="244" font-family="sans-serif" font-size="10" fill="#1a1a1a">全球年营收 4%</text>
  <text x="395" y="244" font-family="sans-serif" font-size="10" font-weight="700" fill="#1a1a1a" text-anchor="middle">+ EUR 20M</text>
  <text x="510" y="244" font-family="sans-serif" font-size="10" fill="#1a1a1a">CNY 1000 万 / 业务暂停</text>
  <text x="610" y="244" font-family="sans-serif" font-size="10" font-weight="700" fill="#1a1a1a" text-anchor="middle">+ 吊销许可</text>
  <text x="680" y="244" font-family="sans-serif" font-size="10" fill="#1a1a1a">EUR 35M / 7% 全球营收</text>
  <text x="765" y="244" font-family="sans-serif" font-size="10" font-weight="700" fill="#1a1a1a" text-anchor="middle">+ 禁用 AI 系统</text>

  <!-- Row 5: 关键例外 -->
  <rect x="40" y="262" width="820" height="32" rx="4" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="160" y="282" font-family="sans-serif" font-size="10" font-weight="700" fill="#1a1a1a" text-anchor="middle">关键例外</text>
  <text x="270" y="282" font-family="sans-serif" font-size="10" fill="#1a1a1a">科研 / 国家安全</text>
  <text x="395" y="282" font-family="sans-serif" font-size="10" font-weight="700" fill="#1a1a1a" text-anchor="middle"> + 重大公共利益</text>
  <text x="510" y="282" font-family="sans-serif" font-size="10" fill="#1a1a1a">未列入重要数据出境</text>
  <text x="610" y="282" font-family="sans-serif" font-size="10" font-weight="700" fill="#1a1a1a" text-anchor="middle">+ 自贸区试点</text>
  <text x="680" y="282" font-family="sans-serif" font-size="10" fill="#1a1a1a">开源 / 学术例外</text>
  <text x="765" y="282" font-family="sans-serif" font-size="10" font-weight="700" fill="#1a1a1a" text-anchor="middle"> + 军事 / 国安例外</text>

  <!-- BIS column right side -->
  <rect x="40" y="305" width="20" height="160" fill="white"/>
  <rect x="40" y="305" width="820" height="160" rx="6" fill="#eef0f5" stroke="#3a4a6b" stroke-width="1"/>
  <text x="160" y="330" font-family="sans-serif" font-size="12" font-weight="700" fill="#3a4a6b" text-anchor="middle">美国 BIS 出口管制 (2022.10 / 2023.10 / 2024.12 / 2025.01) — 4 轮规则</text>

  <text x="60" y="355" font-family="sans-serif" font-size="10" fill="#1a1a1a">■ 适用对象:</text>
  <text x="155" y="355" font-family="sans-serif" font-size="10" fill="#5a5a5a">美国 + 外国企业使用美国受控物项 (含美产设备/技术/软件) — 长臂管辖</text>

  <text x="60" y="375" font-family="sans-serif" font-size="10" fill="#1a1a1a">■ 核心要求:</text>
  <text x="155" y="375" font-family="sans-serif" font-size="10" fill="#5a5a5a">特定性能阈值 (FP16 ≥ 300 TFLOPS / 互联 ≥ 600 GB/s) 触发许可证</text>

  <text x="60" y="395" font-family="sans-serif" font-size="10" fill="#1a1a1a">■ 存储 / AI 影响:</text>
  <text x="155" y="395" font-family="sans-serif" font-size="10" fill="#5a5a5a">A100/H100 + A800/H800 + H20/L20 + B30A 全部纳入禁运 (中国); AI 扩散三级国家分级</text>

  <text x="60" y="415" font-family="sans-serif" font-size="10" fill="#1a1a1a">■ 最大罚则:</text>
  <text x="155" y="415" font-family="sans-serif" font-size="10" fill="#5a5a5a">USD 1M / 交易额 2 倍 + 实体清单 (双倍刑期) + 出口特权撤销</text>

  <text x="60" y="435" font-family="sans-serif" font-size="10" fill="#1a1a1a">■ 关键例外:</text>
  <text x="155" y="435" font-family="sans-serif" font-size="10" fill="#5a5a5a">民用商品 / 28 nm 以下成熟工艺 / EAR99 默认公开 — 范围窄</text>

  <text x="60" y="455" font-family="sans-serif" font-size="9" fill="#5a5a5a" font-style="italic" text-anchor="start">"4 大法规 (GDPR / 数据安全法 / EU AI Act / BIS) 加在一起, 决定了 AI + 存储厂商每一笔交易的合规门槛"</text>

  <!-- Bottom summary -->
  <rect x="40" y="478" width="820" height="50" rx="4" fill="white" stroke="#3a4a6b" stroke-width="1"/>
  <text x="450" y="498" font-family="sans-serif" font-size="11" font-weight="700" fill="#1a1a1a" text-anchor="middle">合规交集 — 4 法规并存: 硬件采购 (BIS) + 数据存储本地化 (数据安全法) + 跨境传输 (GDPR) + AI 系统可审计 (EU AI Act)</text>
  <text x="450" y="515" font-family="sans-serif" font-size="10" fill="#5a5a5a" text-anchor="middle">一家跨国企业部署 AI 工厂, 必须同时满足 4 套法规 — 国产替代 + 信创目录 2025 是合规优先解</text>
  <text x="450" y="525" font-family="sans-serif" font-size="9" fill="#5a5a5a" text-anchor="middle" font-style="italic">Source: tech-analysis-ch3-part1.md · EU AI Act 全文 · 网络安全法 · BIS 联邦公报</text>
</svg>
